<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>Starbase Defender</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
     body {
       margin:0; background:#000; padding:0; overflow:hidden; font-family: Arial, sans-serif;
     }
     #gameContainer {
       display: flex; flex-direction: column; height: 100vh;
     }
     
     #statusPanel {
       background:#111;
       color:#0ff;
       padding:15px;
       flex: 0 0 auto;
       border-bottom:2px solid #08f;
       overflow-y:auto;
       font-size: clamp(22px, 5vw, 30px); 
       font-family: monospace;
       line-height: 1.1;
     }
     #statusPanel div { margin: 1px 5px; }
     #statusPanel .status-gauge {
       display: inline-block;
       width: 60px;
       height: clamp(12px, 2.5vw, 18px);
       background: #222;
       border: 1px solid #08f;
       margin: 0 0 0 8px; /* 上・右・下を0、左のみ8pxに指定 */
       vertical-align: middle;
     }
     #statusPanel .status-gauge-fill {
       height: 100%;
       background: #0f0;
       width: 100%;
       transition: width 0.2s ease, background-color 0.2s ease;
       margin: 0; /* 枠と中身のズレの原因となるマージンを無効化 */
     }
     
     #gameWrapper { position: relative; flex: 1; min-height: 0; }
     #gameCanvas { width: 100%; height: 100%; }

     #zoomUI {
       position: absolute;
       top: 10px;
       left: 30px;
       display: flex;
       flex-direction: column;
       gap: 10px;
       z-index: 1000;
     }
     #zoomUI button {
       width: 90px;
       height: 90px;
       font-size: 48px;
       background: rgba(0, 136, 255, 0.5);
       color: #fff;
       border: 2px solid #0ff;
       border-radius: 30px;
       cursor: pointer;
       user-select: none;
     }
     #zoomUI button:active {
       background: rgba(0, 255, 255, 0.8);
       color: #000;
     }

     #highScoreOverlay {
       display: none;
       position: fixed;
       inset: 0;
       background: rgba(0, 0, 20, 0.93);
       z-index: 9999;
       align-items: center;
       justify-content: center;
       font-family: monospace;
     }
     #hsPanel {
       border: 2px solid #0ff;
       padding: 28px 32px;
       min-width: 500px;
       max-width: 800px;
       width: 92%;
       background: #080820;
       box-shadow: 0 0 40px rgba(0,255,255,0.3);
     }
     #hsResultMsg {
       text-align: center;
       font-size: clamp(24px, 5vw, 40px);
       letter-spacing: 3px;
       margin: 0 0 6px 0;
     }
     #hsFinalMsg {
       color: #8df;
       text-align: center;
       font-size: clamp(24px, 2.5vw, 40px);
       margin: 0 0 16px 0;
       padding-bottom: 14px;
       border-bottom: 1px solid rgba(0,255,255,0.25);
     }
     .hs-heading {
       color: #0ff;
       font-size: clamp(24px, 2.2vw, 40px);
       letter-spacing: 2px;
       margin-bottom: 8px;
     }
     #hsTableWrap {
       overflow-x: auto;
     }
     #hsTable {
       width: 100%;
       border-collapse: collapse;
       font-size: clamp(20px, 2.2vw, 40px);
       color: #9cf;
       min-width: 260px;
     }
     #hsTable th {
       color: #0ff;
       text-align: left;
       padding: 4px 6px;
       border-bottom: 1px solid rgba(0,255,255,0.3);
       letter-spacing: 1px;
       white-space: nowrap;
     }
     #hsTable td {
       padding: 6px 6px; white-space: nowrap;
     }
     #hsTable tbody tr.hs-new td {color: #ff0;}
     #hsTable tbody tr {
       cursor: pointer;
       transition: background-color 0.2s;
     }
     #hsTable tbody tr:hover {
       background-color: rgba(0, 255, 255, 0.15);
     }
     #hsNoRecord {
       color: #444;
       text-align: center;
       padding: 14px;
       font-size: clamp(24px, 2.2vw, 40px);
     }
     #hsBtns {
       display: flex;
       gap: 12px;
       justify-content: center;
       margin-top: 20px;
       flex-wrap: wrap;
     }
     .hs-btn {
       padding: 11px 20px;
       font-size: clamp(24px, 2.8vw, 40px);
       font-family: monospace;
       background: rgba(0, 100, 200, 0.3);
       color: #0ff;
       border: 2px solid #0ff;
       border-radius: 4px;
       cursor: pointer;
       letter-spacing: 1px;
       transition: background 0.15s, color 0.15s;
     }
     .hs-btn:hover, .hs-btn:active {
       background: #0ff;
       color: #000;
     }

     #viewScoresBtn {
       font-family: monospace;
       font-size: clamp(22px, 2vw, 40px);
       background: transparent;
       color: #0ff;
       border: 1px solid #0ff;
       padding: 3px 8px;
       border-radius: 3px;
       cursor: pointer;
       margin-left: 10px;
       vertical-align: middle;
       transition: background 0.12s, color 0.12s;
     }
     #viewScoresBtn:hover {
       background: #0ff;
       color: #000;
     }
    </style>
  </head>
  <body>
    <div id="gameContainer">
      <div id="statusPanel">
        <div id="turn">
          Turn <span id="statusStage">1</span>-<span id="statusTurn">1</span>
          |
          ENEMY  <span id="statusEnemyCount">1</span>
          |
          SCORE <span id="statusScore">100</span>
          |
          <button id="viewScoresBtn">▶ SCORES</button>
        </div>
        <div id="statusShip">
          Ship Shield <span id="statusShipShield">0</span>
          <div class="status-gauge"><div id="gaugeShipShield" class="status-gauge-fill"></div></div>
          |
          Energy <span id="statusShipEnergy">0</span>
          <div class="status-gauge"><div id="gaugeShipEnergy" class="status-gauge-fill"></div></div>
        </div>
        <div id="StatusBase">
          Base Shield <span id="statusBaseShield">0</span>
          <div class="status-gauge"><div id="gaugeBaseShield" class="status-gauge-fill"></div></div>
        </div>
        <div id="logStatus">COMMAND: AWAITING ORDERS</div>
      </div>
      
      <div id="gameWrapper">
        <div id="gameCanvas"></div>
        <div id="zoomUI">
          <button id="zoomIn">＋</button>
          <button id="zoomOut">－</button>
        </div>
      </div>
    </div>

    <div id="highScoreOverlay">
      <div id="hsPanel">
        <h2 id="hsResultMsg"></h2>
        <p id="hsFinalMsg"></p>
        <div class="hs-heading">▶ HIGH SCORES ◀</div>
        <div id="hsTableWrap">
          <table id="hsTable">
            <thead>
              <tr>
                <th></th>
                <th>RANK</th>
                <th>SCORE</th>
                <th>STAGE</th>
                <th>TURNS</th>
                <th>DATE</th>
              </tr>
            </thead>
            <tbody id="hsTableBody"></tbody>
          </table>
          <div id="hsNoRecord">--- NO RECORDS YET ---</div>
        </div>
        <div id="hsBtns">
          <button class="hs-btn" id="hsRestartBtn">▶ RESTART</button>
          <button class="hs-btn" id="hsCloseBtn">✕ CLOSE</button>
        </div>
      </div>
    </div>
    
    <script>
     // ---------------------------------------------------------
     // 設定・定数の定義
     // ---------------------------------------------------------
     const SYSTEM = {
       SCALE: 0.4,
       R_AREA: 300,
       SCORE: {
         INIT: 100,
         DESTROY_PENALTY: 50,
       },
       NEW_ENEMY_INTERVAL: 40,
       N_STAR: 15,
       N_ENEMY: 3,
       GUAGE: {
         W: 30,
         H: 3
       },
       TIMING: {
         BEAM_DUR: 500,
         TURN_DELAY: 500,
         TURN_MARGIN: 100  // ターン切り替え時の余韻
       }
     };
     SYSTEM.GAME_ID = Phaser.Utils.String.UUID();
     SYSTEM.PLAY_AREA_WIDTH = SYSTEM.R_AREA * 2 + 30;
     SYSTEM.PLAY_AREA_HEIGHT = SYSTEM.PLAY_AREA_WIDTH;
     SYSTEM.CENTER_X = SYSTEM.PLAY_AREA_WIDTH / 2;
     SYSTEM.CENTER_Y = SYSTEM.PLAY_AREA_HEIGHT / 2;

     const CAMERA = {
       ZOOM_MIN: 1.0,
       ZOOM_MAX: 4.0,
       STEP: 2.0
     };
     let CurZoom = 1.0;

     const OBJ_CONF = {
       PLAYER: {
         R: 30 * SYSTEM.SCALE,
         SHIELD_MAX: 1000,
         SPEED: 120 * SYSTEM.SCALE,

         ENERGY_MAX: 10000,
         ENERGY_MIN: 10,
         MOVE_COST_RATE: 0.3 / SYSTEM.SCALE,
       },
       BASE: {
         R: 30 * SYSTEM.SCALE,
         SHIELD_MAX: 5000,
         RECOVERY_RATE: 0.005,

         DOCKING_RANGE: 35 * SYSTEM.SCALE,
       },
       ENEMY: {
         R: 30 * SYSTEM.SCALE,
         SHIELD_MAX: 300,
         SPEED: 30 * SYSTEM.SCALE,
         RECOVERY_RATE: 0.01,

         FEAR_INIT: 0.5,
         FEAR_FACTOR: 0.2
       },
       STAR: {
         R: 16 * SYSTEM.SCALE,
       }
     };

     const WEAPON = {
       PLAYER: {
         POWER: 100,
         COST: 100,
       },
       ENEMY: {
         POWER: 80,
       },
       ALPHA: 0.0075 / SYSTEM.SCALE,
       EFFECTIVE_THRESHOLD: 0.4,
       MAX_THRESHOLD: 0.1
     };
     WEAPON.PLAYER.MAX_RANGE = Math.floor(
        -Math.log(WEAPON.MAX_THRESHOLD) / WEAPON.ALPHA
     );
     WEAPON.PLAYER.EFFECTIVE_RANGE = Math.floor(
        -Math.log(WEAPON.EFFECTIVE_THRESHOLD) / WEAPON.ALPHA
     );
     WEAPON.ENEMY.MAX_RANGE = Math.floor(
        -Math.log(WEAPON.MAX_THRESHOLD) / WEAPON.ALPHA
     );
     WEAPON.ENEMY.EFFECTIVE_RANGE = Math.floor(
        -Math.log(WEAPON.EFFECTIVE_THRESHOLD) / WEAPON.ALPHA
     );

     const HIGHSCORE = {
       MAX_ENTRIES: 5,
       STORAGE_KEY: 'starbaseDefenderScores'
     };

     let Player, StarBase, rangeGraphics, boundaryGraphics;
     let Enemies = [];
     let Stars = [];
     let turnCount = 1;
     let curStage = 1;
     let Score = SYSTEM.SCORE.INIT;
     let isPlayerTurn = true;
     let gameOver = false;
     let flagClear = false;
     let _pendingScene = null;
     let isDocked = false;     
     let currentScene = null;

     // ---------------------------------------------------------
     // グローバルメソッド
     // ---------------------------------------------------------
     /**
      *
      */
     function getActiveEnemyCount() {
       return Enemies.filter(enemy => enemy.active).length;
     } // getActiveEnemyCount()

     /**
      *
      */     
     function drawGauge(g, cx, cy, width, height, ratio, color) {
       g.clear();
       if ( !isFinite(cy) ) {
         return;
       }

       const x = cx - width / 2;
       const y = cy - height / 2;
       
       g.fillStyle(0x888888, 1);
       g.fillRect(x, y, width, height);
       
       const r = Math.max(0, Math.min(1, ratio));
       if (r > 0) {
         g.fillStyle(color, 1);
         g.fillRect(x, y, width * r, height);
       }
     } // drawGauge()

     /**
      *
      */
     function drawBoundary(){
       boundaryGraphics.clear();
       boundaryGraphics.lineStyle(2, 0x0088ff, 1);
       boundaryGraphics.strokeCircle(SYSTEM.CENTER_X, SYSTEM.CENTER_Y, SYSTEM.R_AREA);
     } // drawBoundary()

     /**
      *
      */
     function setLog(msg, fg="#0ff", bg="transparent") {
       const el = document.getElementById('logStatus')
       el.style.color = fg;
       el.style.backgroundColor = bg;
       el.textContent = msg;
     } // setLog()

     // ---------------------------------------------------------
     // クラス定義
     // ---------------------------------------------------------
     /**
      *
      */
     class GameObj {
       constructor(scene, x, y, texture, scale=SYSTEM.SCALE) {
         this.scene = scene;
         this.scale = scale;
         this.sprite = scene.add.image(x, y, texture).setScale(scale);
         this.active = true;
       }

       get x() {
         return this.sprite.x;
       }
       set x(val) {
         this.sprite.x = val;
       }

       get y() {
         return this.sprite.y;
       }
       set y(val) {
         this.sprite.y = val;
       }

       destroy() {
         this.sprite.destroy();
         this.active = false;
       }
     } // class GameObj

     /**
      *
      */
     class ObjWithShield extends GameObj {
       constructor(
         scene, x, y, texture,
         gauge_y, gauge_w, gauge_h,
         shield_max, gauge_color,
         scale=SYSTEM.SCALE
       ) {
         super(scene, x, y, texture, scale);
         this.shield_max = shield_max;
         this.shield = this.shield_max;
         this.gauge_color = gauge_color;
         this.gauge_y = gauge_y;
         this.gauge_w = gauge_w;
         this.gauge_h = gauge_h;
         this.gauge = this.scene.add.graphics();

         this.g_shield = this.scene.add.graphics();
       }

       updateGauge() {
         if (! this.active ) {
           if (this.guage) {
             this.gauge.clear();
             this.g_shield.clear();
           }
           return;
         }

         // update Shield circle
         const shield_ratio = this.shield / this.shield_max;
         const shield_color = 0xffffff;
         //console.log(`shield_color=${shield_color.toString(16)}`);
         this.g_shield.clear();
         this.g_shield.lineStyle(2 * shield_ratio, shield_color, 1);
         this.g_shield.strokeCircle(this.x, this.y, OBJ_CONF.PLAYER.R);

         drawGauge(
           this.gauge,
           this.x, this.y + (this.gauge_y * this.scale),
           this.gauge_w, this.gauge_h,
           this.shield / this.shield_max,
           this.gauge_color
         );
       }

       die() {
         this.shield = 0;
         this.active = false;
         if ( this.gauge ) {
           this.gauge.destroy();
         }
         if ( this.g_shield ) {
           this.g_shield.destroy();
         }
         this.destroy();
       }

       takeDamage(amount) {
         this.shield -= amount;
         if (this.shield <= 0) {
           Score -= SYSTEM.SCORE.DESTROY_PENALTY;
           this.die();
         }
       }       
     }
     
     /**
      *
      */
     class ObjWithEnergy extends ObjWithShield {
       constructor(
         scene, x, y, texture,
         gauge_y, gauge_w, gauge_h,
         shield_max, gauge_color,
         energy_max, energy_color,
         scale=SYSTEM.SCALE
       ) {
         super(scene, x, y, texture, gauge_y, gauge_w, gauge_h, shield_max, gauge_color, scale);
         this.energy_max = energy_max;
         this.g_energy_color = energy_color;

         this.energy = this.energy_max;
         this.g_energy = this.scene.add.graphics();
       }

       updateGauge() {
         super.updateGauge();
         drawGauge(
           this.g_energy,
           this.x, this.y + (this.gauge_y * this.scale) + this.gauge_h + 1,
           this.gauge_w, this.gauge_h,
           this.energy / this.energy_max,
           this.g_energy_color
         );         
       }
     }

     /**
      *
      */
     class Star extends GameObj {
       constructor(scene, x, y) {
         super(scene, x, y, 'starImg');
       }
     }

     /**
      *
      */
     class BaseStation extends ObjWithShield {
       constructor(scene, x, y) {
         super(
           scene, x, y, 'baseImg', 36,  SYSTEM.GUAGE.W, SYSTEM.GUAGE.H,
           OBJ_CONF.BASE.SHIELD_MAX, 0xffcc00
         );

         this.sprite.setDepth(100);
         this.gauge.setDepth(100);
       }
     }

     /**
      *
      */
     class Enemy extends ObjWithShield {
       constructor(scene, x, y) {
         super(
           scene, x, y, 'enemyImg',
           36, SYSTEM.GUAGE.W, SYSTEM.GUAGE.H,
           OBJ_CONF.ENEMY.SHIELD_MAX, 0xff3333
         );
         this.fear_mind = OBJ_CONF.ENEMY.FEAR_INIT;
       }
     }

     /**
      *
      */
     class PlayerShip extends ObjWithEnergy {
       constructor(scene, x, y) {
         super(
           scene, x, y, 'PlayerImg',
           36, SYSTEM.GUAGE.W, SYSTEM.GUAGE.H, 
           OBJ_CONF.PLAYER.SHIELD_MAX, 0xff00ff,
           OBJ_CONF.PLAYER.ENERGY_MAX, 0x44ffff,
         );
       }
     }

     // ---------------------------------------------------------
     // ゲーム(Phaser)初期化・ループ
     // ---------------------------------------------------------
     const config = {
       type: Phaser.AUTO,
       backgroundColor: '#0a0a2a',
       parent: 'gameCanvas',
       scale: {
         mode: Phaser.Scale.FIT,
         autoCenter: Phaser.Scale.CENTER_HORIZONTALLY,
         width: SYSTEM.PLAY_AREA_WIDTH,
         height: SYSTEM.PLAY_AREA_HEIGHT
       },
       scene: { preload, create, update }
     };

     new Phaser.Game(config);

     /**
      *
      */
     function preload(){
       const g = this.make.graphics({add:false});

       // PlayerShip
       //
       g.fillStyle(0x4488ff);
       g.fillRect(27,25,8,24);
       g.fillStyle(0x4488ff);
       g.fillRect(10,30,10,22);
       g.fillRect(40,30,10,22);
       g.fillStyle(0x4488ff);
       g.fillEllipse(30,17,35,30);
       g.generateTexture('PlayerImg',60,60);
       
       g.clear();

       // Enemy
       g.fillStyle(0x228822);
       g.beginPath();
       g.moveTo(31,57);
       g.lineTo(55,40);
       g.lineTo(55,20);
       g.lineTo(50,20);
       g.lineTo(50,32);
       g.lineTo(31,41);
       g.lineTo(30,41);
       g.lineTo(10,32);
       g.lineTo(10,20);
       g.lineTo(5,20);
       g.lineTo(5,25);
       g.lineTo(5,40);
       g.moveTo(30,57);
       g.fillPath();
       g.fillRect(26,10,8,35)
       g.fillEllipse(30,13,18,17);
       g.generateTexture('enemyImg',60,60);

       g.clear();

       // Base
       const base_color = 0x88ffff;
       g.fillStyle(0x0000,.3);
       g.fillCircle(30,30,30);
       g.fillStyle(base_color);
       g.fillEllipse(30,30,24,53);
       g.lineStyle(5, base_color ,1);
       g.strokeEllipse(30,30,48,25);
       g.generateTexture('baseImg',60,60);

       g.clear();

       // Star
       g.fillStyle(0xa0a0a0);
       g.fillCircle(25,25,16);
       g.generateTexture('starImg',50,50);

       g.destroy();
     }

     /**
      *
      */
     function create(){
       currentScene = this;
       rangeGraphics = this.add.graphics();
       boundaryGraphics = this.add.graphics();
       drawBoundary();
       
       StarBase = new BaseStation(this, SYSTEM.CENTER_X, SYSTEM.CENTER_Y);

       // Stars
       Stars = [];
       for(let i=0; i < SYSTEM.N_STAR; i++) {
         let p = getSafeRandPos(0.2, 0.8);
         Stars.push(new Star(this, p.x, p.y));
       }

       // Enemies
       Enemies = [];
       for(let i=0; i<SYSTEM.N_ENEMY; i++){
         let p = getSafeRandPos(0.6, 0.9);
         Enemies.push(new Enemy(this, p.x, p.y));
       }

       // Player Ship
       let pp = getSafeRandPos(0.1, 0.3);
       Player = new PlayerShip(this, pp.x, pp.y);

       // Camera
       this.cameras.main.setBounds(0, 0, SYSTEM.PLAY_AREA_WIDTH, SYSTEM.PLAY_AREA_HEIGHT);
       this.cameras.main.startFollow(Player.sprite, true, 0.08, 0.08);

       updateStatus();

       this.input.on('pointerdown', handlePointerDown, this);

       document.getElementById('zoomIn').onclick = () => changeZoom(this, CAMERA.STEP);
       document.getElementById('zoomOut').onclick = () => changeZoom(this, -CAMERA.STEP);

       this.input.on('wheel', (pointer, gameObjects, deltaX, deltaY, deltaZ) => {
         let zoomAmount = deltaY > 0 ? -CAMERA.STEP : CAMERA.STEP;
         changeZoom(this, zoomAmount);
       });

       //changeZoom(this, -1);
     }

     /**
      *
      */
     function changeZoom(scene, amount) {
       let nextZoom = 1.0;
       if ( amount > 0 ) {
         nextZoom = CurZoom * amount;
       }
       if ( amount < 0 ) {
         nextZoom = CurZoom / -amount;
       }
       CurZoom = Phaser.Math.Clamp(nextZoom, CAMERA.ZOOM_MIN, CAMERA.ZOOM_MAX);
       
       scene.tweens.add({
         targets: scene.cameras.main,
         zoom: CurZoom,
         duration: 150,
         ease: 'Sine.easeInOut'
       });
     }

     /**
      *
      */
     function update() {
       rangeGraphics.clear();

       // ドッキング状態
       rangeGraphics.lineStyle(1, 0x00ffff, 0.5);
       if ( isDocked ) {
         rangeGraphics.lineStyle(2, 0x00ffff, 1);
       }
       rangeGraphics.strokeCircle(StarBase.x, StarBase.y, OBJ_CONF.BASE.DOCKING_RANGE);

       // 射程範囲
       [Player, ...Enemies].forEach(
         (obj, i)=>{
           if(!obj.active) {
             return;
           }
           let color = (i===0) ? 0x4488ff : 0xff3333;
           if ( i == 0 ) {  
             rangeGraphics.lineStyle(1, color, 0.3);
             rangeGraphics.strokeCircle(obj.x, obj.y, WEAPON.PLAYER.MAX_RANGE);
             rangeGraphics.lineStyle(1, color, 0.5);
             rangeGraphics.strokeCircle(obj.x, obj.y, WEAPON.PLAYER.EFFECTIVE_RANGE);
           } else {
             rangeGraphics.lineStyle(1, color, 0.5);
             rangeGraphics.strokeCircle(obj.x, obj.y, WEAPON.ENEMY.EFFECTIVE_RANGE);
           }
         }
       ); // forEach()

       if (Player) {
         Player.updateGauge();
       }
       if (StarBase) {
         StarBase.updateGauge();
       }
       Enemies.forEach(e => e.updateGauge());
     } // update()

     /**
      *
      */
     function getSafeRandPos(minDist, maxDist){
       let x, y, distToCenter;
       let safe = false;
       let attempts = 0;
       
       // オブジェクト同士が重ならないための最低距離（旧 INIT_POS_DISTANCE 相当）
       // 自機の半径(30)の2倍 = 60
       const MIN_SPAWN_DIST = OBJ_CONF.PLAYER.R * 2;
       
       while(!safe && attempts < 100) {
         x = Phaser.Math.Between(
           SYSTEM.CENTER_X - SYSTEM.R_AREA, SYSTEM.CENTER_X + SYSTEM.R_AREA
         );
         y = Phaser.Math.Between(
           SYSTEM.CENTER_Y - SYSTEM.R_AREA, SYSTEM.CENTER_Y + SYSTEM.R_AREA
         );
         distToCenter = Phaser.Math.Distance.Between(x, y, SYSTEM.CENTER_X, SYSTEM.CENTER_Y);
         
         if ( distToCenter < SYSTEM.R_AREA * minDist ) {
           continue;
         }
         if ( distToCenter > SYSTEM.R_AREA * maxDist ) {
           continue;
         }
         
         safe = true;

         for(let s of Stars) {
           if (
             s.active && Phaser.Math.Distance.Between(x, y, s.x, s.y) < MIN_SPAWN_DIST
           ) {
             safe = false;
             break;
           }
         }
         if(!safe) continue;

         for(let e of Enemies) {
           if (
             e.active && Phaser.Math.Distance.Between(x, y, e.x, e.y) < MIN_SPAWN_DIST
           ) {
             safe = false; break;
           }
         }
         attempts++;
       }
       return { x, y };
     }

     function hasObstacleOnPath(ax,ay,bx,by,cx,cy,r) {
       const dx = bx - ax, dy = by - ay;
       const a = dx * dx + dy * dy;
       if (a < 0.001) {
         return false;
       }
       const fx = ax - cx, fy = ay - cy;
       const b = 2*(fx * dx + fy * dy);
       const c = fx*fx + fy*fy - r*r;
       const disc = b*b-4*a*c;
       if ( disc < 0 ) {
         return false;
       }
       const t1 = (-b-Math.sqrt(disc)) / (2*a);
       const t2 = (-b+Math.sqrt(disc)) / (2*a);

       return (t1 > 0.05 && t1 < 0.95) || (t2 > 0.05 && t2 < 0.95);
     }

     /**
      * LOS(Line of Sight、射線)がブロックされてないか？
      */
     function isLOSBlocked(srcObj, targetObj, checkBase = true) {
       // 1. 星（障害物）による遮蔽の判定
       let hitStar = Stars.some(s => 
         s.active && hasObstacleOnPath(
           srcObj.x, srcObj.y, targetObj.x, targetObj.y, s.x, s.y, OBJ_CONF.STAR.R
         )
       );
       if (hitStar) return true;

       // 2. 基地による遮蔽の判定（基地の見た目のサイズで正確に判定）
       if (checkBase && StarBase && StarBase.active && StarBase.shield > 0) {
         if (hasObstacleOnPath(
           srcObj.x, srcObj.y, targetObj.x, targetObj.y, StarBase.x, StarBase.y, OBJ_CONF.BASE.R
         )) {
           return true;
         }
       }
       return false;
     } // isLOSBlocked()

     /**
      *
      */
     function handlePointerDown(pointer) {
       if (gameOver || !isPlayerTurn) return;

       // 1. 判定対象をまとめ、クリックされたオブジェクトを特定
       // 配列の先頭から評価されるため、重なっている場合は Enemies が優先される
       const clickables = [...Enemies, StarBase, Player];
       const clickedObj = clickables.find(e => {
         if (!e || !e.active) return false;
         // クラスやオブジェクトの種類に応じて半径を決定
         //
         // XXX ToDo: もっと美しくできる。
         //   ここでは、星か星以外かしかみていない。
         //   各クラスのインスタンス変数にすべき
         const r = (e instanceof Star) ? OBJ_CONF.STAR.R : OBJ_CONF.PLAYER.R;
         return Phaser.Math.Distance.Between(pointer.worldX, pointer.worldY, e.x, e.y) < r;
       });
       if ( clickedObj ) {
         console.log(`clickedObj=${clickedObj.constructor.name}`);
       }

       // ターン終了の共通処理
       const endTurn = () => {
         isPlayerTurn = false;

         this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
         updateStatus();
       };

       // 2. オブジェクトに応じたアクションの分岐
       // クラス定義やインスタンスを利用してスッキリと切り分ける
       if (clickedObj === StarBase) {
         // --- 基地に対するアクション ---
         if (isDocked) {
           setLog("StarBase> Currently docking");
           endTurn();
           return;
         }

         const distToBase = Phaser.Math.Distance.Between(Player.x, Player.y, StarBase.x, StarBase.y);
         console.log(`distToBase=${distToBase}`);
         if (distToBase <= OBJ_CONF.BASE.DOCKING_RANGE) {
           dockShip(this);
           endTurn();
         } else {
           attemptPlayerMove(this, StarBase.x, StarBase.y, SYSTEM.TIMING.TURN_DELAY);
         }

       } else if (clickedObj instanceof Enemy) {
         // --- 敵に対するアクション ---
         if (isDocked) {
           setLog("Tactical Officer> All weapons are deactivated", "#ff0", "#a00");
           return;
         }

         if (Player.energy < WEAPON.PLAYER.COST) {
           setLog("Chief Engineer> LOW ENERGY", "#000", "#a00");
           return;
         }

         Player.energy -= WEAPON.PLAYER.COST;
         const dist = Phaser.Math.Distance.Between(
           Player.x, Player.y, clickedObj.x, clickedObj.y
         );
         const hitChance = Math.exp(-WEAPON.ALPHA * dist);

         if (hitChance < WEAPON.MAX_THRESHOLD) {
           setLog("Tactical Officer> OUT OF RANGE", "#ff0", "#a00");
           fireBeam(this, Player, clickedObj, 0x444444);
           endTurn();
           return;
         }

         if (isLOSBlocked(Player, clickedObj, false)) {
           setLog("Tactical Officer> BLOCKED 1", "#ff0", "#a00");
           fireBeam(this, Player, clickedObj, 0x444444);
           endTurn();
           return;
         }

         setLog("Tactical Officer> HIT THE ENEMY !", "#0ff", "#000");
         const damage = Math.floor(WEAPON.PLAYER.POWER * hitChance);
         clickedObj.takeDamage(damage);
         fireBeam(this, Player, clickedObj, 0x00ffff);

         if (!clickedObj.active) {
           Enemies = Enemies.filter(e => e !== clickedObj);
           const rp = getSafeRandPos(0.8, 0.95);
           Enemies.push(new Enemy(this, rp.x, rp.y));
           setLog("Tactical Officer> ENEMY SHOT DOWN — REINFORCEMENT INCOMING!");
         }
         endTurn();
       } else if (clickedObj === Player) {
         // --- 自機のシールド強化
         const d_shield = Player.shield_max - Player.shield;
         console.log(`d_shield=${d_shield}, Player.energe=${Player.energy}`);
         if ( d_shield <= 0 ) {
           setLog("Chief Engineer> SHIELD IS MAX", "#0f0", "#024");
           return;
         }

         // d_shileld > 0
         const energy_supply = Math.min(Player.energy - OBJ_CONF.PLAYER.ENERGY_MIN, d_shield);
         console.log(`energy_supply=${energy_supply}`);
         if ( energy_supply <= 0 ) {
           setLog("Chief Engineer> LOW ENERGY");
           return;
         }

         Player.energy -= energy_supply;
         Player.shield += energy_supply;
         console.log(`energy=${Player.energy}, shield=${Player.shield}`)

         const shiled_p = Math.floor(Player.shield / Player.shield_max * 100);
         setLog(`Chief Engineer> SHIELD=${shiled_p}%, ENERGY=${Player.energy}`);
         endTurn();
       } else {
         // --- 空間に対するアクション（移動） ---
         attemptPlayerMove(this, pointer.worldX, pointer.worldY, SYSTEM.TIMING.TURN_DELAY);

         if (Player.energy < OBJ_CONF.PLAYER.ENERGY_MIN && !isDocked) {
           updateStatus();
           gameOverMessage("OUT OF ENERGY ..");
         }
       }
     } // handlePointerDown()

     /**
      *
      */
     function clampDestToAvoidCharacters(obj, destX, destY, isEnemy = false) {
       const R = OBJ_CONF.PLAYER.R + OBJ_CONF.ENEMY.R;
       // オブジェクトから直接現在座標を取得
       const startX = obj.x;
       const startY = obj.y;

       const targets = [];
       // self を obj に置換
       if (Player && Player !== obj && Player.active) targets.push(Player);
       if (isEnemy && StarBase && StarBase !== obj && StarBase.active && StarBase.shield > 0) {
         targets.push(StarBase);
       }
       Enemies.forEach(e => { if (e && e !== obj && e.active) targets.push(e); });

       const dx = destX - startX;
       const dy = destY - startY;
       const lenSq = dx * dx + dy * dy;
       if (lenSq < 0.0001) return { x: destX, y: destY };

       let minT = 1.0; 

       for (const tgt of targets) {
         const curDist = Phaser.Math.Distance.Between(startX, startY, tgt.x, tgt.y);
         if (curDist < R) continue;

         const fx = startX - tgt.x;
         const fy = startY - tgt.y;
         const a = lenSq;
         const b = 2 * (fx * dx + fy * dy);
         const c = fx * fx + fy * fy - R * R;
         const disc = b * b - 4 * a * c;
         if (disc < 0) continue; 
         const t = (-b - Math.sqrt(disc)) / (2 * a);
         if (t > 0 && t < minT) minT = t;
       } 

       if (minT < 1.0) {
         const len = Math.sqrt(lenSq);
         const stopT = Math.max(0, minT - 1.0 / len);
         return { x: startX + dx * stopT, y: startY + dy * stopT };
       }
       return { x: destX, y: destY };
     } // clampDestToAvoidCharacters(..)

     /**
      *
      */
     function isMoveForbidden(obj, destX, destY) {
       const startX = obj.x;
       const startY = obj.y;

       return Stars.some(s => {
         if (!s.active) return false;
         if (Phaser.Math.Distance.Between(destX, destY, s.x, s.y) <= OBJ_CONF.STAR.R) {
           return true;
         }
         return hasObstacleOnPath(startX, startY, destX, destY, s.x, s.y, OBJ_CONF.STAR.R);
       });
     } // isMoveForbidden(..)

     /**
      * 進行方向がブロックされている場合、少しずつ角度をずらして
      * 「とにかく一番遠くまで進めるルート」を確実に見つけ出す関数
      */
     function resolveMovement(obj, desiredX, desiredY, speed) {
       // オブジェクトから直接現在座標を取得
       const x = obj.x;
       const y = obj.y;
       
       let dx = desiredX - x;
       let dy = desiredY - y;
       let angle = Math.atan2(dy, dx);
       
       // 0度(直進)から始まり、左右に15度ずつ、最大180度(真後ろ)まで走査
       let anglesToTest = [0];
       for (let i = 15; i <= 180; i += 15) {
         anglesToTest.push((i * Math.PI) / 180);
         anglesToTest.push((-i * Math.PI) / 180);
       }
       
       let bestDest = { x: x, y: y };
       let maxDistSq = -1;
       
       for (let offset of anglesToTest) {
         let testAngle = angle + offset;
         let testDestX = x + Math.cos(testAngle) * speed;
         let testDestY = y + Math.sin(testAngle) * speed;
         
         // 1. 星などの固定障害物を貫通しないかチェック
         if (isMoveForbidden(obj, testDestX, testDestY, true)) {
           continue; 
         }
         
         // 2. 他のキャラクターとの衝突を計算し、ぶつかる直前の座標を取得 (self -> obj)
         let clamped = clampDestToAvoidCharacters(obj, testDestX, testDestY, true);
         
         // 実際に進める距離の2乗
         let distSq = (clamped.x - x)**2 + (clamped.y - y)**2;
         
         // スピードの80%以上進めるなら、そのルートを即採用 (十分な空きがある)
         if (distSq >= (speed * 0.8)**2) {
           return clamped;
         }
         
         // 最もマシ（一番遠くまで逃げられる）ルートを記録しておく
         if (distSq > maxDistSq) {
           maxDistSq = distSq;
           bestDest = clamped;
         }
       }
       return bestDest;
     } //  resolveMovement(..)

     /**
      *
      */
     function dockShip(scene) {
       isDocked = true;
       Player.energy = OBJ_CONF.PLAYER.ENERGY_MAX;
       Player.shield = OBJ_CONF.PLAYER.SHIELD_MAX;
       scene.tweens.add({
         targets: Player,
         x: StarBase.x, y: StarBase.y,
         duration: 200,
         ease: 'Sine.easeInOut'
       });
       setLog("StarBase> DOCKED — ENERGY FULL", "#220", "#0ff");
       updateStatus();
     } // dockShip()

     /**
      *
      */
     function attemptPlayerMove(scene, targetX, targetY, delayBeforeEnemyTurn) {
       let rawDist = Phaser.Math.Distance.Between(Player.x, Player.y, targetX, targetY);
       if (rawDist < 1) return;

       let moveDist = Math.min(rawDist, OBJ_CONF.PLAYER.SPEED);
       let ratio = moveDist / rawDist;
       let destX = Player.x + (targetX - Player.x) * ratio;
       let destY = Player.y + (targetY - Player.y) * ratio;

       let target_is_base = false;
       let dist_target_base = Phaser.Math.Distance.Between(
         targetX, targetY, StarBase.x, StarBase.y
       );
       if ( dist_target_base <= OBJ_CONF.BASE.DOCKING_RANGE ) {
         target_is_base = true;
       }

       const clamped = clampDestToAvoidCharacters(Player, destX, destY, false);
       destX = clamped.x;
       destY = clamped.y;
       let distance = Phaser.Math.Distance.Between(Player.x, Player.y, destX, destY);

       if ( isMoveForbidden(Player, destX, destY) ) {
         setLog("BLOCKED 2");
         return;
       }
       setLog("Chief Pilot> IMPULSE ENGIN START");

       let skipAutoDock = false;
       if (isDocked) {
         isDocked = false;
         skipAutoDock = true;
         Player.shield = OBJ_CONF.PLAYER.SHIELD_MAX;
         setLog("StarBase> UNDOCKED");
         updateStatus();
       }

       const actualDist = Phaser.Math.Distance.Between(Player.x, Player.y, destX, destY);
       let cost = Math.max(1, Math.ceil(actualDist * OBJ_CONF.PLAYER.MOVE_COST_RATE));
       if ( Player.energy - cost <= OBJ_CONF.PLAYER.ENERGY_MIN ) {
         if ( target_is_base ) {
           gameOverMessage("NO ENERGY TO CONTINUE");
           return;
         }
         setLog("NOT ENOUGH ENERGY");
         return;
       }

       Player.energy -= cost;
       isPlayerTurn = false;
       scene.tweens.add({
         targets: Player,
         x: destX, y: destY,
         duration: SYSTEM.TIMING.TURN_DELAY,
         onComplete: () => {
           if (!skipAutoDock) {
             const dockDist = Phaser.Math.Distance.Between(Player.x, Player.y, StarBase.x, StarBase.y);
             if (
               !isDocked && dockDist <= OBJ_CONF.BASE.DOCKING_RANGE
               && StarBase.active && StarBase.shield > 0
               && target_is_base
             ) {
               dockShip(scene);
               scene.time.delayedCall(220, () =>
                 scene.time.delayedCall(delayBeforeEnemyTurn, () => enemyTurn(scene)));
               return;
             }
           }
           scene.time.delayedCall(delayBeforeEnemyTurn, () => enemyTurn(scene));
         }
       });
       updateStatus();
     } // attemptPlayerMove(scene, targetX, targetY, delayBeforeEnemyTurn) {

     /**
      *
      */
     function calcDest(e, target, isFleeing = false) {
       let dirX = 0, dirY = 0;

       // 1. ターゲットへのベクトル（引力 / 斥力）
       if (isFleeing && Array.isArray(target)) {
         // 複数の脅威（自機と基地）から遠ざかるベクトルを合成
         target.forEach(t => {
           let dx = e.x - t.x;
           let dy = e.y - t.y;
           let dist = Math.sqrt(dx * dx + dy * dy);
           if (dist > 0.001) {
             let weight = 1.0 / dist;
             dirX += (dx / dist) * weight;
             dirY += (dy / dist) * weight;
           }
         });
         let fDist = Math.sqrt(dirX * dirX + dirY * dirY);
         if (fDist > 0.001) {
           dirX /= fDist;
           dirY /= fDist;
         }
       } else {
         // 通常の追従または単一ターゲットからの退却
         let targetDx = target.x - e.x;
         let targetDy = target.y - e.y;
         if (isFleeing) {
           targetDx = -targetDx;
           targetDy = -targetDy;
         }
         let targetDist = Math.sqrt(targetDx * targetDx + targetDy * targetDy);
         if (targetDist > 0.001) {
           dirX = targetDx / targetDist;
           dirY = targetDy / targetDist;
         }
       }

       // 2. 障害物(星)からの反発力 + 回り込み力
       let avoidX = 0, avoidY = 0;
       const STAR_AVOID_RADIUS = OBJ_CONF.STAR.R * 3.5;
       Stars.forEach(s => {
         if (!s.active) return;
         let dx = e.x - s.x;
         let dy = e.y - s.y;
         let dist = Math.sqrt(dx * dx + dy * dy);
         if (dist > 0 && dist < STAR_AVOID_RADIUS) {
           let force = 1.0 - (dist / STAR_AVOID_RADIUS);
           avoidX += (dx / dist) * force * 1.5 - (dy / dist) * force * 1.0;
           avoidY += (dy / dist) * force * 1.5 + (dx / dist) * force * 1.0;
         }
       });

       // 3. 他の敵からの反発力（分離）
       let sepX = 0, sepY = 0;
       const ENEMY_AVOID_RADIUS = OBJ_CONF.ENEMY.R * 2.5;
       Enemies.forEach(other => {
         if (!other.active || other === e) return;
         let dx = e.x - other.x;
         let dy = e.y - other.y;
         let dist = Math.sqrt(dx * dx + dy * dy);
         if (dist > 0 && dist < ENEMY_AVOID_RADIUS) {
           let force = 1.0 - (dist / ENEMY_AVOID_RADIUS);
           sepX += (dx / dist) * force * 2.0;
           sepY += (dy / dist) * force * 2.0;
         }
       });
       
       // 4. ベクトルを合成
       let finalX = dirX * 1.0 + avoidX + sepX;
       let finalY = dirY * 1.0 + avoidY + sepY;

       let finalDist = Math.sqrt(finalX * finalX + finalY * finalY);
       
       // ★追加: もし全方向からの力が完璧に釣り合ってゼロになってしまった場合（完全なスタック）
       // ランダムな方向に微小な力を与えて均衡を崩し、その場にとどまるのを防ぐ
       if (finalDist < 0.001) {
         let randomAngle = Math.random() * Math.PI * 2;
         finalX = Math.cos(randomAngle);
         finalY = Math.sin(randomAngle);
         finalDist = 1.0;
       }

       finalX = (finalX / finalDist) * OBJ_CONF.ENEMY.SPEED;
       finalY = (finalY / finalDist) * OBJ_CONF.ENEMY.SPEED;

       let desiredX = e.x + finalX;
       let desiredY = e.y + finalY;

       // ★変更: 単純なクランプではなく、ルート走査による回避解決を適用
       return resolveMovement(e, desiredX, desiredY, OBJ_CONF.ENEMY.SPEED);
     } // calcDest(e, target, isFleeing = false)

     /**
      *
      */
     function fireBeam(scene, srcObj, targetObj, color) {
       const beam = scene.add.graphics();
       beam.lineStyle(4, color, 1);
       beam.lineBetween(srcObj.x, srcObj.y, targetObj.x, targetObj.y);
       scene.time.delayedCall(SYSTEM.TIMING.BEAM_DUR, () => beam.destroy());
     } // fireBeam(..)

     // ---------------------------------------------------------
     // 敵ターンの処理
     // ---------------------------------------------------------
     /**
      * 1. 敵ターン全体の制御（エントリーポイント）
      */
     function enemyTurn(scene) {
       if (gameOver) return;

       // 各敵の行動を処理
       Enemies.forEach(enemy => {
         scene.time.delayedCall(0, () => executeEnemyAction(scene, enemy));
       });

       // 敵フェーズ終了後の処理（次ターン準備）
       const totalDelay = SYSTEM.TIMING.TURN_DELAY + SYSTEM.TIMING.TURN_MARGIN;
       scene.time.delayedCall(totalDelay, () => finalizeEnemyTurn(scene));
     }

     /**
      * 2. 敵1体の具体的な行動（思考と実行）
      */
     function executeEnemyAction(scene, enemy) {
       if (gameOver || !enemy.active) return;

       updateEnemyFear(enemy);

       // 状況を評価し、コンテキスト（距離や攻撃可能フラグなど）を取得
       const context = evaluateTacticalSituation(enemy);

       // 評価結果に基づいてアクションを分岐
       if (context.canAttackBase) {
         attackTarget(scene, enemy, StarBase, context.distToBase, "BASE DESTROYED");
       } else if (context.canAttackPlayer) {
         attackTarget(scene, enemy, Player, context.distToPlayer, "ENTERPRISE DESTROYED");
       } else {
         moveEnemy(scene, enemy, context);
       }
     }

     /**
      * 3. 恐怖度の更新
      */
     function updateEnemyFear(enemy) {
       const new_fear = Phaser.Math.FloatBetween(0.2, 0.8);
       const fear_factor = OBJ_CONF.ENEMY.FEAR_FACTOR;
       enemy.fear_mind = enemy.fear_mind * (1 - fear_factor) + new_fear * fear_factor;
     }

     /**
      * 4. 戦況の評価（距離計算、攻撃可否、逃走判断）
      */
     function evaluateTacticalSituation(enemy) {
       const distToBase = Phaser.Math.Distance.Between(enemy.x, enemy.y, StarBase.x, StarBase.y);
       const distToPlayer = Phaser.Math.Distance.Between(enemy.x, enemy.y, Player.x, Player.y);

       // 攻撃の前提条件 (シールド50%以上)
       const hasEnoughShieldToAttack = enemy.shield >= (OBJ_CONF.ENEMY.SHIELD_MAX * 0.5);

       // プレイヤーへの攻撃可否
       const isPlayerInRange = distToPlayer <= WEAPON.ENEMY.EFFECTIVE_RANGE;
       const canAttackPlayer = hasEnoughShieldToAttack && 
                               !isDocked && 
                               isPlayerInRange && 
                               !isLOSBlocked(enemy, Player);

       // 基地への攻撃可否 (プレイヤーがドック中なら、射程判定を緩和)
       const isBaseInRange = distToBase <= WEAPON.ENEMY.EFFECTIVE_RANGE || 
                             (isDocked && isPlayerInRange);
       const canAttackBase = hasEnoughShieldToAttack && 
                             StarBase.active && 
                             StarBase.shield > 0 && 
                             isBaseInRange && 
                             !isLOSBlocked(enemy, StarBase, false);

       // 逃走判断 (恐怖心がシールド残量割合を上回った場合)
       const isFleeing = enemy.fear_mind > (enemy.shield / OBJ_CONF.ENEMY.SHIELD_MAX);

       return { distToBase, distToPlayer, canAttackBase, canAttackPlayer, isFleeing };
     }

     /**
      * 5. 攻撃処理（重複コードの統合）
      */
     function attackTarget(scene, enemy, target, distance, gameOverMsg) {
       fireBeam(scene, enemy, target, 0xff00ff);
       
       const target_damage = Math.floor(WEAPON.ENEMY.POWER * Math.exp(-WEAPON.ALPHA * distance));
       target.takeDamage(target_damage);

       if (target.shield <= 0 && !gameOver) {
         updateStatus();
         gameOverMessage(gameOverMsg);
       }
     }

     /**
      * 6. 移動処理とシールド回復
      */
     function moveEnemy(scene, enemy, context) {
       let targetDest;

       if (context.isFleeing) {
         // プレイヤーと基地の両方から逃げる
         targetDest = [
           { x: Player.x, y: Player.y },
           { x: StarBase.x, y: StarBase.y }
         ];
       } else {
         // より近い方を追跡する
         targetDest = (context.distToBase < context.distToPlayer) 
                    ? { x: StarBase.x, y: StarBase.y } 
                    : { x: Player.x, y: Player.y };
       }

       const dest = calcDest(enemy, targetDest, context.isFleeing);

       scene.tweens.add({
         targets: enemy,
         x: dest.x, y: dest.y,
         duration: SYSTEM.TIMING.TURN_DELAY,
         onComplete: () => {
           const distFromCenter = Phaser.Math.Distance.Between(enemy.x, enemy.y, SYSTEM.CENTER_X, SYSTEM.CENTER_Y);
           if (distFromCenter > SYSTEM.R_AREA) {
             enemy.die(); // 領域外へ出たら消滅
           }
         }
       });

       enemy.x = Math.floor(enemy.x);
       enemy.y = Math.floor(enemy.y);

       // 移動した場合はシールドを回復する
       enemy.shield = Math.min(
         OBJ_CONF.ENEMY.SHIELD_MAX,
         enemy.shield + (OBJ_CONF.ENEMY.SHIELD_MAX * OBJ_CONF.ENEMY.RECOVERY_RATE)
       );
     }

     /**
      * 7. ターン終了処理と次ターンへの準備
      */
     function finalizeEnemyTurn(scene) {
       Enemies = Enemies.filter(e => e.active);
       
       if (Enemies.length === 0 && !gameOver) {
         nextStage(scene);
       } else if (!gameOver) {
         turnCount++;
         Score--;

         // 増援の出現
         if (turnCount % SYSTEM.NEW_ENEMY_INTERVAL === 0) {
           const p = getSafeRandPos(0.8, 0.95);
           Enemies.push(new Enemy(scene, p.x, p.y));
         }

         // 基地の回復
         if ( StarBase.shield < OBJ_CONF.BASE.SHIELD_MAX ) {
           const prev_starbase_shield = StarBase.shield;
           StarBase.shield = Math.floor(Math.min(
             OBJ_CONF.BASE.SHIELD_MAX,
             StarBase.shield + (OBJ_CONF.BASE.SHIELD_MAX * OBJ_CONF.BASE.RECOVERY_RATE)
           ));
           console.log(`StarBase: ${prev_starbase_shield} --> ${StarBase.shield}`);
         }

         updateStatus(); 
         isPlayerTurn = true;
       }
     }

     /**
      *
      */
     function updateStatus() {
       const PlayerEnergy = Player.energy > 0 ? Player.energy : 0;
       const PlayerShield = Player.shield > 0 ? Player.shield : 0;
       const baseShield = StarBase.shield > 0 ? StarBase.shield : 0;
       const enemyCount = getActiveEnemyCount();

       document.getElementById('statusTurn').textContent = `${turnCount}`;
       document.getElementById('statusStage').textContent = `${curStage}`;
       document.getElementById('statusEnemyCount').textContent = `${enemyCount}`;
       document.getElementById('statusScore').textContent = `${Score}`;

       // PlayerShip Shield
       let PlayerShieldRatio = PlayerShield / OBJ_CONF.PLAYER.SHIELD_MAX;
       let PlayerShieldColor = PlayerShieldRatio < 0.3 ? "#f00" : "#0f0";
       document.getElementById('statusShipShield').style.color = PlayerShieldColor;
       document.getElementById('statusShipShield').textContent = PlayerShield;
       document.getElementById('gaugeShipShield').style.width = (PlayerShieldRatio * 100) + '%';
       document.getElementById('gaugeShipShield').style.background = PlayerShieldColor;

       // PlayerShip Energy
       let energyRatio = PlayerEnergy / OBJ_CONF.PLAYER.ENERGY_MAX;
       let energyColor = energyRatio < 0.3 ? "#f00" : "#0f0";
       document.getElementById('statusShipEnergy').style.color = energyColor;
       document.getElementById('statusShipEnergy').textContent = PlayerEnergy;
       document.getElementById('gaugeShipEnergy').style.width = (energyRatio * 100) + '%';
       document.getElementById('gaugeShipEnergy').style.background = energyColor;

       // Base Shield
       let baseShieldRatio = baseShield / OBJ_CONF.BASE.SHIELD_MAX;
       let baseShieldColor = baseShieldRatio < 0.3 ? "#f00" : "#0f0";
       document.getElementById('statusBaseShield').style.color = baseShieldColor;
       document.getElementById('statusBaseShield').textContent = baseShield;
       document.getElementById('gaugeBaseShield').style.width = (baseShieldRatio * 100) + '%';
       document.getElementById('gaugeBaseShield').style.background = baseShieldColor;
     } // updateStatus()

     /**
      *
      */
     function nextStage(scene) {
       const clearedStage = curStage;
       let bonus = curStage * 100;
       if ( Score > 0 ) {
         bonus += Score;
       }
       console.log(`nextStage> bonus=${bonus}`);
       Score += bonus;

       const { list, newIdx } = saveHighScore(
         Score, turnCount, clearedStage, `STAGE ${clearedStage} CLEARED`, true
       );

       curStage++;
       SYSTEM.N_ENEMY++;
       isPlayerTurn = false;

       _pendingScene = scene;

       setLog(`STAGE ${clearedStage} CLEARED!`);
       showHighScoreOverlay('stageclear', { clearedStage, bonus, list, newIdx });
     } // nextStage()

     function gameOverMessage(msg, clear=false) {
       gameOver = true;
       flagClear = clear;
       isPlayerTurn = false;
       setLog(msg);
       setTimeout(() => showHighScoreOverlay('gameover', { msg }), 800);
     }

     function loadHighScores() {
       try {
         const raw = localStorage.getItem(HIGHSCORE.STORAGE_KEY);
         return raw ? JSON.parse(raw) : [];
       } catch (e) {
         return [];
       }
     }

     function saveHighScore(score, turns, stage, result, forceSave = false) {
       let list = loadHighScores();
       const now = new Date();
       const dateStr = [
         now.getFullYear(),
         String(now.getMonth() + 1).padStart(2, '0'),
         String(now.getDate()).padStart(2, '0')
       ].join('/');
       if ( flagClear || forceSave ) {
         list.push({
           score, turns, stage, result,
           gameid: SYSTEM.GAME_ID, date: dateStr, _new: true
         });
       }
       list.sort((a, b) => b.score - a.score);
       const newIdx = list.findIndex(s => s._new);
       list = list.slice(0, HIGHSCORE.MAX_ENTRIES);
       const madeIt = list.some(s => s._new);
       localStorage.setItem(
         HIGHSCORE.STORAGE_KEY,
         JSON.stringify(list.map(({ _new, ...rest }) => rest))
       );
       return { list, newIdx: madeIt ? newIdx : -1 };
     }

     function renderHSTable(list, newIdx) {
       const tbody  = document.getElementById('hsTableBody');
       const noRec  = document.getElementById('hsNoRecord');
       tbody.innerHTML = '';
       if (!list || list.length === 0) {
         noRec.style.display = 'block';
         return;
       }
       noRec.style.display = 'none';
       const rankLabels = ['1ST', '2ND', '3RD', '4TH', '5TH'];
       list.forEach((s, i) => {
         const tr = document.createElement('tr');
         const thisGame = (s.gameid == SYSTEM.GAME_ID);
         if ( thisGame ) {
           tr.className = 'hs-new';
         }
         const rank   = rankLabels[i] || `${i + 1}TH`;
         const prefix = thisGame ? '★' : '';
         const displayStage = s.stage !== undefined ? s.stage : '-';
         tr.innerHTML = `
           <td>${prefix}</td>
           <td>${rank}</td>
           <td>${s.score}</td>
           <td>${displayStage}</td>
           <td>${s.turns}</td>
           <td>${s.date}</td>
         `;
         
         // ★追加: 行をクリックした際の処理
         tr.addEventListener('click', () => {
           // スコアを引き継ぐ
           Score = s.score;
           // 記録されたステージの次からスタートする
           curStage = (s.stage !== undefined ? s.stage : 1) + 1;
           turnCount = 1;
           
           // 敵の初期生成数を、進行するステージに合わせて再計算
           // (初期値3 + ステージ進行分)
           SYSTEM.N_ENEMY = 3 + (curStage - 1);
           
           gameOver = false;
           flagClear = false;
           isPlayerTurn = true;
           _pendingScene = null;
           
           // オーバーレイを非表示にする
           document.getElementById('highScoreOverlay').style.display = 'none';
           
           // シーンを再起動
           if (currentScene) {
             currentScene.scene.restart();
           }
         });

         tbody.appendChild(tr);
       });
     } // renderHSTable()

     function showHighScoreOverlay(mode, data = {}) {
       const overlay    = document.getElementById('highScoreOverlay');
       const resultEl   = document.getElementById('hsResultMsg');
       const finalEl    = document.getElementById('hsFinalMsg');
       const closeBtn   = document.getElementById('hsCloseBtn');
       const restartBtn = document.getElementById('hsRestartBtn');

       if (mode === 'stageclear') {
         const { clearedStage, bonus, list, newIdx } = data;
         resultEl.style.color      = '#0f0';
         resultEl.textContent      = `✓ STAGE ${clearedStage} CLEARED!`;
         finalEl.textContent       = `TURNS:${turnCount}, STAGE BONUS:+${bonus}, SCORE: ${Score}`;
         renderHSTable(list, newIdx);
         closeBtn.style.display    = 'none';
         restartBtn.textContent    = '▶ NEXT STAGE';
         restartBtn.style.display  = 'inline-block';

       } else if (mode === 'gameover') {
         const { msg } = data;
         resultEl.style.color      = '#ff0';
         resultEl.textContent      = msg;
         finalEl.textContent       = `MISSION FAILED: SCORE: ${Score}  STAGE: ${curStage}  TURNS: ${turnCount}`;
         renderHSTable(loadHighScores(), -1);
         closeBtn.style.display    = 'none';
         restartBtn.textContent    = '▶ RESTART';
         restartBtn.style.display  = 'inline-block';

       } else {
         resultEl.style.color      = '#0ff';
         resultEl.textContent      = '▶ HIGH SCORES ◀';
         finalEl.textContent       = `NOW — SCORE: ${Score}   STAGE: ${curStage}   TURN: ${turnCount}`;
         renderHSTable(loadHighScores(), -1);
         closeBtn.style.display    = 'inline-block';
         restartBtn.textContent    = '▶ RESTART';
         restartBtn.style.display  = 'inline-block';
       }
       overlay.style.display = 'flex';
     }

     document.getElementById('viewScoresBtn').addEventListener('click', () => {
       showHighScoreOverlay('view');
     });
     document.getElementById('hsRestartBtn').addEventListener('click', () => {
       if (_pendingScene) {
         document.getElementById('highScoreOverlay').style.display = 'none';
         turnCount = 1;
         const s = _pendingScene;
         _pendingScene = null;
         isPlayerTurn = true;
         s.scene.restart();
       } else {
         location.reload();
       }
     });
     document.getElementById('hsCloseBtn').addEventListener('click', () => {
       document.getElementById('highScoreOverlay').style.display = 'none';
     });

    </script>
  </body>
</html>
