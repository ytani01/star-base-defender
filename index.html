<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>Starbase Defender</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
     body { margin:0; background:#000; padding:0; overflow:hidden; font-family: Arial, sans-serif; }
     #gameContainer { display: flex; flex-direction: column; height: 100vh; }
     
     #statusPanel {
       background:#111;
       color:#0ff;
       padding:15px;
       flex: 0 0 auto;
       border-bottom:2px solid #08f;
       overflow-y:auto;
       font-size: clamp(22px, 5vw, 40px); 
       font-family: monospace;
       line-height: 1.5;
     }
     #statusPanel div { margin: 8px 5px; }
     
     #gameWrapper { position: relative; flex: 1; min-height: 0; }
     #gameCanvas { width: 100%; height: 100%; }

     #zoomUI {
       position: absolute;
       top: 10px;
       left: 30px;
       display: flex;
       flex-direction: column;
       gap: 10px;
       z-index: 1000;
     }
     #zoomUI button {
       width: 100px;
       height: 100px;
       font-size: 48px;
       background: rgba(0, 136, 255, 0.5);
       color: #fff;
       border: 2px solid #0ff;
       border-radius: 8px;
       cursor: pointer;
       user-select: none;
     }
     #zoomUI button:active {
       background: rgba(0, 255, 255, 0.8);
       color: #000;
     }

     #highScoreOverlay {
       display: none;
       position: fixed;
       inset: 0;
       background: rgba(0, 0, 20, 0.93);
       z-index: 9999;
       align-items: center;
       justify-content: center;
       font-family: monospace;
     }
     #hsPanel {
       border: 2px solid #0ff;
       padding: 28px 32px;
       min-width: 500px;
       max-width: 800px;
       width: 92%;
       background: #080820;
       box-shadow: 0 0 40px rgba(0,255,255,0.3);
     }
     #hsResultMsg {
       text-align: center;
       font-size: clamp(24px, 5vw, 40px);
       letter-spacing: 3px;
       margin: 0 0 6px 0;
     }
     #hsFinalMsg {
       color: #8df;
       text-align: center;
       font-size: clamp(24px, 2.5vw, 40px);
       margin: 0 0 16px 0;
       padding-bottom: 14px;
       border-bottom: 1px solid rgba(0,255,255,0.25);
     }
     .hs-heading {
       color: #0ff;
       font-size: clamp(24px, 2.2vw, 40px);
       letter-spacing: 2px;
       margin-bottom: 8px;
     }
     #hsTableWrap {
       overflow-x: auto;
     }
     #hsTable {
       width: 100%;
       border-collapse: collapse;
       font-size: clamp(20px, 2.2vw, 40px);
       color: #9cf;
       min-width: 260px;
     }
     #hsTable th {
       color: #0ff;
       text-align: left;
       padding: 4px 6px;
       border-bottom: 1px solid rgba(0,255,255,0.3);
       letter-spacing: 1px;
       white-space: nowrap;
     }
     #hsTable td {
       padding: 6px 6px; white-space: nowrap;
     }
     #hsTable tbody tr.hs-new td {color: #ff0;}
     #hsNoRecord {
       color: #444;
       text-align: center;
       padding: 14px;
       font-size: clamp(24px, 2.2vw, 40px);
     }
     #hsBtns {
       display: flex;
       gap: 12px;
       justify-content: center;
       margin-top: 20px;
       flex-wrap: wrap;
     }
     .hs-btn {
       padding: 11px 20px;
       font-size: clamp(24px, 2.8vw, 40px);
       font-family: monospace;
       background: rgba(0, 100, 200, 0.3);
       color: #0ff;
       border: 2px solid #0ff;
       border-radius: 4px;
       cursor: pointer;
       letter-spacing: 1px;
       transition: background 0.15s, color 0.15s;
     }
     .hs-btn:hover, .hs-btn:active {
       background: #0ff;
       color: #000;
     }

     #viewScoresBtn {
       font-family: monospace;
       font-size: clamp(22px, 2vw, 40px);
       background: transparent;
       color: #0ff;
       border: 1px solid #0ff;
       padding: 3px 8px;
       border-radius: 3px;
       cursor: pointer;
       margin-left: 10px;
       vertical-align: middle;
       transition: background 0.12s, color 0.12s;
     }
     #viewScoresBtn:hover {
       background: #0ff;
       color: #000;
     }
    </style>
  </head>
  <body>
    <div id="gameContainer">
      <div id="statusPanel">
        <div id="turn">
          STAGE: <span id="statusStage">1</span>,
          TURN: <span id="statusTurn">1</span>,
          SCORE: <span id="statusScore">100</span>
          <button id="viewScoresBtn">▶ SCORES</button>
        </div>
        <div id="statusShip">
          Ship:
          Shield: <span id="statusShipShield">0</span>%,
          Energy: <span id="statusShipEnergy">0</span>
        </div>
        <div id="statusBase">
          Base:
          Shield: <span id="statusBaseShield">0</span>%
        </div>
        <div id="logStatus">COMMAND: AWAITING ORDERS</div>
      </div>
      
      <div id="gameWrapper">
        <div id="gameCanvas"></div>
        <div id="zoomUI">
          <button id="zoomIn">＋</button>
          <button id="zoomOut">－</button>
        </div>
      </div>
    </div>

    <div id="highScoreOverlay">
      <div id="hsPanel">
        <h2 id="hsResultMsg"></h2>
        <p id="hsFinalMsg"></p>
        <div class="hs-heading">▶ HIGH SCORES ◀</div>
        <div id="hsTableWrap">
          <table id="hsTable">
            <thead>
              <tr>
                <th>RANK</th>
                <th>SCORE</th>
                <th>STAGE</th>
                <th>TURNS</th>
                <th>DATE</th>
              </tr>
            </thead>
            <tbody id="hsTableBody"></tbody>
          </table>
          <div id="hsNoRecord">--- NO RECORDS YET ---</div>
        </div>
        <div id="hsBtns">
          <button class="hs-btn" id="hsRestartBtn">▶ RESTART</button>
          <button class="hs-btn" id="hsCloseBtn">✕ CLOSE</button>
        </div>
      </div>
    </div>
    
    <script>
     // ---------------------------------------------------------
     // 設定・定数の定義
     // ---------------------------------------------------------
     const SYSTEM = {
       SCORE: {
         INIT: 300,
         DESTROY_PENALTY: 50,
       },
       STAR_QTY: 15,
       ENEMY_QTY: 3,
       NEW_ENEMY_INTERVAL: 40,
       SCALE: 0.4,
       BOUNDS_RADIUS: 300,
       GUAGE: {
         W: 30,
         H: 4
       },
       TIMING: {
         BEAM_DUR: 500,
         TURN_DELAY: 500,
       }
     };
     SYSTEM.GAMEID = Phaser.Utils.String.UUID();
     SYSTEM.PLAY_AREA_WIDTH = SYSTEM.BOUNDS_RADIUS * 2 + 20;
     SYSTEM.PLAY_AREA_HEIGHT = SYSTEM.PLAY_AREA_WIDTH;
     SYSTEM.CENTER_X = SYSTEM.PLAY_AREA_WIDTH / 2;
     SYSTEM.CENTER_Y = SYSTEM.PLAY_AREA_HEIGHT / 2;

     const CAMERA = {
       ZOOM_MIN: 1.0,
       ZOOM_MAX: 4.0,
       STEP: 2.0
     };
     let CurZoom = 1.0;

     const OBJ_CONF = {
       PLAYER: {
         ENERGY_MAX: 3000,
         SHIELD_MAX: 1000,
         DOCK_RESTORE_ENERGY: 1500,
         MAX_MOVE_DIST: 120 * SYSTEM.SCALE,
         MOVE_COST_RATE: 0.2 / SYSTEM.SCALE
       },
       BASE: {
         SHIELD_MAX: 10000,
         DOCKING_RANGE: 35 * SYSTEM.SCALE
       },
       ENEMY: {
         SHIELD_MAX: 300,
         DAMAGE: 70,
         SPEED: 30 * SYSTEM.SCALE,
         STOP_DIST: 30 * SYSTEM.SCALE,
         REGEN: 0.02
       },
       COLLISION: {
         INIT_POS_DISTANCE: 60 * SYSTEM.SCALE,
         HIT_RADIUS: 30 * SYSTEM.SCALE,
         OBSTACLE_RADIUS: 24 * SYSTEM.SCALE,
         LOS_RADIUS: 16 * SYSTEM.SCALE,
         TOUCH_TOLERANCE: 80 * SYSTEM.SCALE
       }
     };

     const MECHANICS = {
       WEAPON: {
         PHASER_COST: 100,
         BASE_DAMAGE: 100,
         ALPHA: 0.0075 / SYSTEM.SCALE,
         EFFECTIVE_THRESHOLD: 0.5,
         MAX_THRESHOLD: 0.1
       }
     };
     MECHANICS.WEAPON.MAX_RANGE = Math.floor(
        -Math.log(MECHANICS.WEAPON.MAX_THRESHOLD) / MECHANICS.WEAPON.ALPHA
     );
     MECHANICS.WEAPON.EFFECTIVE_RANGE = Math.floor(
        -Math.log(MECHANICS.WEAPON.EFFECTIVE_THRESHOLD) / MECHANICS.WEAPON.ALPHA
     );

     const HIGHSCORE = {
       MAX_ENTRIES: 5,
       STORAGE_KEY: 'starbaseDefenderScores'
     };

     let ship, starBase, rangeGraphics, boundaryGraphics;
     let enemies = stars = [];
     let turnCount = 1;
     let currentStage = 1;
     let Score = SYSTEM.SCORE.INIT;
     let isPlayerTurn = true;
     let gameOver = false;
     let flagClear = false;
     let _pendingScene = null;
     let isDocked = false;     

     // ---------------------------------------------------------
     // クラス定義
     // ---------------------------------------------------------
     function drawGauge(graphics, cx, cy, width, height, ratio, color) {
       graphics.clear();
       if (!isFinite(cy)) return;

       const x = cx - width / 2;
       const y = cy - height / 2;
       
       graphics.fillStyle(0x555555, 1);
       graphics.fillRect(x, y, width, height);
       
       const r = Math.max(0, Math.min(1, ratio));
       if (r > 0) {
         graphics.fillStyle(color, 1);
         graphics.fillRect(x, y, width * r, height);
       }
     }

     class GameObject {
       constructor(scene, x, y, texture, scale=SYSTEM.SCALE) {
         this.scene = scene;
         this.scale = scale;
         this.sprite = scene.add.image(x, y, texture).setScale(scale);
         this.active = true;
       }

       get x() {
         return this.sprite.x;
       }
       set x(val) {
         this.sprite.x = val;
       }

       get y() {
         return this.sprite.y;
       }
       set y(val) {
         this.sprite.y = val;
       }

       destroy() {
         this.sprite.destroy();
         this.active = false;
       }
     }

     class ObjWithShield extends GameObject {
       constructor(
         scene, x, y, texture,
         gauge_y, gauge_w, gauge_h,
         shield_max, gauge_color,
         scale=SYSTEM.SCALE
       ) {
         super(scene, x, y, texture, scale);
         this.shield_max = shield_max;
         this.shield = this.shield_max;
         this.gauge_color = gauge_color;
         this.gauge_y = gauge_y;
         this.gauge_w = gauge_w;
         this.gauge_h = gauge_h;
         this.gauge = this.scene.add.graphics();
       }

       updateGauge() {
         if (! this.active ) {
           if (this.guage) {
             this.gauge.clear();
           }
           return;
         }

         drawGauge(
           this.gauge,
           this.x, this.y + (this.gauge_y * this.scale),
           this.gauge_w, this.gauge_h,
           this.shield / this.shield_max,
           this.gauge_color
         );
       }

       die() {
         this.shield = 0;
         this.active = false;
         if ( this.gauge ) {
           this.gauge.destroy();
         }
         this.destroy();
       }

       takeDamage(amount) {
         this.shield -= amount;
         if (this.shield <= 0) {
           Score -= SYSTEM.SCORE.DESTROY_PENALTY;
           this.die();
         }
       }       
     }
     
     class ObjWithEnergy extends ObjWithShield {
       constructor(
         scene, x, y, texture,
         gauge_y, gauge_w, gauge_h,
         shield_max, gauge_color,
         energy_max, e_gauge_color,
         scale=SYSTEM.SCALE
       ) {
         super(scene, x, y, texture, gauge_y, gauge_w, gauge_h, shield_max, gauge_color, scale);
         this.energy_max = energy_max;
         this.e_gauge_color = e_gauge_color;

         this.energy = this.energy_max;
         this.e_gauge = this.scene.add.graphics();
       }

       updateGauge() {
         super.updateGauge();
         drawGauge(
           this.e_gauge,
           this.x, this.y + (this.gauge_y * this.scale) + this.gauge_h + 1,
           this.gauge_w, this.gauge_h,
           this.energy / this.energy_max,
           this.e_gauge_color
         );         
       }
     }

     class Star extends GameObject {
       constructor(scene, x, y) {
         super(scene, x, y, 'starImg');
       }
     }

     class BaseStation extends ObjWithShield {
       constructor(scene, x, y) {
         super(
           scene, x, y, 'baseImg', 36,  SYSTEM.GUAGE.W, SYSTEM.GUAGE.H,
           OBJ_CONF.BASE.SHIELD_MAX, 0xffcc00
         );

         this.sprite.setDepth(100);
         this.gauge.setDepth(100);
       }
     }

     class Enemy extends ObjWithShield {
       constructor(scene, x, y) {
         super(
           scene, x, y, 'enemyImg', 31, SYSTEM.GUAGE.W, SYSTEM.GUAGE.H,
           OBJ_CONF.ENEMY.SHIELD_MAX, 0xff3333
         );
       }
     }

     class PlayerShip extends ObjWithEnergy {
       constructor(scene, x, y) {
         super(
           scene, x, y, 'shipImg',
           29, SYSTEM.GUAGE.W, SYSTEM.GUAGE.H, 
           OBJ_CONF.PLAYER.SHIELD_MAX, 0xff00ff,
           OBJ_CONF.PLAYER.ENERGY_MAX, 0x8888ff,
         );
       }
     }

     // ---------------------------------------------------------
     // ゲーム初期化・ループ
     // ---------------------------------------------------------

     const config = {
       type: Phaser.AUTO,
       backgroundColor: '#0a0a2a',
       parent: 'gameCanvas',
       scale: {
         mode: Phaser.Scale.FIT,
         autoCenter: Phaser.Scale.CENTER_BOTH,
         width: SYSTEM.PLAY_AREA_WIDTH,
         height: SYSTEM.PLAY_AREA_HEIGHT
       },
       scene: { preload, create, update }
     };

     new Phaser.Game(config);

     function preload(){
       const g = this.make.graphics({add:false});

       g.lineStyle(3, 0xff0000, 0.3);
       g.strokeCircle(25, 30, OBJ_CONF.COLLISION.HIT_RADIUS*2);

       g.fillStyle(0x5588ee);
       g.fillRect(22,25,6,20);
       
       g.fillStyle(0x4488ff);
       g.fillRect(10,30,8,20);
       g.fillRect(32,30,8,20);
       
       g.fillStyle(0xaabbff);
       g.fillEllipse(25,15,35,30);
       g.generateTexture('shipImg',50,60);
       
       g.clear();

       g.lineStyle(3, 0xff0000, 0.5);
       g.strokeCircle(25, 25, OBJ_CONF.COLLISION.HIT_RADIUS*2);

       g.fillStyle(0x228822);
       g.beginPath();
       g.moveTo(25,50);
       g.lineTo(50,35);
       g.lineTo(50,15);
       g.lineTo(25,35);
       g.lineTo(0,15);
       g.lineTo(0,35);
       g.fillPath();

       g.fillRect(21,5,8,35)
       g.fillEllipse(25,10,20,18);

       g.generateTexture('enemyImg',50,50);

       g.clear();

       g.fillStyle(0x99ffff);
       g.fillEllipse(30,30,30,55);
       g.lineStyle(6,0x99ffff,1);
       g.strokeEllipse(30,30,55,25);
       g.generateTexture('baseImg',60,60);

       g.clear();

       g.fillStyle(0x504040);
       g.fillCircle(25,25,16);
       g.generateTexture('starImg',50,50);

       g.destroy();
     }

     function create(){
       rangeGraphics = this.add.graphics();
       boundaryGraphics = this.add.graphics();
       drawBoundary();
       
       starBase = new BaseStation(this, SYSTEM.CENTER_X, SYSTEM.CENTER_Y);

       stars = [];
       for(let i=0; i < SYSTEM.STAR_QTY; i++) {
         let p = getSafeRandPos(0.2, 0.8);
         stars.push(new Star(this, p.x, p.y));
       }

       enemies = [];
       for(let i=0; i<SYSTEM.ENEMY_QTY; i++){
         let p = getSafeRandPos(0.6, 0.9);
         enemies.push(new Enemy(this, p.x, p.y));
       }

       let pp = getSafeRandPos(0.1, 0.3);
       ship = new PlayerShip(this, pp.x, pp.y);

       this.cameras.main.setBounds(0, 0, SYSTEM.PLAY_AREA_WIDTH, SYSTEM.PLAY_AREA_HEIGHT);
       this.cameras.main.startFollow(ship.sprite, true, 0.08, 0.08);

       updateStatus();

       this.input.on('pointerdown', handlePointerDown, this);

       document.getElementById('zoomIn').onclick = () => changeZoom(this, CAMERA.STEP);
       document.getElementById('zoomOut').onclick = () => changeZoom(this, -CAMERA.STEP);

       this.input.on('wheel', (pointer, gameObjects, deltaX, deltaY, deltaZ) => {
         let zoomAmount = deltaY > 0 ? -CAMERA.STEP : CAMERA.STEP;
         changeZoom(this, zoomAmount);
       });
     }

     function changeZoom(scene, amount) {
       let nextZoom = 1.0;
       if ( amount > 0 ) {
         nextZoom = CurZoom * amount;
       }
       if ( amount < 0 ) {
         nextZoom = CurZoom / -amount;
       }
       CurZoom = Phaser.Math.Clamp(nextZoom, CAMERA.ZOOM_MIN, CAMERA.ZOOM_MAX);
       
       scene.tweens.add({
         targets: scene.cameras.main,
         zoom: CurZoom,
         duration: 150,
         ease: 'Sine.easeInOut'
       });
     }

     function drawBoundary(){
       boundaryGraphics.clear();
       boundaryGraphics.lineStyle(2, 0x0088ff, 1);
       boundaryGraphics.strokeCircle(SYSTEM.CENTER_X, SYSTEM.CENTER_Y, SYSTEM.BOUNDS_RADIUS);
     }

     function update(){
       rangeGraphics.clear();

       rangeGraphics.lineStyle(1, 0xffffff, 0.5);
       if ( isDocked ) {
         rangeGraphics.lineStyle(2, 0x00ffff, 1);
       }
       rangeGraphics.strokeCircle(starBase.x, starBase.y, OBJ_CONF.BASE.DOCKING_RANGE);

       [ship, ...enemies].forEach(
         (obj, i)=>{
           if(!obj.active) return;
           let color = (i===0) ? 0x4488ff : 0xff3333;
           if ( i == 0 ) {  
             rangeGraphics.lineStyle(0.8, color, 0.3);
             rangeGraphics.strokeCircle(obj.x, obj.y, MECHANICS.WEAPON.MAX_RANGE);
           }
           rangeGraphics.lineStyle(1.2, color, 0.5);
           rangeGraphics.strokeCircle(obj.x, obj.y, MECHANICS.WEAPON.EFFECTIVE_RANGE);
         }
       );

       if (ship) {
         ship.updateGauge();
       }
       if (starBase) {
         starBase.updateGauge();
       }
       enemies.forEach(e => e.updateGauge());
     }

     function getSafeRandPos(minDist, maxDist){
       let x, y, distToCenter;
       let safe = false;
       let attempts = 0;
       
       while(!safe && attempts < 100) {
         x = Phaser.Math.Between(
           SYSTEM.CENTER_X - SYSTEM.BOUNDS_RADIUS, SYSTEM.CENTER_X + SYSTEM.BOUNDS_RADIUS
         );
         y = Phaser.Math.Between(
           SYSTEM.CENTER_Y - SYSTEM.BOUNDS_RADIUS, SYSTEM.CENTER_Y + SYSTEM.BOUNDS_RADIUS
         );
         distToCenter = Phaser.Math.Distance.Between(x, y, SYSTEM.CENTER_X, SYSTEM.CENTER_Y);
         
         if ( distToCenter < SYSTEM.BOUNDS_RADIUS * minDist ) {
           continue;
         }
         if ( distToCenter > SYSTEM.BOUNDS_RADIUS * maxDist ) {
           continue;
         }
         
         safe = true;

         for(let s of stars) {
           if (
             s.active && Phaser.Math.Distance.Between(
               x, y, s.x, s.y
             ) < OBJ_CONF.COLLISION.INIT_POS_DISTANCE
           ) {
             safe = false;
             break;
           }
         }
         if(!safe) continue;

         for(let e of enemies) {
           if (
             e.active && Phaser.Math.Distance.Between(
               x, y, e.x, e.y
             ) < OBJ_CONF.COLLISION.INIT_POS_DISTANCE
           ) {
             safe = false; break;
           }
         }
         attempts++;
       }
       return { x, y };
     }

     function lineHitsCircle(ax,ay,bx,by,cx,cy,r) {
       const dx = bx - ax, dy = by - ay;
       const a = dx * dx + dy * dy;
       if (a < 0.001) {
         return false;
       }
       const fx = ax - cx, fy = ay - cy;
       const b = 2*(fx * dx + fy * dy);
       const c = fx*fx + fy*fy - r*r;
       const disc = b*b-4*a*c;
       if ( disc < 0 ) {
         return false;
       }
       const t1 = (-b-Math.sqrt(disc)) / (2*a);
       const t2 = (-b+Math.sqrt(disc)) / (2*a);

       return (t1 > 0.05 && t1 < 0.95) || (t2 > 0.05 && t2 < 0.95);
     }

     function isLOSBlocked(ax,ay,bx,by, base=true){
       let obs = [...stars];
       if (base && starBase.shield > 0) {
         obs.push(starBase);
       }
       return obs.some(
         o => o.active && lineHitsCircle(
           ax,ay,
           bx,by,
           o.x,o.y,
           OBJ_CONF.COLLISION.LOS_RADIUS
         )
       );
     }

     function handlePointerDown(pointer){
       if(gameOver || !isPlayerTurn) {
         return;
       }
       
       let target = enemies.find(
         e => Phaser.Math.Distance.Between(
           pointer.worldX, pointer.worldY, e.x, e.y
         ) < OBJ_CONF.COLLISION.HIT_RADIUS
       );

       if (!target && starBase.shield > 0 && Phaser.Math.Distance.Between(
         pointer.worldX, pointer.worldY, starBase.x, starBase.y) < OBJ_CONF.COLLISION.HIT_RADIUS
       ) {
         target = {type:'base'};
       }

       if (target?.type === 'base') {
         if (isDocked) {
           setLog("⚓ ALREADY DOCKED");
           isPlayerTurn = false;
           this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
           return;
         }
         if (
           Phaser.Math.Distance.Between(ship.x, ship.y, starBase.x, starBase.y)
           <= OBJ_CONF.BASE.DOCKING_RANGE
         ) {
           dockShip(this);
           isPlayerTurn = false;
           this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
           return;
         } else {
           setLog("APPROACH BASE TO DOCK");
           attemptPlayerMove(this, starBase.x, starBase.y, SYSTEM.TIMING.TURN_DELAY);
           return;
         }
       }

       if (target && target.active) {
         if ( isDocked ) {
           setLog("DOCK: All weapons are deactivated");
           return;
         }

         let d = Phaser.Math.Distance.Between(ship.x, ship.y, target.x, target.y);

         if ( ship.energy < MECHANICS.WEAPON.PHASER_COST ) {
           setLog("LOW ENERGY");
           isPlayerTurn = false;
           this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
           updateStatus();
           return;
         }

         if (Math.exp(-MECHANICS.WEAPON.ALPHA * d) < MECHANICS.WEAPON.MAX_THRESHOLD) {
           setLog("OUT OF RANGE");
           ship.energy -= MECHANICS.WEAPON.PHASER_COST;
           isPlayerTurn = false;
           fireBeam(this, ship.x, ship.y, target.x, target.y, 0x444444);
           this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
           updateStatus();
           return;
         }
         
         if (isLOSBlocked(ship.x, ship.y, target.x, target.y, false)) {
           setLog("BLOCKED 1");
           isPlayerTurn = false;
           fireBeam(this, ship.x, ship.y, target.x, target.y, 0x444444);
           this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
           updateStatus();
           return;
         }
         
         ship.energy -= MECHANICS.WEAPON.PHASER_COST;
         isPlayerTurn = false;
         target.takeDamage(
           Math.floor(MECHANICS.WEAPON.BASE_DAMAGE * Math.exp(-MECHANICS.WEAPON.ALPHA * d))
         );

         fireBeam(this, ship.x, ship.y, target.x, target.y, 0x00ffff);

         if (!target.active) {
           enemies = enemies.filter(e => e !== target);
           const rp = getSafeRandPos(0.8, 0.95);
           enemies.push(new Enemy(this, rp.x, rp.y));
           setLog("⚠ ENEMY SHOT DOWN — REINFORCEMENT INCOMING!");
         }
         this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
         updateStatus();
         return;
       }

       if (!target) {
         attemptPlayerMove(this, pointer.worldX, pointer.worldY, SYSTEM.TIMING.TURN_DELAY);
         if ( ship.energy <= 5 && ! isDocked ) {
           updateStatus();
           gameOverMessage("OUT OF ENERGY ..");
         }
       }
     } 

     function clampDestToAvoidCharacters(x1, y1, destX, destY, self, isEnemy = false) {
       const R = OBJ_CONF.COLLISION.HIT_RADIUS * 2; 

       const targets = [];
       if (ship && ship !== self && ship.active) targets.push(ship);
       if (isEnemy && starBase && starBase !== self && starBase.active && starBase.shield > 0) {
         targets.push(starBase);
       }
       enemies.forEach(e => { if (e && e !== self && e.active) targets.push(e); });

       const dx = destX - x1;
       const dy = destY - y1;
       const lenSq = dx * dx + dy * dy;
       if (lenSq < 0.0001) return { x: destX, y: destY };

       let minT = 1.0; 

       for (const tgt of targets) {
         const curDist = Phaser.Math.Distance.Between(x1, y1, tgt.x, tgt.y);
         if (curDist < R) continue;

         const fx = x1 - tgt.x;
         const fy = y1 - tgt.y;
         const a = lenSq;
         const b = 2 * (fx * dx + fy * dy);
         const c = fx * fx + fy * fy - R * R;
         const disc = b * b - 4 * a * c;
         if (disc < 0) continue; 
         const t = (-b - Math.sqrt(disc)) / (2 * a);
         if (t > 0 && t < minT) minT = t;
       }

       if (minT < 1.0) {
         const len = Math.sqrt(lenSq);
         const stopT = Math.max(0, minT - 1.0 / len);
         return { x: x1 + dx * stopT, y: y1 + dy * stopT };
       }
       return { x: destX, y: destY };
     }

     function isMoveForbidden(x1, y1, x2, y2, isEnemy = false) {
       let hitStar = stars.some(
         s => {
           if (!s.active) return false;
           if (
             Phaser.Math.Distance.Between(x2, y2, s.x, s.y)
             <= OBJ_CONF.COLLISION.OBSTACLE_RADIUS
           ) {
             return true;
           }
           return lineHitsCircle(
             x1, y1, x2, y2, s.x, s.y, OBJ_CONF.COLLISION.OBSTACLE_RADIUS
           );
         }
       );
       if (hitStar) {
         return true;
       }
       return false;
     } 

     function dockShip(scene) {
       isDocked = true;
       ship.energy = OBJ_CONF.PLAYER.ENERGY_MAX;
       ship.shield = 0; 
       scene.tweens.add({
         targets: ship,
         x: starBase.x, y: starBase.y,
         duration: 200,
         ease: 'Sine.easeInOut'
       });
       setLog("⚓ DOCKED — ENERGY FULL");
       updateStatus();
     }

     function attemptPlayerMove(scene, targetX, targetY, delayBeforeEnemyTurn) {
       let rawDist = Phaser.Math.Distance.Between(ship.x, ship.y, targetX, targetY);
       if (rawDist < 1) return;

       let moveDist = Math.min(rawDist, OBJ_CONF.PLAYER.MAX_MOVE_DIST);
       let ratio = moveDist / rawDist;
       let destX = ship.x + (targetX - ship.x) * ratio;
       let destY = ship.y + (targetY - ship.y) * ratio;

       let target_is_base = false;
       let dist_target_base = Phaser.Math.Distance.Between(
         targetX, targetY, starBase.x, starBase.y
       );
       if ( dist_target_base <= OBJ_CONF.BASE.DOCKING_RANGE ) {
         target_is_base = true;
       }

       const clamped = clampDestToAvoidCharacters(ship.x, ship.y, destX, destY, ship, false);
       destX = clamped.x;
       destY = clamped.y;
       let distance = Phaser.Math.Distance.Between(ship.x, ship.y, destX, destY);

       if (isMoveForbidden(ship.x, ship.y, destX, destY) || distance < 5) {
         setLog("BLOCKED 2");
         return;
       }
       setLog("-");

       let skipAutoDock = false;
       if (isDocked) {
         isDocked = false;
         skipAutoDock = true;
         ship.shield = OBJ_CONF.PLAYER.SHIELD_MAX;
         setLog("UNDOCKED");
         updateStatus();
       }

       const actualDist = Phaser.Math.Distance.Between(ship.x, ship.y, destX, destY);
       let cost = Math.max(1, Math.ceil(actualDist * OBJ_CONF.PLAYER.MOVE_COST_RATE));
       if (ship.energy < cost) {
         setLog("NOT ENOUGH ENERGY");
         return;
       }

       ship.energy -= cost;
       isPlayerTurn = false;
       scene.tweens.add({
         targets: ship,
         x: destX, y: destY,
         duration: SYSTEM.TIMING.TURN_DELAY,
         onComplete: () => {
           if (!skipAutoDock) {
             const dockDist = Phaser.Math.Distance.Between(ship.x, ship.y, starBase.x, starBase.y);
             if (
               !isDocked && dockDist <= OBJ_CONF.BASE.DOCKING_RANGE
               && starBase.active && starBase.shield > 0
               && target_is_base
             ) {
               dockShip(scene);
               scene.time.delayedCall(220, () =>
                 scene.time.delayedCall(delayBeforeEnemyTurn, () => enemyTurn(scene)));
               return;
             }
           }
           scene.time.delayedCall(delayBeforeEnemyTurn, () => enemyTurn(scene));
         }
       });
       updateStatus();
     }

     function calculateSteeringDest(e, target, isFleeing = false) {
       let dirX = 0, dirY = 0;

       // 1. ターゲットへのベクトル（引力 / 斥力）
       if (isFleeing && Array.isArray(target)) {
         // 複数の脅威（自機と基地）から遠ざかるベクトルを合成
         target.forEach(t => {
           let dx = e.x - t.x;
           let dy = e.y - t.y;
           let dist = Math.sqrt(dx * dx + dy * dy);
           if (dist > 0.001) {
             let weight = 1.0 / dist;
             dirX += (dx / dist) * weight;
             dirY += (dy / dist) * weight;
           }
         });
         let fDist = Math.sqrt(dirX * dirX + dirY * dirY);
         if (fDist > 0.001) {
           dirX /= fDist;
           dirY /= fDist;
         }
       } else {
         // 通常の追従または単一ターゲットからの退却
         let targetDx = target.x - e.x;
         let targetDy = target.y - e.y;
         if (isFleeing) {
           targetDx = -targetDx;
           targetDy = -targetDy;
         }
         let targetDist = Math.sqrt(targetDx * targetDx + targetDy * targetDy);
         if (targetDist > 0.001) {
           dirX = targetDx / targetDist;
           dirY = targetDy / targetDist;
         }
       }

       // 2. 障害物(星)からの反発力 + 回り込み力
       let avoidX = 0, avoidY = 0;
       const STAR_AVOID_RADIUS = OBJ_CONF.COLLISION.OBSTACLE_RADIUS * 3.5;
       stars.forEach(s => {
         if (!s.active) return;
         let dx = e.x - s.x;
         let dy = e.y - s.y;
         let dist = Math.sqrt(dx * dx + dy * dy);
         if (dist > 0 && dist < STAR_AVOID_RADIUS) {
           let force = 1.0 - (dist / STAR_AVOID_RADIUS);
           avoidX += (dx / dist) * force * 1.5 - (dy / dist) * force * 1.0;
           avoidY += (dy / dist) * force * 1.5 + (dx / dist) * force * 1.0;
         }
       });

       // 3. 他の敵からの反発力（分離）
       let sepX = 0, sepY = 0;
       const ENEMY_AVOID_RADIUS = OBJ_CONF.COLLISION.HIT_RADIUS * 2.5;
       enemies.forEach(other => {
         if (!other.active || other === e) return;
         let dx = e.x - other.x;
         let dy = e.y - other.y;
         let dist = Math.sqrt(dx * dx + dy * dy);
         if (dist > 0 && dist < ENEMY_AVOID_RADIUS) {
           let force = 1.0 - (dist / ENEMY_AVOID_RADIUS);
           sepX += (dx / dist) * force * 2.0;
           sepY += (dy / dist) * force * 2.0;
         }
       });

       // 4. ベクトルを合成
       let finalX = dirX * 1.0 + avoidX + sepX;
       let finalY = dirY * 1.0 + avoidY + sepY;

       let finalDist = Math.sqrt(finalX * finalX + finalY * finalY);
       if (finalDist > 0.001) {
         finalX = (finalX / finalDist) * OBJ_CONF.ENEMY.SPEED;
         finalY = (finalY / finalDist) * OBJ_CONF.ENEMY.SPEED;
       }

       let destX = e.x + finalX;
       let destY = e.y + finalY;

       return clampDestToAvoidCharacters(e.x, e.y, destX, destY, e, true);
     }

     function fireBeam(scene, srcX, srcY, dstX, dstY, color) {
       const beam = scene.add.graphics();
       beam.lineStyle(4, color, 1);
       beam.lineBetween(srcX, srcY, dstX, dstY);
       scene.time.delayedCall(SYSTEM.TIMING.BEAM_DUR, () => beam.destroy());
     }

     function enemyTurn(scene) {
       if (gameOver) return;

       enemies.forEach(e => {
         scene.time.delayedCall(0, () => {
           if ( gameOver || !e.active ) return;

           let dToBase = Phaser.Math.Distance.Between(e.x, e.y, starBase.x, starBase.y);
           let dToShip = Phaser.Math.Distance.Between(e.x, e.y, ship.x, ship.y);
           
           let canAttackShip = (
             !isDocked &&
             dToShip <= MECHANICS.WEAPON.EFFECTIVE_RANGE &&
             !isLOSBlocked(e.x, e.y, ship.x, ship.y)
           );
           let canAttackBase = (
             starBase.shield > 0 &&
             starBase.active &&
             !isLOSBlocked(e.x, e.y, starBase.x, starBase.y, false) &&
             (
               dToBase <= MECHANICS.WEAPON.EFFECTIVE_RANGE ||
               isDocked && dToShip <= MECHANICS.WEAPON.EFFECTIVE_RANGE
             )
           );

           if (e.shield >= OBJ_CONF.ENEMY.SHIELD_MAX * 0.5 && canAttackBase) {
             fireBeam(scene, e.x, e.y, starBase.x, starBase.y, 0xff00ff);
             starBase.takeDamage(
               Math.floor(OBJ_CONF.ENEMY.DAMAGE * Math.exp(-MECHANICS.WEAPON.ALPHA * dToBase))
             );
             if (starBase.shield <= 0 && !gameOver) {
               updateStatus();
               gameOverMessage("BASE DESTROYED");
             }
           } else if (e.shield >= OBJ_CONF.ENEMY.SHIELD_MAX * 0.5 && canAttackShip) {
             fireBeam(scene, e.x, e.y, ship.x, ship.y, 0xff00ff);
             ship.takeDamage(
               Math.floor(OBJ_CONF.ENEMY.DAMAGE * Math.exp(-MECHANICS.WEAPON.ALPHA * dToShip))
             );
             if (ship.shield <= 0 && !gameOver) {
               updateStatus();
               gameOverMessage("ENTERPRISE DESTROYED");
             }
           } else {
             // 移動
             let isFleeing = (e.shield < OBJ_CONF.ENEMY.SHIELD_MAX * 0.5);
             let target;

             if (!isFleeing) {
               target = (dToBase < dToShip) ? {x: starBase.x, y: starBase.y} : {x: ship.x, y: ship.y};
             } else {
               target = [
                 {x: ship.x, y: ship.y},
                 {x: starBase.x, y: starBase.y}
               ];
             }

             let dest = calculateSteeringDest(e, target, isFleeing);

             scene.tweens.add(
               {
                 targets: e,
                 x: dest.x, y: dest.y,
                 duration: SYSTEM.TIMING.TURN_DELAY,
                 onComplete: () => scene.time.delayedCall(
                   SYSTEM.TIMING.TURN_DELAY, () => {
                     if (e.shield < OBJ_CONF.ENEMY.SHIELD_MAX * 0.5) {
                       const distFromCenter = Phaser.Math.Distance.Between(
                         e.x, e.y, SYSTEM.CENTER_X, SYSTEM.CENTER_Y
                       );

                       if (distFromCenter > SYSTEM.BOUNDS_RADIUS) {
                         e.die();
                       }
                     }
                   }
                 )
               }
             );

             e.x = Math.floor(e.x);
             e.y = Math.floor(e.y);
           }

           e.shield = Math.min(
             OBJ_CONF.ENEMY.SHIELD_MAX,
             e.shield + (OBJ_CONF.ENEMY.SHIELD_MAX * OBJ_CONF.ENEMY.REGEN)
           );
         });
       });

       scene.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => {
         enemies = enemies.filter(e => e.active);
         if (enemies.length === 0 && !gameOver) {
           nextStage(scene);
         }
         else if (!gameOver) {
           turnCount++;
           Score--;

           if ( turnCount % SYSTEM.NEW_ENEMY_INTERVAL == 0 ) {
             let p = getSafeRandPos(0.8, 0.95);
             enemies.push(new Enemy(scene, p.x, p.y));
           }

           updateStatus(); 
           isPlayerTurn = true;
         }
       });
     }

     function updateStatus() {
       let shipEnergy = ship.energy > 0 ? ship.energy : 0;
       let shipShield = ship.shield > 0 ? ship.shield : 0;
       let baseShield = starBase.shield > 0 ? starBase.shield : 0;

       document.getElementById('statusTurn').textContent = `${turnCount}`;
       document.getElementById('statusStage').textContent = `${currentStage}`;
       document.getElementById('statusScore').textContent = `${Score}`;

       let color = "#0f0";
       if ( shipEnergy < OBJ_CONF.PLAYER.ENERGY_MAX * .3 ) {
         color = "#f00";
       }
       document.getElementById('statusShipEnergy').style.color = color;
       document.getElementById('statusShipEnergy').textContent = Math.floor(shipEnergy);

       color = "#0f0";
       if ( shipShield < OBJ_CONF.PLAYER.SHIELD_MAX * .3 ) {
         color = "#f00";
       }
       document.getElementById('statusShipShield').style.color = color;
       document.getElementById('statusShipShield').textContent = 
         Math.floor((shipShield / OBJ_CONF.PLAYER.SHIELD_MAX) * 100);

       color = "#0f0";
       if ( baseShield < OBJ_CONF.BASE.SHIELD_MAX * .3 ) {
         color = "#f00";
       }
       document.getElementById('statusBaseShield').style.color = color;
       document.getElementById('statusBaseShield').textContent = 
         Math.floor((baseShield / OBJ_CONF.BASE.SHIELD_MAX) * 100);
     }

     function setLog(msg) {
       document.getElementById('logStatus').textContent = msg;
     }

     function nextStage(scene) {
       const clearedStage = currentStage;
       const bonus = currentStage * 100 * 2;
       Score += bonus;

       const { list, newIdx } = saveHighScore(Score, turnCount, clearedStage, `STAGE ${clearedStage} CLEARED`, true);

       currentStage++;
       SYSTEM.ENEMY_QTY++;
       isPlayerTurn = false;

       _pendingScene = scene;

       setLog(`STAGE ${clearedStage} CLEARED!`);
       showHighScoreOverlay('stageclear', { clearedStage, bonus, list, newIdx });
     }

     function gameOverMessage(msg, clear=false) {
       gameOver = true;
       flagClear = clear;
       isPlayerTurn = false;
       setLog(msg);
       setTimeout(() => showHighScoreOverlay('gameover', { msg }), 800);
     }

     function loadHighScores() {
       try {
         const raw = localStorage.getItem(HIGHSCORE.STORAGE_KEY);
         return raw ? JSON.parse(raw) : [];
       } catch (e) {
         return [];
       }
     }

     function saveHighScore(score, turns, stage, result, forceSave = false) {
       let list = loadHighScores();
       const now = new Date();
       const dateStr = [
         now.getFullYear(),
         String(now.getMonth() + 1).padStart(2, '0'),
         String(now.getDate()).padStart(2, '0')
       ].join('/');
       if ( flagClear || forceSave ) {
         list.push(
           {
             score, turns, stage, result,
             gameid: SYSTEM.GAMEID, date: dateStr, _new: true
           }
         );
       }
       list.sort((a, b) => b.score - a.score);
       const newIdx = list.findIndex(s => s._new);
       list = list.slice(0, HIGHSCORE.MAX_ENTRIES);
       const madeIt = list.some(s => s._new);
       localStorage.setItem(
         HIGHSCORE.STORAGE_KEY,
         JSON.stringify(list.map(({ _new, ...rest }) => rest))
       );
       return { list, newIdx: madeIt ? newIdx : -1 };
     }

     function renderHSTable(list, newIdx) {
       const tbody  = document.getElementById('hsTableBody');
       const noRec  = document.getElementById('hsNoRecord');
       tbody.innerHTML = '';
       if (!list || list.length === 0) {
         noRec.style.display = 'block';
         return;
       }
       noRec.style.display = 'none';
       const rankLabels = ['1ST', '2ND', '3RD', '4TH', '5TH'];
       list.forEach((s, i) => {
         const tr = document.createElement('tr');
         const isNew = (s.gameid == SYSTEM.GAMEID);
         if (isNew) tr.className = 'hs-new';
         const rank   = rankLabels[i] || `${i + 1}TH`;
         const prefix = isNew ? '★' : '';
         const displayStage = s.stage !== undefined ? s.stage : '-';
         tr.innerHTML = `
           <td>${prefix}${rank}</td>
           <td>${s.score}</td>
           <td>${displayStage}</td>
           <td>${s.turns}</td>
           <td>${s.date}</td>
         `;
         tbody.appendChild(tr);
       });
     }

     function showHighScoreOverlay(mode, data = {}) {
       const overlay    = document.getElementById('highScoreOverlay');
       const resultEl   = document.getElementById('hsResultMsg');
       const finalEl    = document.getElementById('hsFinalMsg');
       const closeBtn   = document.getElementById('hsCloseBtn');
       const restartBtn = document.getElementById('hsRestartBtn');

       if (mode === 'stageclear') {
         const { clearedStage, bonus, list, newIdx } = data;
         resultEl.style.color      = '#0f0';
         resultEl.textContent      = `✓ STAGE ${clearedStage} CLEARED!`;
         finalEl.textContent       = `TURNS:${turnCount}, STAGE BONUS:+${bonus}, SCORE: ${Score}`;
         renderHSTable(list, newIdx);
         closeBtn.style.display    = 'none';
         restartBtn.textContent    = '▶ NEXT STAGE';
         restartBtn.style.display  = 'inline-block';

       } else if (mode === 'gameover') {
         const { msg } = data;
         resultEl.style.color      = '#ff0';
         resultEl.textContent      = msg;
         finalEl.textContent       = `MISSION FAILED: SCORE: ${Score}   STAGE: ${currentStage}   TURNS: ${turnCount}`;
         renderHSTable(loadHighScores(), -1);
         closeBtn.style.display    = 'none';
         restartBtn.textContent    = '▶ RESTART';
         restartBtn.style.display  = 'inline-block';

       } else {
         resultEl.style.color      = '#0ff';
         resultEl.textContent      = '▶ HIGH SCORES ◀';
         finalEl.textContent       = `NOW — SCORE: ${Score}   STAGE: ${currentStage}   TURN: ${turnCount}`;
         renderHSTable(loadHighScores(), -1);
         closeBtn.style.display    = 'inline-block';
         restartBtn.textContent    = '▶ RESTART';
         restartBtn.style.display  = 'inline-block';
       }
       overlay.style.display = 'flex';
     }

     document.getElementById('viewScoresBtn').addEventListener('click', () => {
       showHighScoreOverlay('view');
     });
     document.getElementById('hsRestartBtn').addEventListener('click', () => {
       if (_pendingScene) {
         document.getElementById('highScoreOverlay').style.display = 'none';
         turnCount = 1;
         const s = _pendingScene;
         _pendingScene = null;
         isPlayerTurn = true;
         s.scene.restart();
       } else {
         location.reload();
       }
     });
     document.getElementById('hsCloseBtn').addEventListener('click', () => {
       document.getElementById('highScoreOverlay').style.display = 'none';
     });

    </script>
