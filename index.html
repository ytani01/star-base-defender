<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>Starbase Defender</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
     body { margin:0; background:#000; padding:0; overflow:hidden; font-family: Arial, sans-serif; }
     #gameContainer { display: flex; flex-direction: column; height: 100vh; }
     #statusPanel {
       background:#111;
       color:#0ff;
       padding:15px;
       height:100px;
       border-bottom:2px solid #08f;
       overflow-y:auto;
       font-size:14px;
       font-family: monospace;
     }
     #statusPanel div { margin:5px 0; }
     #gameCanvas { flex:1; }
    </style>
  </head>
  <body>
    <div id="gameContainer">
      <div id="statusPanel">
        TURN: <span id="statusTurn">1</span>
        <div id="statusShip">
          My Ship:
          Energy: <span id="statusShipEnergy">0</span>,
          Shields: <span id="statusShipShields">0</span>%
        </div>
        <div id="statusBase">
          Star Base:
          Shields: <span id="statusBaseShields">0</span>%
        </div>
        <div id="logStatus">COMMAND: AWAITING ORDERS</div>
      </div>
      <div id="gameCanvas"></div>
    </div>
    <script>
     // ---------------------------------------------------------
     // 設定・定数の再分類
     // ---------------------------------------------------------
     
     const SYSTEM = {
       SCALE: 0.5,
       STAR_QTY: 6,
       ENEMY_QTY: 4,
       BOUNDS_RADIUS: 300,
       TIMING: {
         BEAM_DUR: 300,
         TURN_DELAY: 300,
       }
     };
     SYSTEM.PLAY_AREA_WIDTH = SYSTEM.BOUNDS_RADIUS * 2 + 30;
     SYSTEM.PLAY_AREA_HEIGHT = SYSTEM.PLAY_AREA_WIDTH;
     SYSTEM.CENTER_X = SYSTEM.PLAY_AREA_WIDTH / 2;
     SYSTEM.CENTER_Y = SYSTEM.PLAY_AREA_HEIGHT / 2;

     const ENTITY_CONFIG = {
       PLAYER: {
         MAX_ENERGY: 3000,
         MAX_SHIELDS: 1000,
         DOCK_RESTORE_ENERGY: 1500,
         MAX_MOVE_DIST: 130 * SYSTEM.SCALE,
         MOVE_COST_RATE: 0.2 / SYSTEM.SCALE
       },
       BASE: {
         MAX_SHIELDS: 1000,
         DOCKING_RANGE: 60 * SYSTEM.SCALE
       },
       ENEMY: {
         HP: 300,
         DAMAGE: 70,
         SPEED: 30 * SYSTEM.SCALE,
         STOP_DIST: 30 * SYSTEM.SCALE,
         REGEN: 0.03
       },
       COLLISION: {
         HIT_RADIUS: 30 * SYSTEM.SCALE,
         OBSTACLE_RADIUS: 24 * SYSTEM.SCALE,
         LOS_RADIUS: 16 * SYSTEM.SCALE
       }
     };

     const MECHANICS = {
       WEAPON: {
         PHASER_COST: 100,
         BASE_DAMAGE: 100,
         ALPHA: 0.0075 / SYSTEM.SCALE,
         EFFECTIVE_THRESHOLD: 0.5,
         MAX_THRESHOLD: 0.1
       }
     };
     MECHANICS.WEAPON.MAX_RANGE = Math.floor(
     -Math.log(MECHANICS.WEAPON.MAX_THRESHOLD) / MECHANICS.WEAPON.ALPHA
     );
     MECHANICS.WEAPON.EFFECTIVE_RANGE = Math.floor(
     -Math.log(MECHANICS.WEAPON.EFFECTIVE_THRESHOLD) / MECHANICS.WEAPON.ALPHA
     );

     let ship, starBase, rangeGraphics, boundaryGraphics;
     let enemies = [], stars = [];
     let turnCount = 1;
     let isPlayerTurn = true, gameOver = false;

     // ---------------------------------------------------------
     // クラス定義
     // ---------------------------------------------------------
     
     function drawGauge(graphics, cx, cy, width, height, ratio, color) {
       graphics.clear();
       const x = cx - width / 2;
       const y = cy - height / 2;
       
       graphics.fillStyle(0x222222, 0.9);
       graphics.fillRect(x, y, width, height);
       
       graphics.lineStyle(1, 0x000000, 1);
       graphics.strokeRect(x, y, width, height);
       
       const r = Math.max(0, Math.min(1, ratio));
       if (r > 0) {
         graphics.fillStyle(color, 1);
         graphics.fillRect(x, y, width * r, height);
       }
     }

     class GameObject {
       constructor(scene, x, y, texture, scale) {
         this.scene = scene;
         this.sprite = scene.add.image(x, y, texture).setScale(scale);
         this.active = true;
       }
       get x() { return this.sprite.x; }
       set x(val) { this.sprite.x = val; }
       get y() { return this.sprite.y; }
       set y(val) { this.sprite.y = val; }
       destroy() {
         this.sprite.destroy();
         this.active = false;
       }
     }

     class Star extends GameObject {
       constructor(scene, x, y) {
         super(scene, x, y, 'starImg', SYSTEM.SCALE);
       }
     }

     class BaseStation extends GameObject {
       constructor(scene, x, y) {
         super(scene, x, y, 'baseImg', SYSTEM.SCALE);
         this.shields = ENTITY_CONFIG.BASE.MAX_SHIELDS;
         this.gauge = scene.add.graphics();
       }
       updateGauge() {
         if (this.active && this.shields > 0) {
           drawGauge(this.gauge, this.x, this.y + (35 * SYSTEM.SCALE), 40, 6, this.shields / ENTITY_CONFIG.BASE.MAX_SHIELDS, 0xffcc00);
         } else if (this.gauge) {
           this.gauge.clear();
         }
       }
       takeDamage(amount) {
         this.shields -= amount;
         if (this.shields <= 0) {
           this.destroy();
           if (this.gauge) this.gauge.destroy();
         }
       }
     }

     class PlayerShip extends GameObject {
       constructor(scene, x, y) {
         super(scene, x, y, 'shipImg', SYSTEM.SCALE);
         this.energy = ENTITY_CONFIG.PLAYER.MAX_ENERGY;
         this.shields = ENTITY_CONFIG.PLAYER.MAX_SHIELDS;
         this.gauge = scene.add.graphics();
       }
       updateGauge() {
         if (this.active && this.shields > 0) {
           drawGauge(this.gauge, this.x, this.y + (35 * SYSTEM.SCALE), 40, 6, this.shields / ENTITY_CONFIG.PLAYER.MAX_SHIELDS, 0x4488ff);
         } else if (this.gauge) {
           this.gauge.clear();
         }
       }
       takeDamage(amount) {
         this.shields -= amount;
         if (this.shields <= 0) {
           this.destroy();
           if (this.gauge) this.gauge.destroy();
         }
       }
     }

     class Enemy extends GameObject {
       constructor(scene, x, y) {
         super(scene, x, y, 'enemyImg', SYSTEM.SCALE);
         this.hp = ENTITY_CONFIG.ENEMY.HP;
         this.gauge = scene.add.graphics();
         this.isDead = false;
       }
       updateGauge() {
         if (this.active && !this.isDead) {
           drawGauge(this.gauge, this.x, this.y + (30 * SYSTEM.SCALE), 40, 6, this.hp / ENTITY_CONFIG.ENEMY.HP, 0xff3333);
         } else {
           this.gauge.clear();
         }
       }
       takeDamage(amount) {
         this.hp -= amount;
         if (this.hp <= 0) {
           this.die();
         }
       }
       die() {
         this.destroy();
         if (this.gauge) this.gauge.destroy();
         this.isDead = true;
       }
     }

     // ---------------------------------------------------------
     // ゲーム初期化・ループ
     // ---------------------------------------------------------

     const config = {
       type: Phaser.AUTO,
       width: SYSTEM.PLAY_AREA_WIDTH,
       height: SYSTEM.PLAY_AREA_HEIGHT,
       backgroundColor: '#0a0a2a',
       parent: 'gameCanvas',
       scene: { preload, create, update }
     };

     new Phaser.Game(config);

     function preload(){
       const g = this.make.graphics({add:false});

       g.fillStyle(0xaabbff);
       g.fillEllipse(25,15,40,30);
       g.fillStyle(0x5588ee);
       g.fillRect(22,25,6,20);
       g.fillStyle(0x4488ff);
       g.fillRect(10,30,8,20);
       g.fillRect(32,30,8,20);
       g.generateTexture('shipImg',50,60);
       
       g.clear();

       g.fillStyle(0x228822);
       g.beginPath();
       g.moveTo(25,0);
       g.lineTo(50,20);
       g.lineTo(40,40);
       g.lineTo(25,30);
       g.lineTo(10,40);
       g.lineTo(0,20);
       g.fillPath();
       g.generateTexture('enemyImg',50,50);

       g.clear();

       g.fillStyle(0x99ffff);
       g.fillCircle(30,30,30);
       g.fillStyle(0x006666);
       g.fillCircle(30,30,25);
       g.fillStyle(0x99ffff);
       g.fillCircle(30,30,10);
       g.generateTexture('baseImg',60,60);

       g.clear();

       g.fillStyle(0xffffff);
       g.fillCircle(25,25,16);
       g.generateTexture('starImg',50,50);

       g.destroy();
     }

     function create(){
       rangeGraphics = this.add.graphics();
       boundaryGraphics = this.add.graphics();
       drawBoundary();
       
       starBase = new BaseStation(this, SYSTEM.CENTER_X, SYSTEM.CENTER_Y);

       stars = [];
       for(let i=0; i < SYSTEM.STAR_QTY; i++) {
         let p = getSafeRandPos(ENTITY_CONFIG.COLLISION.OBSTACLE_RADIUS * 2.5);
         stars.push(new Star(this, p.x, p.y));
       }

       enemies = [];
       for(let i=0; i<SYSTEM.ENEMY_QTY; i++){
         let p = getSafeRandPos(ENTITY_CONFIG.COLLISION.HIT_RADIUS * 2);
         enemies.push(new Enemy(this, p.x, p.y));
       }

       let pp = getSafeRandPos(ENTITY_CONFIG.COLLISION.HIT_RADIUS * 2);
       ship = new PlayerShip(this, pp.x, pp.y);

       updateStatus();
       this.input.on('pointerdown', handlePointerDown, this);
     }

     function drawBoundary(){
       boundaryGraphics.clear();
       boundaryGraphics.lineStyle(2, 0x0088ff, 0.5);
       boundaryGraphics.strokeCircle(SYSTEM.CENTER_X, SYSTEM.CENTER_Y, SYSTEM.BOUNDS_RADIUS);
     }

     function update(){
       rangeGraphics.clear();
       [ship, ...enemies].forEach(
         (obj, i)=>{
           if(!obj.active) return;
           
           let color = (i===0) ? 0x4488ff : 0xff3333;
           if ( i == 0 ) {
             rangeGraphics.lineStyle(0.8, color, 0.3);
             rangeGraphics.strokeCircle(obj.x, obj.y, MECHANICS.WEAPON.MAX_RANGE);
           }
           rangeGraphics.lineStyle(1.2, color, 0.5);
           rangeGraphics.strokeCircle(obj.x, obj.y, MECHANICS.WEAPON.EFFECTIVE_RANGE);
         }
       );

       if (ship) ship.updateGauge();
       if (starBase) starBase.updateGauge();
       enemies.forEach(e => e.updateGauge());
     }

     function getSafeRandPos(minDistance){
       let x, y, distToCenter;
       let safe = false;
       let attempts = 0;
       
       while(!safe && attempts < 100) {
         x = Phaser.Math.Between(SYSTEM.CENTER_X - SYSTEM.BOUNDS_RADIUS, SYSTEM.CENTER_X + SYSTEM.BOUNDS_RADIUS);
         y = Phaser.Math.Between(SYSTEM.CENTER_Y - SYSTEM.BOUNDS_RADIUS, SYSTEM.CENTER_Y + SYSTEM.BOUNDS_RADIUS);
         distToCenter = Phaser.Math.Distance.Between(x, y, SYSTEM.CENTER_X, SYSTEM.CENTER_Y);
         
         if(distToCenter > SYSTEM.BOUNDS_RADIUS) continue;
         if(distToCenter < ENTITY_CONFIG.BASE.DOCKING_RANGE) continue;
         
         safe = true;

         for(let s of stars) {
           if(s.active && Phaser.Math.Distance.Between(x, y, s.x, s.y) < minDistance) {
             safe = false; break;
           }
         }
         if(!safe) continue;

         for(let e of enemies) {
           if(e.active && Phaser.Math.Distance.Between(x, y, e.x, e.y) < minDistance) {
             safe = false; break;
           }
         }
         attempts++;
       }
       return { x, y };
     }

     function lineHitsCircle(ax,ay,bx,by,cx,cy,r) {
       const dx = bx-ax, dy = by-ay;
       const a = dx*dx+dy*dy;
       if (a<0.001) {
         return false;
       }
       const fx = ax-cx, fy=ay-cy;
       const b = 2*(fx*dx+fy*dy);
       const c = fx*fx+fy*fy-r*r;
       const disc = b*b-4*a*c;
       if ( disc < 0 ) {
         return false;
       }
       const t1 = (-b-Math.sqrt(disc)) / (2*a);
       const t2 = (-b+Math.sqrt(disc)) / (2*a);

       return (t1 > 0.05 && t1 < 0.95) || (t2 > 0.05 && t2 < 0.95);
     }

     function isLOSBlocked(ax,ay,bx,by, base=true){
       let obs = [...stars];
       if (base && starBase.shields > 0) {
         obs.push(starBase);
       }
       return obs.some(
         o => o.active && lineHitsCircle(
           ax,ay,
           bx,by,
           o.x,o.y,
           ENTITY_CONFIG.COLLISION.LOS_RADIUS
         )
       );
     }

     function handlePointerDown(pointer){
       if(gameOver || !isPlayerTurn) {
         return;
       }
       
       let target = enemies.find(
         e => Phaser.Math.Distance.Between(
           pointer.x, pointer.y, e.x, e.y
         ) < ENTITY_CONFIG.COLLISION.HIT_RADIUS
       );

       if (!target && starBase.shields > 0 && Phaser.Math.Distance.Between(
         pointer.x, pointer.y, starBase.x, starBase.y) < ENTITY_CONFIG.COLLISION.HIT_RADIUS
       ) {
         target = {type:'base'};
       }

       if (target?.type === 'base') {
         if ( Phaser.Math.Distance.Between(ship.x, ship.y, starBase.x, starBase.y) <= ENTITY_CONFIG.BASE.DOCKING_RANGE
         ) {
           ship.energy = Math.min(ship.energy + ENTITY_CONFIG.PLAYER.DOCK_RESTORE_ENERGY, ENTITY_CONFIG.PLAYER.MAX_ENERGY);
           ship.shields = ENTITY_CONFIG.PLAYER.MAX_SHIELDS;
           setLog("DOCKED: ENERGY/SHIELDS RESTORED");
           isPlayerTurn = false;
           this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
         } else {
           setLog("APPROACH BASE TO DOCK");
         }

         updateStatus();
         return;
       }

       if (target && target.active) {
         // Fire
         let d = Phaser.Math.Distance.Between(ship.x, ship.y, target.x, target.y);

         if ( ship.energy < MECHANICS.WEAPON.PHASER_COST ) {
           setLog("LOW ENERGY");
           isPlayerTurn = false;
           this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
           return;
         }
         if (Math.exp(-MECHANICS.WEAPON.ALPHA * d) < MECHANICS.WEAPON.MAX_THRESHOLD) {
           setLog("OUT OF RANGE");
           ship.energy -= MECHANICS.WEAPON.PHASER_COST;
           isPlayerTurn = false;
           this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
           updateStatus();
           return;
         }
         
         if (isLOSBlocked(ship.x, ship.y, target.x, target.y, false)) {
           setLog("BLOCKED");
           isPlayerTurn = false;
           this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
           return;
         }
         
         ship.energy -= MECHANICS.WEAPON.PHASER_COST;
         isPlayerTurn = false;
         target.takeDamage(Math.floor(MECHANICS.WEAPON.BASE_DAMAGE * Math.exp(-MECHANICS.WEAPON.ALPHA * d)));

         const beam = this.add.graphics();
         beam.lineStyle(4, 0x00ffff, 1);
         beam.lineBetween(ship.x, ship.y, target.x, target.y);
         this.time.delayedCall(SYSTEM.TIMING.BEAM_DUR, () => beam.destroy());

         if (target.isDead) {
           enemies = enemies.filter(e => e !== target);
         }
         this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));

         updateStatus();
         return;
       }

       if (!target) {
         let rawDist = Phaser.Math.Distance.Between(ship.x, ship.y, pointer.x, pointer.y);
         if (rawDist < 1) {
           return;
         }

         let moveDist = Math.min(rawDist, ENTITY_CONFIG.PLAYER.MAX_MOVE_DIST);
         let ratio = moveDist / rawDist;
         let destX = ship.x + (pointer.x - ship.x) * ratio;
         let destY = ship.y + (pointer.y - ship.y) * ratio;

         if (isMoveForbidden(ship.x, ship.y, destX, destY)) {
           setLog("BLOCKED");
           isPlayerTurn = false;
           this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
           return;
         }

         let cost = Math.max(1, Math.ceil(moveDist * ENTITY_CONFIG.PLAYER.MOVE_COST_RATE));
         if (ship.energy < cost) {
           setLog("NOT ENOUGH ENERGY");
           isPlayerTurn = false;
           this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
           return;
         }

         ship.energy -= cost;

         isPlayerTurn = false;
         this.tweens.add(
           {
             targets: ship,
             x: destX, y: destY,
             duration: SYSTEM.TIMING.TURN_DELAY,
             onComplete: () => this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this))
           }
         );
         updateStatus();
       }
     }

     function isMoveForbidden(x1, y1, x2, y2, isEnemy = false) {
       let hitStar = stars.some(
         s => {
           if (!s.active) return false;
           if (
             Phaser.Math.Distance.Between(x2, y2, s.x, s.y) <= ENTITY_CONFIG.COLLISION.OBSTACLE_RADIUS
           ) {
             return true;
           }
           return lineHitsCircle(
             x1, y1,
             x2, y2,
             s.x, s.y,
             ENTITY_CONFIG.COLLISION.OBSTACLE_RADIUS
           );
         }
       );
       if (hitStar) return true;

       if (isEnemy && starBase.shields > 0 && starBase?.active) {
         if (Phaser.Math.Distance.Between(x2, y2, starBase.x, starBase.y) <= ENTITY_CONFIG.COLLISION.HIT_RADIUS) return true;
         if (lineHitsCircle(x1, y1, x2, y2, starBase.x, starBase.y, ENTITY_CONFIG.COLLISION.HIT_RADIUS)) return true;
       }

       return false;
     }

     function enemyTurn(scene) {
       if (gameOver) {
         return;
       }

       enemies.forEach(e => {
         scene.time.delayedCall(0, () => {
           if ( gameOver || !e.active ) {
             return;
           }

           let dToBase = Phaser.Math.Distance.Between(e.x, e.y, starBase.x, starBase.y);
           let dToShip = Phaser.Math.Distance.Between(e.x, e.y, ship.x, ship.y);
           
           let canAttackBase = (
             starBase.shields > 0 && dToBase <= MECHANICS.WEAPON.EFFECTIVE_RANGE && !isLOSBlocked(
               e.x, e.y, starBase.x, starBase.y, false
             )
           );
           
           let canAttackShip = (
             dToShip <= MECHANICS.WEAPON.EFFECTIVE_RANGE && !isLOSBlocked(
               e.x, e.y, ship.x, ship.y
             )
           );

           if (e.hp >= ENTITY_CONFIG.ENEMY.HP * 0.5 && canAttackBase) {
             const beam = scene.add.graphics();
             beam.lineStyle(4, 0xff00ff, 1);
             beam.lineBetween(e.x, e.y, starBase.x, starBase.y);
             scene.time.delayedCall(SYSTEM.TIMING.BEAM_DUR, () => beam.destroy());

             starBase.takeDamage(
               Math.floor(ENTITY_CONFIG.ENEMY.DAMAGE * Math.exp(-MECHANICS.WEAPON.ALPHA * dToBase))
             );
             if (starBase.shields <= 0 && !gameOver) {
               updateStatus();
               gameOverMessage("BASE DESTROYED");
             }
           } else if (e.hp >= ENTITY_CONFIG.ENEMY.HP * 0.5 && canAttackShip) {
             const beam = scene.add.graphics();
             beam.lineStyle(4, 0xff00ff, 1);
             beam.lineBetween(e.x, e.y, ship.x, ship.y);
             scene.time.delayedCall(SYSTEM.TIMING.BEAM_DUR, () => beam.destroy());

             ship.takeDamage(
               Math.floor(ENTITY_CONFIG.ENEMY.DAMAGE * Math.exp(-MECHANICS.WEAPON.ALPHA * dToShip))
             );
             if (ship.shields <= 0 && !gameOver) {
               updateStatus();
               gameOverMessage("ENTERPRISE DESTROYED");
             }
           } else {
             let angle;
             if (e.hp >= ENTITY_CONFIG.ENEMY.HP * 0.5) {
               let target = dToBase < dToShip ? {x:starBase.x, y:starBase.y} : {x:ship.x, y:ship.y};
               angle = Phaser.Math.Angle.Between(e.x, e.y, target.x, target.y);
             } else {
               angle = Phaser.Math.Angle.Between(ship.x, ship.y, e.x, e.y);
             }

             let destX = e.x + Math.cos(angle) * ENTITY_CONFIG.ENEMY.SPEED;
             let destY = e.y + Math.sin(angle) * ENTITY_CONFIG.ENEMY.SPEED;

             if (isMoveForbidden(e.x, e.y, destX, destY, true)) {
               let found = false;
               for (let offset = 15; offset <= 90; offset += 15) {
                 let rad = Phaser.Math.DegToRad(offset);
                 
                 let tx1 = e.x + Math.cos(angle + rad) * ENTITY_CONFIG.ENEMY.SPEED;
                 let ty1 = e.y + Math.sin(angle + rad) * ENTITY_CONFIG.ENEMY.SPEED;
                 if (!isMoveForbidden(e.x, e.y, tx1, ty1, true)) {
                   destX = tx1; destY = ty1; found = true; break;
                 }
                 
                 let tx2 = e.x + Math.cos(angle - rad) * ENTITY_CONFIG.ENEMY.SPEED;
                 let ty2 = e.y + Math.sin(angle - rad) * ENTITY_CONFIG.ENEMY.SPEED;
                 if (!isMoveForbidden(e.x, e.y, tx2, ty2, true)) {
                   destX = tx2; destY = ty2; found = true; break;
                 }
               }
               if (!found) {
                 destX = e.x;
                 destY = e.y;
               }
             }

             scene.tweens.add(
               {
                 targets: e,
                 x: destX, y: destY,
                 duration: SYSTEM.TIMING.TURN_DELAY,
                 onComplete: () => scene.time.delayedCall(
                   SYSTEM.TIMING.TURN_DELAY, () => {
                     if (e.hp < ENTITY_CONFIG.ENEMY.HP * 0.5) {
                       const distFromCenter = Phaser.Math.Distance.Between(
                         e.x, e.y, SYSTEM.CENTER_X, SYSTEM.CENTER_Y
                       );
                       if (distFromCenter > SYSTEM.BOUNDS_RADIUS) {
                         e.die();
                       }
                     }
                   }
                 )
               }
             );

             e.x = Math.floor(e.x);
             e.y = Math.floor(e.y);
           }

           e.hp = Math.min(
             ENTITY_CONFIG.ENEMY.HP,
             e.hp + (ENTITY_CONFIG.ENEMY.HP * ENTITY_CONFIG.ENEMY.REGEN)
           );
         });
       });

       scene.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => {
         enemies = enemies.filter(e => !e.isDead && e.active);
         if (enemies.length === 0 && !gameOver) {
           gameOverMessage("MISSION ACCOMPLISHED");
         }
         else if (!gameOver) {
           turnCount++;
           updateStatus(); 
           isPlayerTurn = true; setLog("COMMAND: AWAITING ORDERS");
         }
       });
     }

     function updateStatus() {
       let shipEnergy = ship.energy > 0 ? ship.energy : 0;
       let shipShields = ship.shields > 0 ? ship.shields : 0;
       let baseShields = starBase.shields > 0 ? starBase.shields : 0;

       document.getElementById('statusTurn').textContent = `${turnCount}`;

       color = "#0f0";
       if ( shipEnergy < ENTITY_CONFIG.PLAYER.MAX_ENERGY * .3 ) {
         color = "#f00";
       }
       document.getElementById('statusShipEnergy').style.color = color;
       document.getElementById('statusShipEnergy').textContent = Math.floor(shipEnergy);

       color = "#0f0";
       if ( shipShields < ENTITY_CONFIG.PLAYER.MAX_SHIELDS * .3 ) {
         color = "#f00";
       }
       document.getElementById('statusShipShields').style.color = color;
       document.getElementById('statusShipShields').textContent = 
         Math.floor((shipShields / ENTITY_CONFIG.PLAYER.MAX_SHIELDS) * 100);

       color = "#0f0";
       if ( baseShields < ENTITY_CONFIG.BASE.MAX_SHIELDS * .3 ) {
         color = "#f00";
       }
       document.getElementById('statusBaseShields').style.color = color;
       document.getElementById('statusBaseShields').textContent = 
         Math.floor((baseShields / ENTITY_CONFIG.BASE.MAX_SHIELDS) * 100);
     }

     function setLog(msg) {
       document.getElementById('logStatus').textContent = msg;
     }

     function gameOverMessage(msg) {
       gameOver=true;
       isPlayerTurn=false;
       setLog(msg);
     }
    </script>
  </body>
</html>
