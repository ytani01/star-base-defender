<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>Starbase Defender</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
     body {
       margin:0; background:#000; padding:0; overflow:hidden; font-family: Arial, sans-serif;
     }
     #gameContainer {
       display: flex; flex-direction: column; height: 100vh;
     }
     
     #statusPanel {
       background:#111;
       color:#0ff;
       padding:15px;
       flex: 0 0 auto;
       border-bottom:2px solid #08f;
       overflow-y:auto;
       font-size: clamp(14px, 2.5vw, 20px);
       font-family: monospace;
       line-height: 1.1;
     }
     #statusPanel div { margin: 1px 5px; }
     #statusPanel .status-gauge {
       display: inline-block;
       width: 60px;
       height: clamp(12px, 2.5vw, 18px);
       background: #222;
       border: 1px solid #08f;
       margin: 0 0 0 8px; /* 上・右・下を0、左のみ8pxに指定 */
       vertical-align: middle;
     }
     #statusPanel .status-gauge-fill {
       height: 100%;
       background: #0f0;
       width: 100%;
       transition: width 0.2s ease, background-color 0.2s ease;
       margin: 0; /* 枠と中身のズレの原因となるマージンを無効化 */
     }
     
     #logStatus {
       height: 70px;
       line-height: 1.1;
     }

     #gameWrapper { position: relative; flex: 1; min-height: 0; }
     #gameCanvas { width: 100%; height: 100%; }

     #zoomUI {
       position: absolute;
       top: 10px;
       left: 30px;
       display: flex;
       flex-direction: column;
       gap: 10px;
       z-index: 1000;
     }
     #zoomUI button {
       width: 90px;
       height: 90px;
       font-size: 48px;
       background: rgba(0, 136, 255, 0.5);
       color: #fff;
       border: 2px solid #0ff;
       border-radius: 30px;
       cursor: pointer;
       user-select: none;
     }
     #zoomUI button:active {
       background: rgba(0, 255, 255, 0.8);
       color: #000;
     }

     #highScoreOverlay {
       display: none;
       position: fixed;
       inset: 0;
       background: rgba(0, 0, 20, 0.5);
       z-index: 9999;
       align-items: center;
       justify-content: center;
       font-family: monospace;
     }
     #hsPanel {
       border: 2px solid #0ff;
       padding: 28px 32px;
       min-width: 500px;
       max-width: 800px;
       width: 92%;
       background: rgba(8, 8, 32, 0.5);
       box-shadow: 0 0 40px rgba(0,255,255,0.9);
     }
     #hsResultMsg {
       text-align: center;
       font-size: clamp(24px, 5vw, 40px);
       letter-spacing: 3px;
       margin: 0 0 6px 0;
     }
     #hsFinalMsg {
       color: #8df;
       text-align: center;
       font-size: clamp(24px, 2.5vw, 40px);
       margin: 0 0 16px 0;
       padding-bottom: 14px;
       border-bottom: 1px solid rgba(0,255,255,0.25);
     }
     .hs-heading {
       color: #0ff;
       font-size: clamp(24px, 2.2vw, 40px);
       letter-spacing: 2px;
       margin-bottom: 8px;
     }
     #hsTableWrap {
       overflow-x: auto;
     }
     #hsTable {
       width: 100%;
       border-collapse: collapse;
       font-size: clamp(20px, 2.2vw, 40px);
       color: #9cf;
       min-width: 260px;
     }
     #hsTable th {
       color: #0ff;
       text-align: left;
       padding: 4px 6px;
       border-bottom: 1px solid rgba(0,255,255,0.3);
       letter-spacing: 1px;
       white-space: nowrap;
     }
     #hsTable td {
       padding: 6px 6px; white-space: nowrap;
     }
     #hsTable tbody tr.hs-new td {color: #ff0;}
     #hsTable tbody tr {
       cursor: pointer;
       transition: background-color 0.2s;
     }
     #hsTable tbody tr:hover {
       background-color: rgba(0, 255, 255, 0.15);
     }
     #hsNoRecord {
       color: #444;
       text-align: center;
       padding: 14px;
       font-size: clamp(24px, 2.2vw, 40px);
     }
     #hsBtns {
       display: flex;
       gap: 12px;
       justify-content: center;
       margin-top: 20px;
       flex-wrap: wrap;
     }
     .hs-btn {
       padding: 11px 20px;
       font-size: clamp(24px, 2.8vw, 40px);
       font-family: monospace;
       background: rgba(0, 100, 200, 0.3);
       color: #0ff;
       border: 2px solid #0ff;
       border-radius: 4px;
       cursor: pointer;
       letter-spacing: 1px;
       transition: background 0.15s, color 0.15s;
     }
     .hs-btn:hover, .hs-btn:active {
       background: #0ff;
       color: #000;
     }

     #viewScoresBtn {
       font-family: monospace;
       font-size: clamp(14px, 2.5vw, 18px);
       background: transparent;
       color: #0ff;
       border: 1px solid #0ff;
       padding: 3px 8px;
       border-radius: 3px;
       cursor: pointer;
       margin-left: 10px;
       vertical-align: middle;
       transition: background 0.12s, color 0.12s;
     }
     #viewScoresBtn:hover {
       background: #0ff;
       color: #000;
     }
    </style>

    <script>
     // ---------------------------------------------------------
     // 設定・定数の定義
     // ---------------------------------------------------------
     const SYSTEM = {
       SCALE: 0.5,
       R_AREA: 300,
       SCORE: {
         INIT: 100,
         DESTROY_PENALTY: 50,
       },
       NEW_ENEMY_INTERVAL: 40,
       N_STAR: 15,
       N_ENEMY: 3,
       TIMING: {
         BEAM_DUR: 400,
         TURN_DELAY: 400,
         TURN_MARGIN: 10,
         ENEMY_DELAY_MAX: 500, // 敵艦の動作のズレ
         GAMEOVER: 3000,
       }
     };
     SYSTEM.GAME_ID = Phaser.Utils.String.UUID();
     SYSTEM.PLAY_AREA_WIDTH = SYSTEM.R_AREA * 2 + 30;
     SYSTEM.PLAY_AREA_HEIGHT = SYSTEM.PLAY_AREA_WIDTH; 
     SYSTEM.CENTER_X = SYSTEM.PLAY_AREA_WIDTH / 2;
     SYSTEM.CENTER_Y = SYSTEM.PLAY_AREA_HEIGHT / 2;

     const CAMERA = {
       ZOOM_MIN: 1.0,
       ZOOM_MAX: 4.0,
       STEP: 2.0,
     };
     let CurZoom = 1.0;

     const HIGHSCORE = {
       MAX_ENTRIES: 5,
       STORAGE_KEY: 'starbaseDefenderScores'
     };

     let g_playerShip;
     let g_starBase;
     let g_federationShip;
     let g_enemies = [];
     let g_stars = [];

     let g_turn = 1;
     let g_curMission = 1;
     let g_score = SYSTEM.SCORE.INIT;
     let g_isPlayerTurn = true;
     let g_isGameOver = false;
     let g_flagClear = false;
     let g_pendingScene = null;
     let g_curScene = null;

     let rangeGraphics, boundaryGraphics;

     // ---------------------------------------------------------
     // グローバルメソッド
     // ---------------------------------------------------------
     /**
      *
      */
     function getActiveEnemyCount() {
       return g_enemies.filter(enemy => enemy.active).length;
     } // getActiveEnemyCount()

     /**
      * ゲージの描画
      */     
     function drawGauge(g, cx, cy, width, height, ratio, color) {
       g.clear();
       if ( !isFinite(cy) ) {
         return;
       }

       const x = cx - width / 2;
       const y = cy - height / 2;
       
       g.fillStyle(0x888888, 1);
       g.fillRect(x, y, width, height);
       
       const r = Math.max(0, Math.min(1, ratio));
       if (r > 0) {
         g.fillStyle(color, 1);
         g.fillRect(x, y, width * r, height);
       }
     } // drawGauge()

     /**
      * 宇宙域境界の描画
      */
     function drawBoundary(){
       boundaryGraphics.clear();
       boundaryGraphics.lineStyle(2, 0x0088ff, 1);
       boundaryGraphics.strokeCircle(SYSTEM.CENTER_X, SYSTEM.CENTER_Y, SYSTEM.R_AREA);
     } // drawBoundary()

     /**
      * メッセージの表示
      */
     function setMsg(msg, fg="#0ff", bg="transparent") {
       const el = document.getElementById('logStatus')
       el.style.color = fg;
       el.style.backgroundColor = bg;
       el.textContent = msg;
     } // setMsg()

     /**
      * 艦載フェイザーアレイ 照射音ジェネレーター
      * @param {boolean} isPlayer 
      */
     function playBeamSound(isPlayer) {
       if (!window.audioCtx) {
         window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
       }
       if (window.audioCtx.state === 'suspended') {
         window.audioCtx.resume();
       }

       const ctx = window.audioCtx;
       let now = ctx.currentTime

       // ビームの持続時間（SYSTEM.TIMING.BEAM_DURに合わせて500ms）
       let duration = SYSTEM.TIMING.BEAM_DUR / 1000;
       if ( ! isPlayer ) {
         duration = SYSTEM.TIMING.BEAM_DUR / 1000 / 3 * 2;
       }

       // 1. エンベロープ用ゲイン（音量の時間変化）
       const envelope = ctx.createGain();
       envelope.gain.setValueAtTime(0, now);
       envelope.gain.linearRampToValueAtTime(0.3, now + 0.02); // 瞬時に立ち上がる
       envelope.gain.linearRampToValueAtTime(0.2, now + duration * 0.3); // 持続
       envelope.gain.linearRampToValueAtTime(0.1, now + duration * 0.6); // 持続
       envelope.gain.linearRampToValueAtTime(0.05, now + duration * 0.8); // 持続
       envelope.gain.linearRampToValueAtTime(0, now + duration); // 鋭く遮断

       // 2. メインオシレーター（鋸歯状波で厚みのある音色を作る）
       const osc = ctx.createOscillator();
       osc.type = 'sawtooth';
       if ( isPlayer ) {
         osc.frequency.setValueAtTime(800, now);
       } else {
         osc.frequency.setValueAtTime(600, now);
       }
       
       // 3. フィルター（高音域を強調し、エネルギー感を出す）
       const filter = ctx.createBiquadFilter();
       filter.type = 'lowpass';
       filter.frequency.setValueAtTime(2000, now);
       filter.Q.value = 10;

       // 4. LFO（ウネリの生成）
       // 25Hzで揺らすことでTNG以降のフェイザー特有の「ビームが振動している感じ」を作る
       const lfo = ctx.createOscillator();
       lfo.type = 'sine';
       lfo.frequency.value = 20;
       const lfoGain = ctx.createGain();
       lfoGain.gain.value = 150; // 揺らぎの深さ
       //lfoGain.gain.value = 200; // 揺らぎの深さ

       // ルーティング
       lfo.connect(lfoGain);
       lfoGain.connect(osc.frequency); // 周波数を揺らす（ビブラート）
       
       osc.connect(filter);
       filter.connect(envelope);
       envelope.connect(ctx.destination);

       // 再生
       osc.start(now);
       lfo.start(now);
       osc.stop(now + duration);
       lfo.stop(now + duration);
     } // playBeamSound()
     
     // ---------------------------------------------------------
     // クラス定義
     // ---------------------------------------------------------
     /**
      * 兵器クラス
      */
     class Weapon {
       static ALPHA = 0.0075 / SYSTEM.SCALE;
       static E_THRESHOLD = 0.45; // effective threshold
       static MAX_THRESHOLD = 0.2;

       constructor(max_power, e_threshold, max_threshold) {
         this.max_power = max_power;
         this.e_threshold = e_threshold;
         this.max_threshold = max_threshold;
       }
       
       static EffectiveRange() {
         return Math.floor(Math.log(this.E_THRESHOLD) / this.ALPHA) * -1;
       }
       static MaxRange() {
         return Math.floor(Math.log(this.MAX_THRESHOLD) / this.ALPHA) * -1;
       }

       /**
        * 距離に応じた武器の威力減衰率（有効度）を計算する
        */
       static Effectiveness(distance) {
         return Math.exp(this.ALPHA * distance * -1.0);
       }

       static CalcDamage(max_power, distance) {
         return Math.floor(max_power * this.Effectiveness(distance));
       }
     } // class Weapon

     /**
      *
      */
     class GameObj {
       constructor(scene, x, y, texture, scale=SYSTEM.SCALE) {
         this.scene = scene;
         this.scale = scale;
         this.sprite = scene.add.image(x, y, texture).setScale(scale);
         this.active = true;
       }

       get x() {
         return this.sprite.x;
       }
       set x(val) {
         this.sprite.x = val;
       }

       get y() {
         return this.sprite.y;
       }
       set y(val) {
         this.sprite.y = val;
       }

       get src_w() {
         return this.sprite.width;
       }
       get src_h() {
         return this.sprite.height;
       }
       get src_r() {
         return (this.src_w + this.src_h) / 4;
       }

       get w() {
         return this.src_w * this.scale;
       }
       get h() {
         return this.src_h * this.scale;
       }
       get r() {
         return (this.w + this.h) / 4;
       }

       destroy() {
         this.sprite.destroy();
         this.active = false;
       }
     } // class GameObj

     /**
      *
      */
     class ObjWithShield extends GameObj {
       static SHIELD_MAX = 0; // dummy
       static GAUGE_H = 8;
       static GAUGE_Y_OFFSET = 18;

       constructor(
         scene, x, y, texture,
         shield, shield_gauge_color,
         scale=SYSTEM.SCALE
       ) {
         super(scene, x, y, texture, scale);
         this.shield = shield;
         this.shield_gauge_color = shield_gauge_color;

         this.gauge_h = this.constructor.GAUGE_H * scale;
         this.gauge_y = this.h + this.constructor.GAUGE_Y_OFFSET * scale;
         this.gauge_w = this.w;

         this.shield_gauge = this.scene.add.graphics();
         this.shield_circle = this.scene.add.graphics();
       }

       update() {
         if (! this.active ) {
           if (this.shield_gauge) {
             this.shield_gauge.destroy();
             this.shield_circle.destroy();
           }
           return;
         }

         //
         // draw Shield circle
         //
         const shield_ratio = this.shield / this.constructor.SHIELD_MAX;
         let shield_color = 0xffffff;
         if ( shield_ratio < 0.5 ) {
           shield_color = 0xffff00;
         }
         if ( shield_ratio < 0.25 ) {
           shield_color = 0xff0000;
         }
         this.shield_circle.clear();
         this.shield_circle.lineStyle(3 * shield_ratio, shield_color, 1);
         this.shield_circle.strokeCircle(this.x, this.y, this.r);

         drawGauge(
           this.shield_gauge,
           this.x, this.y + (this.gauge_y * this.scale),
           this.gauge_w, this.gauge_h,
           this.shield / this.constructor.SHIELD_MAX,
           this.shield_gauge_color
         );
       } // update()

       /**
        *
        */
       takeDamage(amount) {
         this.shield -= amount;
         if (this.shield <= 0) {
           g_score -= SYSTEM.SCORE.DESTROY_PENALTY;
           this.die();
         }
       } // takeDamage()

       /**
        *
        */
       die() {
         this.shield = 0;
         this.active = false;
         if ( this.shield_gauge ) {
           this.shield_gauge.destroy();
         }
         if ( this.shield_circle ) {
           this.shield_circle.destroy();
         }
         this.destroy();
       } // die()
     } // class ObjWithShield
     
     /**
      *
      */
     class ObjWithEnergy extends ObjWithShield {
       constructor(
         scene, x, y, texture,
         shield, gauge_color,
         energy, energy_color,
         scale=SYSTEM.SCALE
       ) {
         super(scene, x, y, texture, shield, gauge_color, scale);
         this.energy = energy;
         this.energy_gauge_color = energy_color;

         this.energy_gauge = this.scene.add.graphics();
       }

       update() {
         super.update();
         drawGauge(
           this.energy_gauge,
           this.x, this.y + (this.gauge_y * this.scale) + this.gauge_h + 1,
           this.gauge_w, this.gauge_h,
           this.energy / this.constructor.ENERGY_MAX,
           this.energy_gauge_color
         );         
       }
     } // class ObjWithEnergy

     } // class PlayerShip

     // ---------------------------------------------------------
     // ゲーム(Phaser)初期化・ループ
     // ---------------------------------------------------------
     const config = {
       type: Phaser.AUTO,
       backgroundColor: '#0a0a2a',
       parent: 'gameCanvas',
       scale: {
         mode: Phaser.Scale.FIT,
         autoCenter: Phaser.Scale.CENTER_HORIZONTALLY,
         width: SYSTEM.PLAY_AREA_WIDTH,
         height: SYSTEM.PLAY_AREA_HEIGHT
       },
       scene: { preload, create, update }
     };

     new Phaser.Game(config);

     /**
      * 画像の生成
      */
     function preload(){
       const g = this.make.graphics({add:false});

       // PlayerShip
       g.fillStyle(0x4488ff);
       g.fillRect(27,25,8,24);
       g.fillStyle(0x4488ff);
       g.fillRect(10,30,10,22);
       g.fillRect(40,30,10,22);
       g.fillStyle(0x4488ff);
       g.fillEllipse(30,17,35,30);
       g.generateTexture('PlayerImg',60,60);
       
       g.clear();

       // Enemy
       g.fillStyle(0x228822);
       g.beginPath();
       g.moveTo(31,57);
       g.lineTo(55,40);
       g.lineTo(55,20);

     /**
      * ズーム倍率変更
      */
     function changeZoom(scene, amount) {
       let nextZoom = 1.0;
       if ( amount > 0 ) {
         nextZoom = CurZoom * amount;
       }
       if ( amount < 0 ) {
         nextZoom = CurZoom / -amount;
       }
       CurZoom = Phaser.Math.Clamp(nextZoom, CAMERA.ZOOM_MIN, CAMERA.ZOOM_MAX);
       
       scene.tweens.add({
         targets: scene.cameras.main,
         zoom: CurZoom,
         duration: 250,
         ease: 'Sine.easeInOut'
       });
     }

     /**
      *
      */
     function getSafeRandPos(minDist, maxDist){
       let x, y, distToCenter;
       let safe = false;
       let attempts = 0;
       
       // オブジェクト同士が重ならないための最低距離
       const MIN_SPAWN_DIST = PlayerShip.R * 3.5;
       console.log(`MIN_SPAWN_DIST=${MIN_SPAWN_DIST}`);
       
       while(!safe && attempts < 100) {
         x = Phaser.Math.Between(
           SYSTEM.CENTER_X - SYSTEM.R_AREA, SYSTEM.CENTER_X + SYSTEM.R_AREA
         );
         y = Phaser.Math.Between(
           SYSTEM.CENTER_Y - SYSTEM.R_AREA, SYSTEM.CENTER_Y + SYSTEM.R_AREA
         );
         distToCenter = Phaser.Math.Distance.Between(x, y, SYSTEM.CENTER_X, SYSTEM.CENTER_Y);
         
         if ( distToCenter < SYSTEM.R_AREA * minDist ) {
           continue;
         }
         if ( distToCenter > SYSTEM.R_AREA * maxDist ) {
           continue;
         }
         
         safe = true;

         for(let s of g_stars) {
           if (
             s.active && Phaser.Math.Distance.Between(x, y, s.x, s.y) < MIN_SPAWN_DIST
           ) {
             safe = false;
             break;
           }
         }
         if(!safe) continue;

         for(let e of g_enemies) {
           if (
             e.active && Phaser.Math.Distance.Between(x, y, e.x, e.y) < MIN_SPAWN_DIST
           ) {
             safe = false; break;
           }
         }
         attempts++;
       }
       return { x, y };
     } // getSafeRandPos()

     function hasObstacleOnPath(ax,ay,bx,by,cx,cy,r) {
       const dx = bx - ax, dy = by - ay;
       const a = dx * dx + dy * dy;
       if (a < 0.001) {
         return false;
       }
       const fx = ax - cx, fy = ay - cy;
       const b = 2*(fx * dx + fy * dy);
       const c = fx*fx + fy*fy - r*r;
       const disc = b*b-4*a*c;
       if ( disc < 0 ) {
         return false;
       }
       const t1 = (-b-Math.sqrt(disc)) / (2*a);
       const t2 = (-b+Math.sqrt(disc)) / (2*a);

       return (t1 > 0.05 && t1 < 0.95) || (t2 > 0.05 && t2 < 0.95);
     }

     /**
      * LOS(Line of Sight、射線)がブロックされてないか？
      */
     function isLOSBlocked(srcObj, targetObj, checkBase = true) {
       // 1. 星（障害物）による遮蔽の判定
       let hitStar = g_stars.some(s => 
         s.active && hasObstacleOnPath(
           srcObj.x, srcObj.y, targetObj.x, targetObj.y, s.x, s.y, Star.R
         )
       );
       if (hitStar) return true;

       // 2. 基地による遮蔽の判定（基地の見た目のサイズで正確に判定）
       if (checkBase && g_starBase && g_starBase.active && g_starBase.shield > 0) {
         if (hasObstacleOnPath(
           srcObj.x, srcObj.y, targetObj.x, targetObj.y, g_starBase.x, g_starBase.y, StarBase.R
         )) {
           return true;
         }
       }
       return false;
     } // isLOSBlocked()

     /**

     function handlePointerDown(pointer) {
       if (g_isGameOver || !g_isPlayerTurn) return;

       // 1. 判定対象をまとめ、クリックされたオブジェクトを特定
       // 配列の先頭から評価されるため、重なっている場合は g_enemies が優先される

         if (!e || !e.active) return false;
         return Phaser.Math.Distance.Between(pointer.worldX, pointer.worldY, e.x, e.y) < e.r;
       });
       if ( clickedObj ) {
         console.log(`clickedObj=${clickedObj.constructor.name}`);

       // ターン終了の共通処理
       const endTurn = () => {
         g_isPlayerTurn = false;

         this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
         updateStatus();
       };

       // 2. オブジェクトに応じたアクションの分岐
       // クラス定義やインスタンスを利用してスッキリと切り分ける
       if (clickedObj === g_starBase) {
         // --- 基地に対するアクション ---
         if (g_playerShip.is_docked) {
           setMsg("STARBASE: ドッキング中。エネルギー補給完了してます。いつでも出航できます。");
           endTurn();
           return;

         const distToBase = Phaser.Math.Distance.Between(g_playerShip.x, g_playerShip.y, g_starBase.x, g_starBase.y);
         console.log(`distToBase=${distToBase}`);

         if (canDock()) {
           dockShip(this);
           endTurn();
           return;
         }

         attemptPlayerMove(this, g_starBase.x, g_starBase.y, SYSTEM.TIMING.TURN_DELAY);

         if (g_playerShip.energy < PlayerShip.ENERGY_MIN && !g_playerShip.is_docked) {
           updateStatus();
           gameOver("艦内コンピュータ: パワー障害。生命維持装置ダウン...");
         }
       } else if (clickedObj instanceof EnemyShip) {
         // --- 敵に対するアクション ---
         if (g_playerShip.is_docked) {
           setMsg("戦術士官: ドッキング中のため、兵器は使用できません。", "#a00");
           return;
         }
         if (g_playerShip.energy < PlayerShip.WEAPON_COST) {
           setMsg("戦術士官: エネルギー不足で攻撃できません！", "#f00");
           return;
         }

         // 発射
         g_playerShip.energy -= PlayerShip.WEAPON_COST;
         const dist = Phaser.Math.Distance.Between(
           g_playerShip.x, g_playerShip.y, clickedObj.x, clickedObj.y
         );

         if (dist > Weapon.MaxRange()) {
           setMsg("戦術士官: 射程範囲外のため、敵艦にダメージなし。", "#ff0");
           fireBeam(this, g_playerShip, clickedObj, 0x444444);
           endTurn();
           return;
         }
         if (isLOSBlocked(g_playerShip, clickedObj, false)) {
           setMsg("戦術士官: 障害物に遮られ、敵艦にダメージなし。", "#ff0");
           fireBeam(this, g_playerShip, clickedObj, 0x444444);
           endTurn();
           return;
         }

         // 命中
         setMsg("戦術士官: 攻撃命中！ 敵艦シールド減少！", "#f80");
         const damage = Weapon.CalcDamage(PlayerShip.WEAPON_POWER, dist);
         clickedObj.takeDamage(damage);
         fireBeam(this, g_playerShip, clickedObj, 0x00ffff);

         if (!clickedObj.active) {

           const rp = getSafeRandPos(0.8, 0.95);
           g_enemies.push(new EnemyShip(this, rp.x, rp.y));
           setMsg("戦術士官: 敵艦を撃破！ 別の新たな敵艦を検知しました！", "#ff0");
         }
         endTurn();
       } else if (clickedObj === g_playerShip) {
         // --- 自機のシールド強化
         const d_shield = PlayerShip.SHIELD_MAX - g_playerShip.shield;
         console.log(`d_shield=${d_shield}, g_playerShip.energy=${g_playerShip.energy}`);
         if ( d_shield <= 0 ) {
           setMsg("機関部: シールドはすでに最大です。", "#fff", "#111");

         // d_shield > 0

         if ( energy_supply <= 0 ) {

         }

         g_playerShip.energy -= energy_supply;
         g_playerShip.shield += energy_supply;

         const shield_p = Math.floor(g_playerShip.shield / PlayerShip.SHIELD_MAX * 100);
         const energy_p = Math.floor(g_playerShip.energy / PlayerShip.ENERGY_MAX * 100);
         setMsg(
           `機関部: シールド ${shield_p}% に増強。エネルギー残量 ${energy_p}。`,

         );

       } else {

         attemptPlayerMove(this, pointer.worldX, pointer.worldY, SYSTEM.TIMING.TURN_DELAY);

     /**
      * なにか衝突したら停止するように座標を計算
      */
     function clampDest(obj, destX, destY, ignoreObjs = []) {
       // オブジェクトから直接現在座標を取得
       const startX = obj.x;
       const startY = obj.y;

       const targets = [g_starBase, ...g_enemies, ...g_stars].filter(
         e => e && e.active && e !== obj && !ignoreObjs.includes(e)
       );

       if (obj instanceof PlayerShip) {
         if (g_federationShip) {
           targets.push(g_federationShip);
         }
       }
       if (obj instanceof FederationShip) {
         targets.push(g_playerShip);
       }
       if (obj instanceof EnemyShip) {
         targets.push(g_playerShip);
         if ( g_federationShip && g_federationShip.active ) {
           targets.push(g_federationShip);
         }
       }

       const dx = destX - startX;
       const dy = destY - startY;
       const lenSq = dx * dx + dy * dy;
       if (lenSq < 0.0001) return { x: destX, y: destY };

       let minT = 1.0; 

       for (const tgt of targets) {
         let R = (obj.w + tgt.w) / 2;
         //console.log(`R=${R}`);

         const curDist = Phaser.Math.Distance.Between(startX, startY, tgt.x, tgt.y);
         if (curDist < R) continue;

         const fx = startX - tgt.x;
         const fy = startY - tgt.y;
         const a = lenSq;
         const b = 2 * (fx * dx + fy * dy);
         const c = fx * fx + fy * fy - R * R;
         const disc = b * b - 4 * a * c;
         if (disc < 0) continue; 
         const t = (-b - Math.sqrt(disc)) / (2 * a);
         if (t > 0 && t < minT) minT = t;
       }  // for ()

       if (minT < 1.0) {
         const len = Math.sqrt(lenSq);
         const stopT = Math.max(0, minT - 1.0 / len);
         return { x: startX + dx * stopT, y: startY + dy * stopT };
       }
       return { x: destX, y: destY };
     } // clampDest(..)

     /**
      * ターゲットへの方向ベクトル（追尾・逃走）を算出する
      */
     function getTargetVector(e, target, isFleeing) {
       let dirX = 0, dirY = 0;
       
       if (isFleeing && Array.isArray(target)) {
         target.forEach(t => {
           let dx = e.x - t.x;
           let dy = e.y - t.y;
           let dist = Math.hypot(dx, dy);
           if (dist > 0.001) {
             let weight = 1.0 / dist;
             dirX += (dx / dist) * weight;
             dirY += (dy / dist) * weight;
           }
         });
         let fDist = Math.hypot(dirX, dirY);
         if (fDist > 0.000001) {
           dirX /= fDist;
           dirY /= fDist;
         }
       } else {
         let dx = target.x - e.x;
         let dy = target.y - e.y;
         if (isFleeing) {
           dx = -dx;
           dy = -dy;
         }
         let dist = Math.hypot(dx, dy);
         if (dist > 0.001) {
           dirX = dx / dist;
           dirY = dy / dist;
         }
       }
       return { x: dirX, y: dirY };
     } // getTargetVector()

     /**
      * 進行方向に障害物がある場合、少しずつ角度をずらして迂回ルートを探す。
      * 完全に接している場合でも滑らかに回り込み、大回りせずに障害物に沿って停止する。
      */
     function resolveMovement(obj, desiredX, desiredY, speed, ignoreObjs = []) {
       const x = obj.x;
       const y = obj.y;

       let dx = desiredX - x;
       let dy = desiredY - y;
       let reqDistSq = dx * dx + dy * dy;
       
       // 1. 直進で到達可能か評価
       let directDest = clampDest(obj, desiredX, desiredY, ignoreObjs);
       let directMoveSq = (directDest.x - x)**2 + (directDest.y - y)**2;
       
       // 障害物なし（または目的地が手前）ならそのまま採用
       if (directMoveSq >= reqDistSq * 0.99) {
         return directDest;
       }

       // 2. 障害物に阻まれた場合、迂回ルートを走査
       let baseAngle = Math.atan2(dy, dx);
       let bestDest = directDest;
       let minTargetDistSq = (directDest.x - desiredX)**2 + (directDest.y - desiredY)**2;

       // 左右両方向を走査
       for (let sign of [1, -1]) {
         // 5度刻みで最大90度まで走査
         for (let i = 5; i <= 90; i += 5) {
           let offset = (i * Math.PI) / 180;
           let testAngle = baseAngle + offset * sign;
           
           // 【重要】角度が逸れるほど移動予定距離をコサインで減衰させ、大回りを防ぐ
           let adjustedSpeed = speed * Math.cos(offset);
           
           let testX = x + Math.cos(testAngle) * adjustedSpeed;
           let testY = y + Math.sin(testAngle) * adjustedSpeed;
           
           let clamped = clampDest(obj, testX, testY, ignoreObjs);
           
           let moveDistSq = (clamped.x - x)**2 + (clamped.y - y)**2;
           let distToTargetSq = (clamped.x - desiredX)**2 + (clamped.y - desiredY)**2;
           
           // 全く動けないルートは無視（0.1ピクセル未満）
           if (moveDistSq < 0.1) continue;

           // 現在のベストルートが「スタック状態（ほぼ動けない）」か判定
           let currentBestMoveSq = (bestDest.x - x)**2 + (bestDest.y - y)**2;
           let stuck = currentBestMoveSq < 1.0;

           // 「より本来の目的地に近い」か、「スタックから抜け出せる」ならベストルートを更新
           if (distToTargetSq < minTargetDistSq || stuck) {
             minTargetDistSq = distToTargetSq;
             bestDest = clamped;
           }

           // 障害物を回避して空き地に出た場合（調整後のスピードをほぼ出し切れた）
           // これ以上角度を広げても無駄に横へ行くだけなので、この方向の走査を打ち切る
           if (moveDistSq >= (adjustedSpeed * 0.95)**2) {
             break; 
           }
         } // for ()
       } // for () 
       
       return bestDest;
     } //  resolveMovement(..)

     /**
      * ドッキングできるか確認
      */
     function canDock() {
       // 到達距離
       const dist = Phaser.Math.Distance.Between(
         g_playerShip.x, g_playerShip.y,
         g_starBase.x, g_starBase.y
       );

       if (dist > PlayerShip.SPEED) {
         return false;
       }

       // 星
       for (const s of g_stars) {
         if (!s.active) continue;

         if (hasObstacleOnPath(
           g_playerShip.x, g_playerShip.y,
           g_starBase.x, g_starBase.y,
           s.x, s.y,
           s.r
         )) {
           return false;
         }
       }

       // 敵艦
       for (const e of g_enemies) {
         if (!e.active) continue;

         if (hasObstacleOnPath(
           g_playerShip.x, g_playerShip.y,
           g_starBase.x, g_starBase.y,
           e.x, e.y,
           e.r
         )) {
           return false;
         }
       }

       // 連邦艦
       if (g_federationShip && g_federationShip.active) {
         if (hasObstacleOnPath(
           g_playerShip.x, g_playerShip.y,
           g_starBase.x, g_starBase.y,
           g_federationShip.x,
           g_federationShip.y,
           g_federationShip.r
         )) {
           return false;
         }
       }

       return true;
     }

     /**
      *
      */
     function dockShip(scene) {
       g_playerShip.is_docked = true;

       // 補給
       g_playerShip.shield = PlayerShip.SHIELD_MAX;
       g_playerShip.energy = PlayerShip.ENERGY_MAX;
       
       const angle = Phaser.Math.Angle.Between(
         g_starBase.x,
         g_starBase.y,
         g_playerShip.x,
         g_playerShip.y
       );

       const dockX =
         g_starBase.x +
         Math.cos(angle) * (StarBase.R - PlayerShip.R);
       const dockY =
         g_starBase.y +
         Math.sin(angle) * (StarBase.R - PlayerShip.R);

       scene.tweens.add({
         targets: g_playerShip,
         x: dockX,
         y: dockY,
         duration: 200,
         ease: 'Sine.easeInOut'
       });
       setMsg("STARBASE: ドッキング完了", "#220", "#0ff");
       updateStatus();
     } // dockShip()

     /**
      * ターゲット群に対するステアリングベクトル（斥力・接線力）を計算するコア関数
      */
     function calcAvoidanceForce(obj, targets, radiusMultiplier, repulsionWeight, tangentialWeight) {
       let accX = 0, accY = 0;
       
       targets.forEach(t => {
         if (!t.active || t === obj) return;
         
         // オブジェクト自身の半径(r)を基準に回避半径を動的算出
         const avoidRadius = t.r * radiusMultiplier;
         let dx = obj.x - t.x;
         let dy = obj.y - t.y;
         let dist = Math.hypot(dx, dy);
         
         if (dist > 0 && dist < avoidRadius) {
           let force = 1.0 - (dist / avoidRadius);
           accX += (dx / dist) * force * repulsionWeight - (dy / dist) * force * tangentialWeight;
           accY += (dy / dist) * force * repulsionWeight + (dx / dist) * force * tangentialWeight;
         }
       });
       
       return { x: accX, y: accY };
     } // calcAvoidanceForce()

     /**
      * 障害物や他ユニットからの回避・分離ベクトルを算出する（自機・敵機兼用）
      */
     function getAvoidanceVector(obj, obstacles) {
       // 1. 障害物(星・基地)からの反発力 + 回り込み力
       // (回避半径: 3.5倍, 斥力: 1.5, 接線力: 1.0)
       let avoid = calcAvoidanceForce(obj, obstacles, 3.5, 1.5, 1.0);

       // 2. 他ユニット(敵)からの反発力（分離）
       // (回避半径: 2.5倍, 斥力: 2.0, 接線力: 0.0)
       let sep = calcAvoidanceForce(obj, g_enemies, 2.5, 2.0, 0.0);

       return { x: avoid.x + sep.x, y: avoid.y + sep.y };
     } // getAvoidanceVector()

     /**
      * 自機の移動処理（敵と同じステアリングロジックを適用）
      */
     function attemptPlayerMove(scene, targetX, targetY, delayBeforeEnemyTurn) {
       console.log(`targetX=${targetX}, targetY=${targetY}`);
       let rawDist = Phaser.Math.Distance.Between(g_playerShip.x, g_playerShip.y, targetX, targetY);
       console.log(`rawDist=${rawDist}`);
       if (rawDist < 1) {
         return;
       }
       let moveDist = Math.min(rawDist, PlayerShip.SPEED);
       console.log(`moveDist=${rawDist}`);

       // 基地がドッキング目的地かどうか判定
       let target_is_base = false;
       let dist_target_base = Phaser.Math.Distance.Between(targetX, targetY, g_starBase.x, g_starBase.y);
       if (dist_target_base <= StarBase.DOCKING_RANGE) {
         target_is_base = true;
       }
       console.log(`target_is_base=${target_is_base}`);

       let target = { x: targetX, y: targetY };
       let targetVec = getTargetVector(g_playerShip, target, false);
       console.log(`targetVec=(${targetVec.x},${targetVec.y})`);

       let obstacles = [...g_stars];
       if (!canDock()) {
         obstacles.push(g_starBase);
       }
       let avoidVec = getAvoidanceVector(g_playerShip, obstacles);
       console.log(`avoidVec=(${avoidVec.x}, ${avoidVec.y})`);

       // ベクトル合成（敵と全く同じバランス）
       let finalX = targetVec.x * 1.0 + avoidVec.x;
       let finalY = targetVec.y * 1.0 + avoidVec.y;
       let finalDist = Math.hypot(finalX, finalY);

       if (finalDist < 0.001) {
         let randomAngle = Math.random() * Math.PI * 2;
         finalX = Math.cos(randomAngle);
         finalY = Math.sin(randomAngle);
         finalDist = 1.0;
       }

       // 正規化した方向に予定距離(moveDist)を掛ける
       let desiredX = g_playerShip.x + (finalX / finalDist) * moveDist;
       let desiredY = g_playerShip.y + (finalY / finalDist) * moveDist;

       // resolveMovementでめり込みと最終的な迂回軌道を解決
       //const ignoreObjs = target_is_base && canDock() ? [g_starBase]: [];
       const ignoreObjs = [g_starBase];
       console.log(`ignoreObjs=${ignoreObjs}`);
       const finalDest = resolveMovement(
         g_playerShip, desiredX, desiredY, moveDist, ignoreObjs
       );
       let destX = finalDest.x;
       let destY = finalDest.y;

       let distance = Phaser.Math.Distance.Between(g_playerShip.x, g_playerShip.y, destX, destY);
       if (distance < 1) return;
       
       setMsg("操舵手: インパルスエンジン、コースセット ... 移動完了");

       // --- 以降は既存のエネルギー消費・ドッキング処理 ---
       let skipAutoDock = false;
       if (g_playerShip.is_docked) {
         g_playerShip.is_docked = false;
         skipAutoDock = true;
         g_playerShip.shield = PlayerShip.SHIELD_MAX;
         setMsg("STARBASE: ドッキング解除");
         updateStatus();
       }

       const actualDist = Phaser.Math.Distance.Between(g_playerShip.x, g_playerShip.y, destX, destY);
       let cost = Math.max(1, Math.ceil(actualDist * PlayerShip.MOVE_COST_RATE));
       if ( g_playerShip.energy - cost <= PlayerShip.ENERGY_MIN ) {
         if ( target_is_base ) {
           gameOver("機関部: エネルギー消失！ 全システムダウン！");
           return;
         }
         setMsg("機関部: エネルギー不足で移動できません");
         return;
       }

       g_playerShip.energy -= cost;
       g_isPlayerTurn = false;
       scene.tweens.add({
         targets: g_playerShip,
         x: destX, y: destY,
         duration: SYSTEM.TIMING.TURN_DELAY,
         onComplete: () => {
           if (!skipAutoDock) {
             const dockDist = Phaser.Math.Distance.Between(g_playerShip.x, g_playerShip.y, g_starBase.x, g_starBase.y);
             if (
               !g_playerShip.is_docked && dockDist <= StarBase.DOCKING_RANGE
               && g_starBase.active && g_starBase.shield > 0
               && target_is_base
             ) {
               dockShip(scene);
               scene.time.delayedCall(220, () =>
                 scene.time.delayedCall(delayBeforeEnemyTurn, () => enemyTurn(scene)));
               return;
             }
           }
           scene.time.delayedCall(delayBeforeEnemyTurn, () => enemyTurn(scene));
         }
       });
       updateStatus();
     } // attemptPlayerMove()

     /**
      * 敵の目的地計算
      */
     function calcDest(e, target, isFleeing = false) {
       let targetVec = getTargetVector(e, target, isFleeing);
       let avoidVec = getAvoidanceVector(e, g_stars);
       
       let finalX = targetVec.x * 1.0 + avoidVec.x;
       let finalY = targetVec.y * 1.0 + avoidVec.y;

       let finalDist = Math.hypot(finalX, finalY);
       if (finalDist < 0.001) {
         let randomAngle = Math.random() * Math.PI * 2;
         finalX = Math.cos(randomAngle);
         finalY = Math.sin(randomAngle);
         finalDist = 1.0;
       }

       const speed = e.constructor.SPEED; // 実行元インスタンスのクラスから速度を動的取得
       let desiredX = e.x + (finalX / finalDist) * speed;
       let desiredY = e.y + (finalY / finalDist) * speed;

       return resolveMovement(e, desiredX, desiredY, speed);
     }
     
     /**
      *
      */
     function fireBeam(scene, srcObj, targetObj, color) {
       const beam = scene.add.graphics();
       beam.lineStyle(4, color, 1);
       beam.lineBetween(srcObj.x, srcObj.y, targetObj.x, targetObj.y);
       scene.time.delayedCall(SYSTEM.TIMING.BEAM_DUR, () => beam.destroy());

       playBeamSound(srcObj === g_playerShip);
     } // fireBeam(..)

     // ---------------------------------------------------------
     // 敵ターンの処理
     // ---------------------------------------------------------
     /**
      * NPCターン全体の制御（エントリーポイント）
      */
     function enemyTurn(scene) {
       if (g_isGameOver) return;

       // 敵艦と連邦艦をひとつの配列にまとめて処理する
       const npcs = [...g_enemies];
       if (typeof g_federationShip !== 'undefined' && g_federationShip && g_federationShip.active) {
         npcs.push(g_federationShip);
       }

       npcs.forEach(npc => {
         const startDelay = Math.random() * SYSTEM.TIMING.ENEMY_DELAY_MAX;
         scene.time.delayedCall(startDelay, () => execNPCAction(scene, npc));
       });

       const totalDelay = SYSTEM.TIMING.TURN_DELAY + SYSTEM.TIMING.TURN_MARGIN + SYSTEM.TIMING.ENEMY_DELAY_MAX;
       scene.time.delayedCall(totalDelay, () => finalizeEnemyTurn(scene));
     } // enemyTurn()

     /**
      * NPC1体の具体的な行動（思考と実行）
      */
     function execNPCAction(scene, npc) {
       if (g_isGameOver || !npc.active) return;
       const context = evalNPCTacticalSituation(npc);

       if (context.isFleeing) {
         npcMove(scene, npc, context);
       } else if (context.canAttack) {
         npcAttack(scene, npc, context.target, context.distToTarget);
       } else {
         npcMove(scene, npc, context);
       }
     } // execNPCAction()

     /**
      * クラス(所属)に応じた戦況の評価
      */
     function evalNPCTacticalSituation(npc) {
       const isFleeing = npc.fear_mind > (npc.shield / npc.constructor.SHIELD_MAX);
       let target = null;
       let distToTarget = Infinity;
       let canAttack = false;

       if (npc instanceof EnemyShip) {
         // 敵艦から見たターゲット候補リスト
         let potentialTargets = [g_playerShip, g_starBase];
         if (typeof g_federationShip !== 'undefined' && g_federationShip && g_federationShip.active) {
           potentialTargets.push(g_federationShip);
         }

         let bestAttackableTarget = null;
         let bestAttackableDist = Infinity;
         let closestTarget = null;
         let closestDist = Infinity;

         potentialTargets.forEach(t => {
           if (!t || !t.active) return;
           if (t === g_playerShip && g_playerShip.is_docked) {
             return;
           }

           let d = Phaser.Math.Distance.Between(npc.x, npc.y, t.x, t.y);
           
           // 最短距離の対象を記録（攻撃不可の場合の追跡目標）
           if (d < closestDist) {
             closestDist = d;
             closestTarget = t;
           }

           // 攻撃可能な対象を評価
           if (!isFleeing && d <= Weapon.EffectiveRange()) {
             let checkBaseObstacle = (t !== g_starBase);
             if (!isLOSBlocked(npc, t, checkBaseObstacle)) {
               if (d < bestAttackableDist) {
                 bestAttackableDist = d;
                 bestAttackableTarget = t;
               }
             }
           }
         });

         if (bestAttackableTarget) {
           target = bestAttackableTarget;
           distToTarget = bestAttackableDist;
           canAttack = true;
         } else {
           target = closestTarget;
           distToTarget = closestDist;
           canAttack = false;
         }

       } else if (npc instanceof FederationShip) {
         // 連邦艦は最も近い敵を探す
         g_enemies.forEach(e => {
           if (!e.active) return;
           let d = Phaser.Math.Distance.Between(npc.x, npc.y, e.x, e.y);
           if (d < distToTarget) { distToTarget = d; target = e; }
         });
         
         if (target && !isFleeing) {
           canAttack = (distToTarget <= Weapon.EffectiveRange()) && !isLOSBlocked(npc, target, true);
         }
       }

       return { target, distToTarget, canAttack, isFleeing };
     } // evalNPCTacticalSituation()

     /**
      * 攻撃処理（共通）
      */
     function npcAttack(scene, npc, target, distance) {
       const beamColor = npc instanceof FederationShip ? 0x0088ff : 0xff00ff;
       fireBeam(scene, npc, target, beamColor);
       
       const damage = Weapon.CalcDamage(npc.constructor.WEAPON_POWER, distance);
       target.takeDamage(damage);

       if (npc instanceof EnemyShip) {
         if (target.shield <= 0 && !g_isGameOver) {
           updateStatus();
           // 対象に応じた正確な死亡処理への分岐
           if (target === g_starBase) {
             gameOver("STARBASE: シールド消失！！ もちこたえられませ...");
           } else if (target === g_playerShip) {
             gameOver("機関部: 船体強度 ゼロ！！ 船が破壊...");
           } else if (target === g_federationShip) {
             setMsg("通信士: 連邦艦の反応が消失しました...", "#f00");
           }
         }
       } else if (npc instanceof FederationShip) {
         if (!target.active) {
           g_enemies = g_enemies.filter(e => e !== target);
           setMsg("通信士: 連邦艦が敵艦を撃破しました！", "#0f0");
         }
       }
     } // npcAttack()

     /**
      * 移動処理とシールド回復（共通）
      */
     function npcMove(scene, npc, context) {
       let targetDest;
       let moveAsFleeing = context.isFleeing;

       if (context.isFleeing) {
         let threats = [g_playerShip, g_starBase];
         if ( npc === g_federationShip ) {
           threats = g_enemies.filter(e => e.active && e !== npc);
         }
         targetDest = threats.map(t => ({ x: t.x, y: t.y }));
         moveAsFleeing = true; // 逃走フラグを維持して反転計算させる
       } else {
         // 逃走中でない場合：ターゲットがいれば追跡、いなければ基地へ向かう
         targetDest = context.target ? { x: context.target.x, y: context.target.y } : { x: g_starBase.x, y: g_starBase.y };
         moveAsFleeing = false;
       }

       const dest = calcDest(npc, targetDest, moveAsFleeing);

       scene.tweens.add({
         targets: npc,
         x: dest.x, y: dest.y,
         duration: SYSTEM.TIMING.TURN_DELAY,
         onComplete: () => {
           const distFromCenter = Phaser.Math.Distance.Between(
             npc.x, npc.y, SYSTEM.CENTER_X, SYSTEM.CENTER_Y
           );
           if (distFromCenter > SYSTEM.R_AREA) {
             npc.die();
             if (npc instanceof EnemyShip) {
               g_enemies.forEach(e => {
                 e.fear_mind = Math.min(EnemyShip.FEAR_MAX, e.fear_mind + EnemyShip.FEAR_STEP);
               });
               if (!g_isGameOver) {
                 setMsg(`副長: 敵艦が退却。残存敵数、${getActiveEnemyCount()}隻`, "#0f0", "#222");
               }
             } else if (npc instanceof FederationShip) {
               setMsg("通信士: 連邦艦が宙域から離脱しました。", "#88f");
             }
           }
         }
       });

       npc.x = Math.floor(npc.x);
       npc.y = Math.floor(npc.y);

       // ステータス回復処理
       npc.shield = Math.min(
         npc.constructor.SHIELD_MAX,
         npc.shield + (npc.constructor.SHIELD_MAX * npc.constructor.SHIELD_RECOVERY_RATE)
       );
       if ( !context.isFleeing ) {
         npc.fear_mind = Math.max(
           npc.constructor.FEAR_MIN,
           (npc.fear_mind - npc.constructor.FEAR_RECOVERY)
         );
       }
       console.log(`fear_mind=${npc.fear_mind.toFixed(3)}`);
     } // npcMove()
     
     /**
      * ターン終了処理と次ターンへの準備
      */
     function finalizeEnemyTurn(scene) {
       g_enemies = g_enemies.filter(e => e.active);
       
       if (g_enemies.length === 0 && !g_isGameOver) {
         nextMission(scene);
         return;
       }

       if ( g_isGameOver ) {
         return;
       }

       g_turn++;
       g_score--;

       // 増援の出現
       if (g_turn % SYSTEM.NEW_ENEMY_INTERVAL === 0) {
         const p = getSafeRandPos(0.8, 0.95);
         g_enemies.push(new EnemyShip(scene, p.x, p.y));
         // fear_mind
         g_enemies.forEach(e => {
           e.fear_mind = Math.max(EnemyShip.FEAR_MIN, e.fear_mind - EnemyShip.FEAR_STEP);
           console.log(`e.fear_mind=${e.fear_mind}`);
         });

         setMsg("戦術士官: 新たな敵が出現しました！", "#ff0", "#000")
       }

       // 基地の回復
       if ( g_starBase.shield < StarBase.SHIELD_MAX ) {
         const prev_starbase_shield = g_starBase.shield;
         g_starBase.shield = Math.floor(Math.min(
           StarBase.SHIELD_MAX,
           g_starBase.shield + (StarBase.SHIELD_MAX * StarBase.SHIELD_RECOVERY_RATE)
         ));
         console.log(`g_starBase: ${prev_starbase_shield} --> ${g_starBase.shield}`);
       }

       updateStatus(); 
       g_isPlayerTurn = true;
     } // finalizeEnemyTurn()

     /**
      * ステータスエリア更新
      */
     function updateStatus() {
       const PlayerEnergy = g_playerShip.energy > 0 ? g_playerShip.energy : 0;
       const PlayerShield = g_playerShip.shield > 0 ? g_playerShip.shield : 0;
       const baseShield = g_starBase.shield > 0 ? g_starBase.shield : 0;
       const enemyCount = getActiveEnemyCount();

       document.getElementById('statusTurn').textContent = `${g_turn}`;
       document.getElementById('statusMission').textContent = `${g_curMission}`;
       document.getElementById('statusEnemyCount').style.color = "#ff0"
       document.getElementById('statusEnemyCount').textContent = `${enemyCount}`;
       document.getElementById('statusScore').textContent = `${g_score}`;

       // PlayerShip Shield
       let PlayerShieldRatio = PlayerShield / PlayerShip.SHIELD_MAX;
       let PlayerShieldColor = PlayerShieldRatio < 0.3 ? "#f00" : "#0f0";
       document.getElementById('statusShipShield').style.color = PlayerShieldColor;
       document.getElementById('statusShipShield').textContent = PlayerShield;
       document.getElementById('gaugeShipShield').style.width = (PlayerShieldRatio * 100) + '%';
       document.getElementById('gaugeShipShield').style.background = PlayerShieldColor;

       // PlayerShip Energy
       let energyRatio = PlayerEnergy / PlayerShip.ENERGY_MAX;
       let energyColor = energyRatio < 0.3 ? "#f00" : "#0f0";
       document.getElementById('statusShipEnergy').style.color = energyColor;
       document.getElementById('statusShipEnergy').textContent = PlayerEnergy;
       document.getElementById('gaugeShipEnergy').style.width = (energyRatio * 100) + '%';
       document.getElementById('gaugeShipEnergy').style.background = energyColor;

       // Base Shield
       let baseShieldRatio = baseShield / StarBase.SHIELD_MAX;
       let baseShieldColor = baseShieldRatio < 0.3 ? "#f00" : "#0f0";
       document.getElementById('statusBaseShield').style.color = baseShieldColor;
       document.getElementById('statusBaseShield').textContent = baseShield;
       document.getElementById('gaugeBaseShield').style.width = (baseShieldRatio * 100) + '%';
       document.getElementById('gaugeBaseShield').style.background = baseShieldColor;
     } // updateStatus()

     /**
      * 次のステージに移行
      */
     function nextMission(scene) {
       const clearedMission = g_curMission;
       let bonus = g_curMission * 100;
       if ( g_score > 0 ) {
         bonus += g_score;
       }
       console.log(`nextMission> bonus=${bonus}`);
       g_score += bonus;

       const { list, newIdx } = saveHighScore(
         g_score, g_turn, clearedMission, `MISSION #${clearedMission} CLEARED`, true
       );

       g_curMission++;
       SYSTEM.N_ENEMY++;
       g_isPlayerTurn = false;

       g_pendingScene = scene;

       setMsg(`司令部: ミッション #${clearedMission} 成功`);
       showHighScoreOverlay('missionclear', { clearedMission, bonus, list, newIdx });
     } // nextMission()

     /**
      * ゲームオーバー
      */
     function gameOver(msg, clear=false) {
       g_isGameOver = true;
       g_flagClear = clear;
       g_isPlayerTurn = false;
       setMsg(msg, "#000", "#f00");
       setTimeout(() => showHighScoreOverlay('gameover', { msg }), SYSTEM.TIMING.GAMEOVER);
     } // gameOver()

     function loadHighScores() {
       try {
         const raw = localStorage.getItem(HIGHSCORE.STORAGE_KEY);
         return raw ? JSON.parse(raw) : [];
       } catch (e) {
         return [];
       }
     }

     function saveHighScore(score, turns, mission, result, forceSave = false) {
       let list = loadHighScores();
       const now = new Date();
       const dateStr = [
         now.getFullYear(),
         String(now.getMonth() + 1).padStart(2, '0'),
         String(now.getDate()).padStart(2, '0')
       ].join('/');
       if ( g_flagClear || forceSave ) {
         list.push({
           score, turns, mission, result,
           gameid: SYSTEM.GAME_ID, date: dateStr, _new: true
         });
       }
       list.sort((a, b) => b.score - a.score);
       const newIdx = list.findIndex(s => s._new);
       list = list.slice(0, HIGHSCORE.MAX_ENTRIES);
       const madeIt = list.some(s => s._new);
       localStorage.setItem(
         HIGHSCORE.STORAGE_KEY,
         JSON.stringify(list.map(({ _new, ...rest }) => rest))
       );
       return { list, newIdx: madeIt ? newIdx : -1 };
     }

     function renderHSTable(list) {
       const tbody  = document.getElementById('hsTableBody');
       const noRec  = document.getElementById('hsNoRecord');
       tbody.innerHTML = '';
       if (!list || list.length === 0) {
         noRec.style.display = 'block';
         return;
       }
       noRec.style.display = 'none';
       const rankLabels = ['1ST', '2ND', '3RD', '4TH', '5TH'];
       list.forEach((s, i) => {
         const tr = document.createElement('tr');
         const thisGame = (s.gameid == SYSTEM.GAME_ID);
         if ( thisGame ) {
           tr.className = 'hs-new';
         }
         const rank   = rankLabels[i] || `${i + 1}TH`;
         const prefix = thisGame ? '★' : '';
         const displayMission = s.mission !== undefined ? s.mission : '-';
         tr.innerHTML = `
           <td>${prefix}</td>
           <td>${rank}</td>
           <td>${s.score}</td>
           <td>${displayMission}</td>
           <td>${s.turns}</td>
           <td>${s.date}</td>
         `;
         
         // ★追加: 行をクリックした際の処理
         tr.addEventListener('click', () => {
           // スコアを引き継ぐ
           g_score = s.score;
           // 記録されたステージの次からスタートする
           g_curMission = (s.mission !== undefined ? s.mission : 1) + 1;
           g_turn = 1;
           
           // 敵の初期生成数を、進行するステージに合わせて再計算
           // (初期値3 + ステージ進行分)
           SYSTEM.N_ENEMY = 3 + (g_curMission - 1);
           
           g_isGameOver = false;
           g_flagClear = false;
           g_isPlayerTurn = true;
           g_pendingScene = null;
           
           // オーバーレイを非表示にする
           document.getElementById('highScoreOverlay').style.display = 'none';
           
           // シーンを再起動
           if (g_curScene) {
             g_curScene.scene.restart();
           }
         });

         tbody.appendChild(tr);
       });
     } // renderHSTable()

     function showHighScoreOverlay(mode, data = {}) {
       const overlay    = document.getElementById('highScoreOverlay');
       const resultEl   = document.getElementById('hsResultMsg');
       const finalEl    = document.getElementById('hsFinalMsg');
       const closeBtn   = document.getElementById('hsCloseBtn');
       const restartBtn = document.getElementById('hsRestartBtn');

       if (mode === 'missionclear') {
         const { clearedMission, bonus, list, newIdx } = data;
         resultEl.style.color      = '#0f0';
         resultEl.textContent      = `✓ MISSION ${clearedMission} CLEARED!`;
         finalEl.textContent       = `TURNS:${g_turn}, MISSION BONUS:+${bonus}, SCORE: ${g_score}`;
         renderHSTable(list);
         closeBtn.style.display    = 'none';
         restartBtn.textContent    = '▶ NEXT MISSION';
         restartBtn.style.display  = 'inline-block';

       } else if (mode === 'gameover') {
         const { msg } = data;
         resultEl.style.color      = '#ff0';
         resultEl.textContent      = msg;
         finalEl.textContent       = `MISSION FAILED: SCORE: ${g_score}  ` +
                                     `MISSION: ${g_curMission}  TURNS: ${g_turn}`;
         renderHSTable(loadHighScores());
         closeBtn.style.display    = 'none';
         restartBtn.textContent    = '▶ RESTART';
         restartBtn.style.display  = 'inline-block';

       } else {
         resultEl.style.color      = '#0ff';
         resultEl.textContent      = '▶ HIGH SCORES ◀';
         finalEl.textContent       = `NOW — SCORE: ${g_score}   ` +
                                     `MISSION: ${g_curMission}   TURN: ${g_turn}`;
         renderHSTable(loadHighScores());
         closeBtn.style.display    = 'inline-block';
         restartBtn.textContent    = '▶ RESTART';
         restartBtn.style.display  = 'inline-block';
       }
       overlay.style.display = 'flex';
     } // showHighScoreOverlay()

     document.getElementById('viewScoresBtn').addEventListener('click', () => {
       showHighScoreOverlay('view');
     });

     document.getElementById('hsRestartBtn').addEventListener('click', () => {
       if (g_pendingScene) {
         document.getElementById('highScoreOverlay').style.display = 'none';
         g_turn = 1;
         const s = g_pendingScene;
         g_pendingScene = null;
         g_isPlayerTurn = true;
         s.scene.restart();
       } else {
         location.reload();
       }
     });

     document.getElementById('hsCloseBtn').addEventListener('click', () => {
       document.getElementById('highScoreOverlay').style.display = 'none';
     });

    </script>
  </body>
</html>
