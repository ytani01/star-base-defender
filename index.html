<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>Starbase Defender</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
     body {
       margin:0; background:#000; padding:0; overflow:hidden; font-family: Arial, sans-serif;
     }
     #gameContainer {
       display: flex; flex-direction: column; height: 100vh;
     }
     
     #statusPanel {
       background:#111;
       color:#0ff;
       padding:15px;
       flex: 0 0 auto;
       border-bottom:2px solid #08f;
       overflow-y:auto;
       font-size: clamp(22px, 5vw, 30px); 
       font-family: monospace;
       line-height: 1.1;
     }
     #statusPanel div { margin: 1px 5px; }
     #statusPanel .status-gauge {
       display: inline-block;
       width: 60px;
       height: clamp(12px, 2.5vw, 18px);
       background: #222;
       border: 1px solid #08f;
       margin: 0 0 0 8px; /* 上・右・下を0、左のみ8pxに指定 */
       vertical-align: middle;
     }
     #statusPanel .status-gauge-fill {
       height: 100%;
       background: #0f0;
       width: 100%;
       transition: width 0.2s ease, background-color 0.2s ease;
       margin: 0; /* 枠と中身のズレの原因となるマージンを無効化 */
     }
     
     #logStatus {
       height: 70px;
       line-height: 1.1;
     }

     #gameWrapper { position: relative; flex: 1; min-height: 0; }
     #gameCanvas { width: 100%; height: 100%; }

     #zoomUI {
       position: absolute;
       top: 10px;
       left: 30px;
       display: flex;
       flex-direction: column;
       gap: 10px;
       z-index: 1000;
     }
     #zoomUI button {
       width: 90px;
       height: 90px;
       font-size: 48px;
       background: rgba(0, 136, 255, 0.5);
       color: #fff;
       border: 2px solid #0ff;
       border-radius: 30px;
       cursor: pointer;
       user-select: none;
     }
     #zoomUI button:active {
       background: rgba(0, 255, 255, 0.8);
       color: #000;
     }

     #highScoreOverlay {
       display: none;
       position: fixed;
       inset: 0;
       background: rgba(0, 0, 20, 0.5);
       z-index: 9999;
       align-items: center;
       justify-content: center;
       font-family: monospace;
     }
     #hsPanel {
       border: 2px solid #0ff;
       padding: 28px 32px;
       min-width: 500px;
       max-width: 800px;
       width: 92%;
       background: rgba(8, 8, 32, 0.5);
       box-shadow: 0 0 40px rgba(0,255,255,0.9);
     }
     #hsResultMsg {
       text-align: center;
       font-size: clamp(24px, 5vw, 40px);
       letter-spacing: 3px;
       margin: 0 0 6px 0;
     }
     #hsFinalMsg {
       color: #8df;
       text-align: center;
       font-size: clamp(24px, 2.5vw, 40px);
       margin: 0 0 16px 0;
       padding-bottom: 14px;
       border-bottom: 1px solid rgba(0,255,255,0.25);
     }
     .hs-heading {
       color: #0ff;
       font-size: clamp(24px, 2.2vw, 40px);
       letter-spacing: 2px;
       margin-bottom: 8px;
     }
     #hsTableWrap {
       overflow-x: auto;
     }
     #hsTable {
       width: 100%;
       border-collapse: collapse;
       font-size: clamp(20px, 2.2vw, 40px);
       color: #9cf;
       min-width: 260px;
     }
     #hsTable th {
       color: #0ff;
       text-align: left;
       padding: 4px 6px;
       border-bottom: 1px solid rgba(0,255,255,0.3);
       letter-spacing: 1px;
       white-space: nowrap;
     }
     #hsTable td {
       padding: 6px 6px; white-space: nowrap;
     }
     #hsTable tbody tr.hs-new td {color: #ff0;}
     #hsTable tbody tr {
       cursor: pointer;
       transition: background-color 0.2s;
     }
     #hsTable tbody tr:hover {
       background-color: rgba(0, 255, 255, 0.15);
     }
     #hsNoRecord {
       color: #444;
       text-align: center;
       padding: 14px;
       font-size: clamp(24px, 2.2vw, 40px);
     }
     #hsBtns {
       display: flex;
       gap: 12px;
       justify-content: center;
       margin-top: 20px;
       flex-wrap: wrap;
     }
     .hs-btn {
       padding: 11px 20px;
       font-size: clamp(24px, 2.8vw, 40px);
       font-family: monospace;
       background: rgba(0, 100, 200, 0.3);
       color: #0ff;
       border: 2px solid #0ff;
       border-radius: 4px;
       cursor: pointer;
       letter-spacing: 1px;
       transition: background 0.15s, color 0.15s;
     }
     .hs-btn:hover, .hs-btn:active {
       background: #0ff;
       color: #000;
     }

     #viewScoresBtn {
       font-family: monospace;
       font-size: clamp(22px, 2vw, 40px);
       background: transparent;
       color: #0ff;
       border: 1px solid #0ff;
       padding: 3px 8px;
       border-radius: 3px;
       cursor: pointer;
       margin-left: 10px;
       vertical-align: middle;
       transition: background 0.12s, color 0.12s;
     }
     #viewScoresBtn:hover {
       background: #0ff;
       color: #000;
     }
    </style>
  </head>
  <body>
    <div id="gameContainer">
      <div id="statusPanel">
        <div id="turn">
          Turn
          <span id="statusStage">1</span>-<span id="statusTurn">1</span>
          |
          SCORE
          <span id="statusScore">100</span>
          |
          <button id="viewScoresBtn">▶ SCORES</button>
        </div>
        <div id="statusShip">
          Ship Shield 
          <div class="status-gauge"><div id="gaugeShipShield" class="status-gauge-fill"></div></div>
          <span id="statusShipShield">0</span>
          |
          Energy
          <div class="status-gauge"><div id="gaugeShipEnergy" class="status-gauge-fill"></div></div>
          <span id="statusShipEnergy">0</span>
        </div>
        <div id="StatusBase">
          Base Shield
          <div class="status-gauge"><div id="gaugeBaseShield" class="status-gauge-fill"></div></div>
          <span id="statusBaseShield">0</span>
        </div>
        <div id="StatusEnemy">
          ENEMY COUNT
          <span id="statusEnemyCount">1</span>
        </div>
        <div id="logStatus">COMMAND: Stand by for orders, Captain.</div>
      </div>
      
      <div id="gameWrapper">
        <div id="gameCanvas"></div>
        <div id="zoomUI">
          <button id="zoomIn">＋</button>
          <button id="zoomOut">－</button>
        </div>
      </div>
    </div>

    <div id="highScoreOverlay">
      <div id="hsPanel">
        <h2 id="hsResultMsg"></h2>
        <p id="hsFinalMsg"></p>
        <div class="hs-heading">▶ HIGH SCORES ◀</div>
        <div id="hsTableWrap">
          <table id="hsTable">
            <thead>
              <tr>
                <th></th>
                <th>RANK</th>
                <th>SCORE</th>
                <th>STAGE</th>
                <th>TURNS</th>
                <th>DATE</th>
              </tr>
            </thead>
            <tbody id="hsTableBody"></tbody>
          </table>
          <div id="hsNoRecord">--- NO RECORDS YET ---</div>
        </div>
        <div id="hsBtns">
          <button class="hs-btn" id="hsRestartBtn">▶ RESTART</button>
          <button class="hs-btn" id="hsCloseBtn">✕ CLOSE</button>
        </div>
      </div>
    </div>
    
    <script>
     // ---------------------------------------------------------
     // 設定・定数の定義
     // ---------------------------------------------------------
     const SYSTEM = {
       SCALE: 0.5,
       R_AREA: 300,
       SCORE: {
         INIT: 100,
         DESTROY_PENALTY: 50,
       },
       NEW_ENEMY_INTERVAL: 40,
       N_STAR: 15,
       N_ENEMY: 3,
       GAUGE: {
         H: 4
       },
       TIMING: {
         BEAM_DUR: 500,
         TURN_DELAY: 500,
         TURN_MARGIN: 100  // ターン切り替え時の余韻
       }
     };
     SYSTEM.GAME_ID = Phaser.Utils.String.UUID();
     SYSTEM.PLAY_AREA_WIDTH = SYSTEM.R_AREA * 2 + 30;
     SYSTEM.PLAY_AREA_HEIGHT = SYSTEM.PLAY_AREA_WIDTH; 
     SYSTEM.CENTER_X = SYSTEM.PLAY_AREA_WIDTH / 2;
     SYSTEM.CENTER_Y = SYSTEM.PLAY_AREA_HEIGHT / 2;

     const CAMERA = {
       ZOOM_MIN: 1.0,
       ZOOM_MAX: 4.0,
       STEP: 2.0,
     };
     let CurZoom = 1.0;


     const WEAPON = {
       PLAYER: {
         POWER: 100,
         COST: 100,
       },
       ENEMY: {
         POWER: 90,
       },
       ALPHA: 0.0075 / SYSTEM.SCALE,
       EFFECTIVE_THRESHOLD: 0.45,
       MAX_THRESHOLD: 0.2
     };
     WEAPON.PLAYER.MAX_RANGE = Math.floor(-Math.log(WEAPON.MAX_THRESHOLD) / WEAPON.ALPHA);
     WEAPON.PLAYER.EFFECTIVE_RANGE = Math.floor(-Math.log(WEAPON.EFFECTIVE_THRESHOLD) / WEAPON.ALPHA);
     WEAPON.ENEMY.EFFECTIVE_RANGE = Math.floor(-Math.log(WEAPON.EFFECTIVE_THRESHOLD) / WEAPON.ALPHA);

     const HIGHSCORE = {
       MAX_ENTRIES: 5,
       STORAGE_KEY: 'starbaseDefenderScores'
     };

     let g_playerShip;
     let g_starBase;
     let g_enemies = [];
     let g_stars = [];
     let rangeGraphics, boundaryGraphics;
     let g_turn = 1;
     let g_curStage = 1;
     let g_score = SYSTEM.SCORE.INIT;
     let g_isPlayerTurn = true;
     let g_isGameOver = false;
     let g_flagClear = false;
     let g_pendingScene = null;
     let g_isDocked = false;     
     let g_curScene = null;

     // ---------------------------------------------------------
     // グローバルメソッド
     // ---------------------------------------------------------
     /**
      *
      */
     function getActiveEnemyCount() {
       return g_enemies.filter(enemy => enemy.active).length;
     } // getActiveEnemyCount()

     /**
      * ゲージの描画
      */     
     function drawGauge(g, cx, cy, width, height, ratio, color) {
       g.clear();
       if ( !isFinite(cy) ) {
         return;
       }

       const x = cx - width / 2;
       const y = cy - height / 2;
       
       g.fillStyle(0x888888, 1);
       g.fillRect(x, y, width, height);
       
       const r = Math.max(0, Math.min(1, ratio));
       if (r > 0) {
         g.fillStyle(color, 1);
         g.fillRect(x, y, width * r, height);
       }
     } // drawGauge()

     /**
      * 宇宙域境界の描画
      */
     function drawBoundary(){
       boundaryGraphics.clear();
       boundaryGraphics.lineStyle(2, 0x0088ff, 1);
       boundaryGraphics.strokeCircle(SYSTEM.CENTER_X, SYSTEM.CENTER_Y, SYSTEM.R_AREA);
     } // drawBoundary()

     /**
      * メッセージの表示
      */
     function setMsg(msg, fg="#0ff", bg="transparent") {
       const el = document.getElementById('logStatus')
       el.style.color = fg;
       el.style.backgroundColor = bg;
       el.textContent = msg;
     } // setMsg()

     // ---------------------------------------------------------
     // クラス定義
     // ---------------------------------------------------------
     /**
      *
      */
     class GameObj {
       constructor(scene, x, y, texture, scale=SYSTEM.SCALE) {
         this.scene = scene;
         this.scale = scale;
         this.sprite = scene.add.image(x, y, texture).setScale(scale);
         this.active = true;
       }

       get x() {
         return this.sprite.x;
       }
       set x(val) {
         this.sprite.x = val;
       }

       get y() {
         return this.sprite.y;
       }
       set y(val) {
         this.sprite.y = val;
       }

       get src_w() {
         return this.sprite.width;
       }
       get src_h() {
         return this.sprite.height;
       }
       get src_r() {
         return (this.src_w + this.src_h) / 4;
       }

       get w() {
         return this.src_w * this.scale;
       }
       get h() {
         return this.src_h * this.scale;
       }
       get r() {
         return (this.w + this.h) / 4;
       }

       destroy() {
         this.sprite.destroy();
         this.active = false;
       }
     } // class GameObj

     /**
      *
      */
     class ObjWithShield extends GameObj {
       static SHIELD_MAX = 0; // dummy
       static GAUGE_H = 8;
       static GAUGE_Y_OFFSET = 18;

       constructor(
         scene, x, y, texture,
         shield, shield_gauge_color,
         scale=SYSTEM.SCALE
       ) {
         super(scene, x, y, texture, scale);
         this.shield = shield;
         this.shield_gauge_color = shield_gauge_color;

         this.gauge_h = this.constructor.GAUGE_H * scale;
         this.gauge_y = this.h + this.constructor.GAUGE_Y_OFFSET * scale;
         this.gauge_w = this.w;
         this.shield_gauge = this.scene.add.graphics();
         this.shield_circle = this.scene.add.graphics();
       }

       updateGauge() {
         if (! this.active ) {
           if (this.shield_gauge) {
             this.shield_gauge.destroy();
             this.shield_circle.destroy();
           }
           return;
         }

         //
         // draw Shield circle
         //
         const shield_ratio = this.shield / this.constructor.SHIELD_MAX;
         let shield_color = 0xffffff;
         if ( shield_ratio < 0.5 ) {
           shield_color = 0xffff00;
         }
         if ( shield_ratio < 0.25 ) {
           shield_color = 0xff0000;
         }
         this.shield_circle.clear();
         this.shield_circle.lineStyle(3 * shield_ratio, shield_color, 1);
         this.shield_circle.strokeCircle(this.x, this.y, this.r);

         drawGauge(
           this.shield_gauge,
           this.x, this.y + (this.gauge_y * this.scale),
           this.gauge_w, this.gauge_h,
           this.shield / this.constructor.SHIELD_MAX,
           this.shield_gauge_color
         );
       } // updateGauge()

       /**
        *
        */
       takeDamage(amount) {
         this.shield -= amount;
         if (this.shield <= 0) {
           g_score -= SYSTEM.SCORE.DESTROY_PENALTY;
           this.die();
         }
       } // takeDamage()

       /**
        *
        */
       die() {
         this.shield = 0;
         this.active = false;
         if ( this.shield_gauge ) {
           this.shield_gauge.destroy();
         }
         if ( this.shield_circle ) {
           this.shield_circle.destroy();
         }
         this.destroy();
       } // die()
     } // class ObjWithShield
     
     /**
      *
      */
     class ObjWithEnergy extends ObjWithShield {
       constructor(
         scene, x, y, texture,
         shield, gauge_color,
         energy, energy_color,
         scale=SYSTEM.SCALE
       ) {
         super(scene, x, y, texture, shield, gauge_color, scale);
         this.energy = energy;
         this.energy_gauge_color = energy_color;

         this.energy_gauge = this.scene.add.graphics();
       }

       updateGauge() {
         super.updateGauge();
         drawGauge(
           this.energy_gauge,
           this.x, this.y + (this.gauge_y * this.scale) + this.gauge_h + 1,
           this.gauge_w, this.gauge_h,
           this.energy / this.constructor.ENERGY_MAX,
           this.energy_gauge_color
         );         
       }
     } // class ObjWithEnergy

     /**
      *
      */
     class Star extends GameObj {
       static W = 40;
       static R = 40 / 2 * SYSTEM.SCALE;
       constructor(scene, x, y) {
         super(scene, x, y, 'starImg');
       }
     } // class Star

     /**
      *
      */
     class StarBase extends ObjWithShield {
       static W = 60;
       static R = 60 / 2 * SYSTEM.SCALE;
       static SHIELD_MAX = 4000;
       static SHIELD_RECOVERY_RATE = 0.01;
       static SHIELD_COLOR = 0x00ffff;
       static DOCKING_RANGE = 35 * SYSTEM.SCALE;

       constructor(scene, x, y) {
         super(scene, x, y, 'baseImg', StarBase.SHIELD_MAX, StarBase.SHIELD_COLOR);

         this.gauge_y = this.gauge_y + this.gauge_h / 2 * 3;
         this.sprite.setDepth(1);
         this.shield_gauge.setDepth(1);
       }
     }

     /**
      *
      */
     class EnemyShip extends ObjWithShield {
       static W = 60;
       static R = 60 / 2 * SYSTEM.SCALE;
       static SPEED = 40 * SYSTEM.SCALE;
       static FEAR_INIT = 0.4;
       static FEAR_STEP = 0.05;
       static FEAR_RECOVERY = 0.005;
       static SHIELD_MAX = 300;
       static SHIELD_RECOVERY_RATE = 0.01;
       static SHIELD_COLOR = 0xff8800;

       constructor(scene, x, y) {
         super(scene, x, y, 'enemyImg', EnemyShip.SHIELD_MAX, EnemyShip.SHIELD_COLOR);

         this.fear_mind = EnemyShip.FEAR_INIT;
       }
     } // class EnemyShip

     /**
      *
      */
     class PlayerShip extends ObjWithEnergy {
       static W = 60;
       static R = 60 / 2 * SYSTEM.SCALE;
       static SPEED = 120 * SYSTEM.SCALE;
       static SHIELD_MAX = 800;
       static SHIELD_RECOVERY_RATE = 0;
       static SHIELD_COLOR = 0xffffff;

       static ENERGY_MAX = 10000;
       static ENERGY_MIN = 10;
       static ENERGY_COLOR = 0xffff00;

       static MOVE_COST_RATE = 0.3;

       constructor(scene, x, y) {
         super(
           scene, x, y, 'PlayerImg',
           PlayerShip.SHIELD_MAX, PlayerShip.SHIELD_COLOR,
           PlayerShip.ENERGY_MAX, PlayerShip.ENERGY_COLOR
         );

         this.sprite.setDepth(10);
         this.shield_gauge.setDepth(10);
       }
     } // class PlayerShip

     // ---------------------------------------------------------
     // ゲーム(Phaser)初期化・ループ
     // ---------------------------------------------------------
     const config = {
       type: Phaser.AUTO,
       backgroundColor: '#0a0a2a',
       parent: 'gameCanvas',
       scale: {
         mode: Phaser.Scale.FIT,
         autoCenter: Phaser.Scale.CENTER_HORIZONTALLY,
         width: SYSTEM.PLAY_AREA_WIDTH,
         height: SYSTEM.PLAY_AREA_HEIGHT
       },
       scene: { preload, create, update }
     };

     new Phaser.Game(config);

     /**
      * 画像の生成
      */
     function preload(){
       const g = this.make.graphics({add:false});

       // PlayerShip
       g.fillStyle(0x4488ff);
       g.fillRect(27,25,8,24);
       g.fillStyle(0x4488ff);
       g.fillRect(10,30,10,22);
       g.fillRect(40,30,10,22);
       g.fillStyle(0x4488ff);
       g.fillEllipse(30,17,35,30);
       g.generateTexture('PlayerImg',60,60);
       
       g.clear();

       // Enemy
       g.fillStyle(0x228822);
       g.beginPath();
       g.moveTo(31,57);
       g.lineTo(55,40);
       g.lineTo(55,20);
       g.lineTo(50,20);
       g.lineTo(50,32);
       g.lineTo(31,41);
       g.lineTo(30,41);
       g.lineTo(10,32);
       g.lineTo(10,20);
       g.lineTo(5,20);
       g.lineTo(5,25);
       g.lineTo(5,40);
       g.moveTo(30,57);
       g.fillPath();
       g.fillRect(26,10,8,35)
       g.fillEllipse(30,13,18,17);
       g.generateTexture('enemyImg',60,60);

       g.clear();

       // Base
       const base_color = 0x88ffff;
       g.fillStyle(0x0000,.3);
       g.fillCircle(30,30,30);
       g.fillStyle(base_color);
       g.fillEllipse(30,30,24,53);
       g.lineStyle(5, base_color ,1);
       g.strokeEllipse(30,30,48,25);
       g.generateTexture('baseImg',60,60);

       g.clear();

       // Star
       const W_STAR = Star.W;
       const R_STAR = W_STAR / 2;
       const CX_STAR = W_STAR / 2;
       const CY_STAR = W_STAR / 2;
       g.fillStyle(0xa0a0a0);
       g.fillCircle(CX_STAR, CY_STAR, R_STAR);
       g.generateTexture('starImg', W_STAR, W_STAR);

       g.destroy();
     }

     /**
      * 初期画面表示
      */
     function create(){
       g_curScene = this;
       rangeGraphics = this.add.graphics();
       boundaryGraphics = this.add.graphics();
       drawBoundary();
       
       g_starBase = new StarBase(this, SYSTEM.CENTER_X, SYSTEM.CENTER_Y);

       // Stars
       g_stars = [];
       for(let i=0; i < SYSTEM.N_STAR; i++) {
         let p = getSafeRandPos(0.2, 0.8);
         g_stars.push(new Star(this, p.x, p.y));
       }

       // Enemies
       g_enemies = [];
       for(let i=0; i<SYSTEM.N_ENEMY; i++){
         let p = getSafeRandPos(0.6, 0.9);
         g_enemies.push(new EnemyShip(this, p.x, p.y));
       }

       // Player Ship
       let pp = getSafeRandPos(0.1, 0.3);
       g_playerShip = new PlayerShip(this, pp.x, pp.y);

       // Camera
       this.cameras.main.setBounds(0, 0, SYSTEM.PLAY_AREA_WIDTH, SYSTEM.PLAY_AREA_HEIGHT);
       this.cameras.main.startFollow(g_playerShip.sprite, true, 0.08, 0.08);

       updateStatus();

       this.input.on('pointerdown', handlePointerDown, this);

       document.getElementById('zoomIn').onclick = () => changeZoom(this, CAMERA.STEP);
       document.getElementById('zoomOut').onclick = () => changeZoom(this, -CAMERA.STEP);

       this.input.on('wheel', (pointer, gameObjects, deltaX, deltaY, deltaZ) => {
         let zoomAmount = deltaY > 0 ? -CAMERA.STEP : CAMERA.STEP;
         changeZoom(this, zoomAmount);
       });

       //changeZoom(this, -1);
     }

     /**
      * ズーム倍率変更
      */
     function changeZoom(scene, amount) {
       let nextZoom = 1.0;
       if ( amount > 0 ) {
         nextZoom = CurZoom * amount;
       }
       if ( amount < 0 ) {
         nextZoom = CurZoom / -amount;
       }
       CurZoom = Phaser.Math.Clamp(nextZoom, CAMERA.ZOOM_MIN, CAMERA.ZOOM_MAX);
       
       scene.tweens.add({
         targets: scene.cameras.main,
         zoom: CurZoom,
         duration: 250,
         ease: 'Sine.easeInOut'
       });
     }

     /**
      * フレーム更新
      */
     function update() {
       rangeGraphics.clear();

       // ドッキング状態
       rangeGraphics.lineStyle(0, 0x00ffff, 0.5);
       if ( g_isDocked ) {
         rangeGraphics.lineStyle(3, 0x00ffff, 1);
       }
       rangeGraphics.strokeCircle(g_starBase.x, g_starBase.y, StarBase.DOCKING_RANGE+1);

       // 射程範囲
       [g_playerShip, ...g_enemies].forEach(
         (obj, i)=>{
           if(!obj.active) {
             return;
           }
           let color = (i===0) ? 0x00ffff : 0xffff00;
           if ( i == 0 ) {  
             rangeGraphics.lineStyle(1, color, 0.3);
             rangeGraphics.strokeCircle(obj.x, obj.y, WEAPON.PLAYER.MAX_RANGE);
             rangeGraphics.lineStyle(1, color, 0.5);
             rangeGraphics.strokeCircle(obj.x, obj.y, WEAPON.PLAYER.EFFECTIVE_RANGE);
           } else {
             rangeGraphics.lineStyle(1, color, 0.5);
             rangeGraphics.strokeCircle(obj.x, obj.y, WEAPON.ENEMY.EFFECTIVE_RANGE);
           }
         }
       ); // forEach()

       if (g_playerShip) {
         g_playerShip.updateGauge();
       }
       if (g_starBase) {
         g_starBase.updateGauge();
       }
       g_enemies.forEach(e => e.updateGauge());
     } // update()

     /**
      *
      */
     function getSafeRandPos(minDist, maxDist){
       let x, y, distToCenter;
       let safe = false;
       let attempts = 0;
       
       // オブジェクト同士が重ならないための最低距離
       const MIN_SPAWN_DIST = PlayerShip.R * 3.5;
       console.log(`MIN_SPAWN_DIST=${MIN_SPAWN_DIST}`);
       
       while(!safe && attempts < 100) {
         x = Phaser.Math.Between(
           SYSTEM.CENTER_X - SYSTEM.R_AREA, SYSTEM.CENTER_X + SYSTEM.R_AREA
         );
         y = Phaser.Math.Between(
           SYSTEM.CENTER_Y - SYSTEM.R_AREA, SYSTEM.CENTER_Y + SYSTEM.R_AREA
         );
         distToCenter = Phaser.Math.Distance.Between(x, y, SYSTEM.CENTER_X, SYSTEM.CENTER_Y);
         
         if ( distToCenter < SYSTEM.R_AREA * minDist ) {
           continue;
         }
         if ( distToCenter > SYSTEM.R_AREA * maxDist ) {
           continue;
         }
         
         safe = true;

         for(let s of g_stars) {
           if (
             s.active && Phaser.Math.Distance.Between(x, y, s.x, s.y) < MIN_SPAWN_DIST
           ) {
             safe = false;
             break;
           }
         }
         if(!safe) continue;

         for(let e of g_enemies) {
           if (
             e.active && Phaser.Math.Distance.Between(x, y, e.x, e.y) < MIN_SPAWN_DIST
           ) {
             safe = false; break;
           }
         }
         attempts++;
       }
       return { x, y };
     } // getSafeRandPos()

     function hasObstacleOnPath(ax,ay,bx,by,cx,cy,r) {
       const dx = bx - ax, dy = by - ay;
       const a = dx * dx + dy * dy;
       if (a < 0.001) {
         return false;
       }
       const fx = ax - cx, fy = ay - cy;
       const b = 2*(fx * dx + fy * dy);
       const c = fx*fx + fy*fy - r*r;
       const disc = b*b-4*a*c;
       if ( disc < 0 ) {
         return false;
       }
       const t1 = (-b-Math.sqrt(disc)) / (2*a);
       const t2 = (-b+Math.sqrt(disc)) / (2*a);

       return (t1 > 0.05 && t1 < 0.95) || (t2 > 0.05 && t2 < 0.95);
     }

     /**
      * LOS(Line of Sight、射線)がブロックされてないか？
      */
     function isLOSBlocked(srcObj, targetObj, checkBase = true) {
       // 1. 星（障害物）による遮蔽の判定
       let hitStar = g_stars.some(s => 
         s.active && hasObstacleOnPath(
           srcObj.x, srcObj.y, targetObj.x, targetObj.y, s.x, s.y, Star.R
         )
       );
       if (hitStar) return true;

       // 2. 基地による遮蔽の判定（基地の見た目のサイズで正確に判定）
       if (checkBase && g_starBase && g_starBase.active && g_starBase.shield > 0) {
         if (hasObstacleOnPath(
           srcObj.x, srcObj.y, targetObj.x, targetObj.y, g_starBase.x, g_starBase.y, StarBase.R
         )) {
           return true;
         }
       }
       return false;
     } // isLOSBlocked()

     /**
      *
      */
     function handlePointerDown(pointer) {
       if (g_isGameOver || !g_isPlayerTurn) return;

       // 1. 判定対象をまとめ、クリックされたオブジェクトを特定
       // 配列の先頭から評価されるため、重なっている場合は g_enemies が優先される
       const clickables = [...g_enemies, g_starBase, g_playerShip];
       const clickedObj = clickables.find(e => {
         if (!e || !e.active) return false;
         return Phaser.Math.Distance.Between(pointer.worldX, pointer.worldY, e.x, e.y) < e.r;
       });
       if ( clickedObj ) {
         console.log(`clickedObj=${clickedObj.constructor.name}`);
       }

       // ターン終了の共通処理
       const endTurn = () => {
         g_isPlayerTurn = false;

         this.time.delayedCall(SYSTEM.TIMING.TURN_DELAY, () => enemyTurn(this));
         updateStatus();
       };

       // 2. オブジェクトに応じたアクションの分岐
       // クラス定義やインスタンスを利用してスッキリと切り分ける
       if (clickedObj === g_starBase) {
         // --- 基地に対するアクション ---
         if (g_isDocked) {
           setMsg("STARBASE: Mooring tractor beam active. Docking in progress.");
           endTurn();
           return;
         }

         const distToBase = Phaser.Math.Distance.Between(g_playerShip.x, g_playerShip.y, g_starBase.x, g_starBase.y);
         console.log(`distToBase=${distToBase}`);
         if (distToBase <= StarBase.DOCKING_RANGE) {
           dockShip(this);
           endTurn();
         } else {
           attemptPlayerMove(this, g_starBase.x, g_starBase.y, SYSTEM.TIMING.TURN_DELAY);
         }

       } else if (clickedObj instanceof EnemyShip) {
         // --- 敵に対するアクション ---
         if (g_isDocked) {
           setMsg("Tactical Officer> All weapons are deactivated", "#ff0", "#a00");
           return;
         }

         if (g_playerShip.energy < WEAPON.PLAYER.COST) {
           setMsg("ENGINEERING: Warning! Warp core power critical.", "#000", "#a00");
           return;
         }

         g_playerShip.energy -= WEAPON.PLAYER.COST;
         const dist = Phaser.Math.Distance.Between(
           g_playerShip.x, g_playerShip.y, clickedObj.x, clickedObj.y
         );
         const hitChance = Math.exp(-WEAPON.ALPHA * dist);

         if (hitChance < WEAPON.MAX_THRESHOLD) {
           setMsg("TACTICAL: Target beyond maximum phaser range.", "#ff0", "#a00");
           fireBeam(this, g_playerShip, clickedObj, 0x444444);
           endTurn();
           return;
         }

         if (isLOSBlocked(g_playerShip, clickedObj, false)) {
           setMsg("TACTICAL: Target lock failed. Obstacle in line of sight.", "#ff0", "#a00");
           fireBeam(this, g_playerShip, clickedObj, 0x444444);
           endTurn();
           return;
         }

         setMsg("TACTICAL: Direct hit! Enemy shields fluctuating.", "#0ff", "#000");
         const damage = Math.floor(WEAPON.PLAYER.POWER * hitChance);
         clickedObj.takeDamage(damage);
         fireBeam(this, g_playerShip, clickedObj, 0x00ffff);

         if (!clickedObj.active) {
           g_enemies = g_enemies.filter(e => e !== clickedObj);
           const rp = getSafeRandPos(0.8, 0.95);
           g_enemies.push(new EnemyShip(this, rp.x, rp.y));
           setMsg("TACTICAL: Target destroyed. New warp signatures detected!");
         }
         endTurn();
       } else if (clickedObj === g_playerShip) {
         // --- 自機のシールド強化
         const d_shield = PlayerShip.SHIELD_MAX - g_playerShip.shield;
         console.log(`d_shield=${d_shield}, g_playerShip.energe=${g_playerShip.energy}`);
         if ( d_shield <= 0 ) {
           setMsg("ENGINEERING: Deflector shields operating at maximum capacity.", "#fff", "#111");
           return;
         }

         // d_shileld > 0
         const energy_supply = Math.min(g_playerShip.energy - PlayerShip.ENERGY_MIN, d_shield);
         console.log(`energy_supply=${energy_supply}`);
         if ( energy_supply <= 0 ) {
           setMsg("ENGINEERING: Insufficient power for shield regeneration.");
           return;
         }

         g_playerShip.energy -= energy_supply;
         g_playerShip.shield += energy_supply;
         console.log(`energy=${g_playerShip.energy}, shield=${g_playerShip.shield}`)

         const shiled_p = Math.floor(g_playerShip.shield / PlayerShip.SHIELD_MAX * 100);
         setMsg(
           `ENGINEERING: Shields at ${shiled_p}%. Energy reserves at ${g_playerShip.energy}.`,
           "#fff", "#111"
         );
         endTurn();
       } else {
         // --- 空間に対するアクション（移動） ---
         attemptPlayerMove(this, pointer.worldX, pointer.worldY, SYSTEM.TIMING.TURN_DELAY);

         if (g_playerShip.energy < PlayerShip.ENERGY_MIN && !g_isDocked) {
           updateStatus();
           gameOver("SYSTEM: Total power failure. Life support failing...");
         }
       }
     } // handlePointerDown()

     /**
      * なにか衝突したら停止するように座標を計算
      */
     function clampDest(obj, destX, destY) {
       // オブジェクトから直接現在座標を取得
       const startX = obj.x;
       const startY = obj.y;

       const targets = [];
       if ( !(obj instanceof PlayerShip) ) targets.push(g_playerShip);
       if ( obj instanceof EnemyShip ) targets.push(g_starBase);
       g_enemies.forEach(
         e => {
           if (e && e !== obj && e.active) targets.push(e);
         }
       );
       g_stars.forEach(
         e => {
           if (e && e !== obj && e.active) targets.push(e);
         }
       );

       const dx = destX - startX;
       const dy = destY - startY;
       const lenSq = dx * dx + dy * dy;
       if (lenSq < 0.0001) return { x: destX, y: destY };

       let minT = 1.0; 

       for (const tgt of targets) {
         let R = (obj.w + tgt.w) / 2;
         //console.log(`R=${R}`);

         const curDist = Phaser.Math.Distance.Between(startX, startY, tgt.x, tgt.y);
         if (curDist < R) continue;

         const fx = startX - tgt.x;
         const fy = startY - tgt.y;
         const a = lenSq;
         const b = 2 * (fx * dx + fy * dy);
         const c = fx * fx + fy * fy - R * R;
         const disc = b * b - 4 * a * c;
         if (disc < 0) continue; 
         const t = (-b - Math.sqrt(disc)) / (2 * a);
         if (t > 0 && t < minT) minT = t;
       }  // for ()

       if (minT < 1.0) {
         const len = Math.sqrt(lenSq);
         const stopT = Math.max(0, minT - 1.0 / len);
         return { x: startX + dx * stopT, y: startY + dy * stopT };
       }
       return { x: destX, y: destY };
     } // clampDest(..)

     /**
      * 進行方向がブロックされている場合、少しずつ角度をずらして
      * 「とにかく一番遠くまで進めるルート」を確実に見つけ出す関数
      */
     function resolveMovement(obj, desiredX, desiredY, speed) {
       // オブジェクトから直接現在座標を取得
       const x = obj.x;
       const y = obj.y;
       
       let dx = desiredX - x;
       let dy = desiredY - y;
       let angle = Math.atan2(dy, dx);
       
       // 0度(直進)から始まり、左右に15度ずつ、最大180度(真後ろ)まで走査
       let anglesToTest = [0];
       for (let i = 15; i <= 180; i += 15) {
         anglesToTest.push((i * Math.PI) / 180);
         anglesToTest.push((-i * Math.PI) / 180);
       }
       
       let bestDest = { x: x, y: y };
       let maxDistSq = -1;
       
       for (let offset of anglesToTest) {
         let testAngle = angle + offset;
         let testDestX = x + Math.cos(testAngle) * speed;
         let testDestY = y + Math.sin(testAngle) * speed;
         
         // 他のキャラクターとの衝突を計算し、ぶつかる直前の座標を取得 (self -> obj)
         let clamped = clampDest(obj, testDestX, testDestY);
         
         // 実際に進める距離の2乗
         let distSq = (clamped.x - x)**2 + (clamped.y - y)**2;
         
         // スピードの80%以上進めるなら、そのルートを即採用 (十分な空きがある)
         if (distSq >= (speed * 0.8)**2) {
           return clamped;
         }
         
         // 最もマシ（一番遠くまで逃げられる）ルートを記録しておく
         if (distSq > maxDistSq) {
           maxDistSq = distSq;
           bestDest = clamped;
         }
       }
       return bestDest;
     } //  resolveMovement(..)

     /**
      *
      */
     function dockShip(scene) {
       g_isDocked = true;
       g_playerShip.shield = PlayerShip.SHIELD_MAX;
       g_playerShip.energy = PlayerShip.ENERGY_MAX;
       scene.tweens.add({
         targets: g_playerShip,
         x: g_starBase.x, y: g_starBase.y,
         duration: 200,
         ease: 'Sine.easeInOut'
       });
       setMsg("STARBASE: Docking complete. Power transfer successful.", "#220", "#0ff");
       updateStatus();
     } // dockShip()

     /**
      *
      */
     function attemptPlayerMove(scene, targetX, targetY, delayBeforeEnemyTurn) {
       let rawDist = Phaser.Math.Distance.Between(g_playerShip.x, g_playerShip.y, targetX, targetY);
       if (rawDist < 1) return;

       let moveDist = Math.min(rawDist, PlayerShip.SPEED);
       let ratio = moveDist / rawDist;
       let destX = g_playerShip.x + (targetX - g_playerShip.x) * ratio;
       let destY = g_playerShip.y + (targetY - g_playerShip.y) * ratio;

       let target_is_base = false;
       let dist_target_base = Phaser.Math.Distance.Between(
         targetX, targetY, g_starBase.x, g_starBase.y
       );
       if ( dist_target_base <= StarBase.DOCKING_RANGE ) {
         target_is_base = true;
       }

       const clamped = clampDest(g_playerShip, destX, destY);
       destX = clamped.x;
       destY = clamped.y;
       setMsg("HELM: Course laid in. Impulse power engaged.");

       let skipAutoDock = false;
       if (g_isDocked) {
         g_isDocked = false;
         skipAutoDock = true;
         g_playerShip.shield = PlayerShip.SHIELD_MAX;
         setMsg("STARBASE: Tractor beam released. Clear for departure.");
         updateStatus();
       }

       const actualDist = Phaser.Math.Distance.Between(g_playerShip.x, g_playerShip.y, destX, destY);
       let cost = Math.max(1, Math.ceil(actualDist * PlayerShip.MOVE_COST_RATE));
       if ( g_playerShip.energy - cost <= PlayerShip.ENERGY_MIN ) {
         if ( target_is_base ) {
           gameOver("ENGINEERING: Insufficient power for impulse drive.");
           return;
         }
         setMsg("ENGINEERING: Insufficient power for impulse drive.");
         return;
       }

       g_playerShip.energy -= cost;
       g_isPlayerTurn = false;
       scene.tweens.add({
         targets: g_playerShip,
         x: destX, y: destY,
         duration: SYSTEM.TIMING.TURN_DELAY,
         onComplete: () => {
           if (!skipAutoDock) {
             const dockDist = Phaser.Math.Distance.Between(g_playerShip.x, g_playerShip.y, g_starBase.x, g_starBase.y);
             if (
               !g_isDocked && dockDist <= StarBase.DOCKING_RANGE
               && g_starBase.active && g_starBase.shield > 0
               && target_is_base
             ) {
               dockShip(scene);
               scene.time.delayedCall(220, () =>
                 scene.time.delayedCall(delayBeforeEnemyTurn, () => enemyTurn(scene)));
               return;
             }
           }
           scene.time.delayedCall(delayBeforeEnemyTurn, () => enemyTurn(scene));
         }
       });
       updateStatus();
     } // attemptPlayerMove(scene, targetX, targetY, delayBeforeEnemyTurn) {

     /**
      *
      */
     function calcDest(e, target, isFleeing = false) {
       let dirX = 0, dirY = 0;

       // 1. ターゲットへのベクトル（引力 / 斥力）
       if (isFleeing && Array.isArray(target)) {
         // 複数の脅威（自機と基地）から遠ざかるベクトルを合成
         target.forEach(t => {
           let dx = e.x - t.x;
           let dy = e.y - t.y;
           let dist = Math.sqrt(dx * dx + dy * dy);
           if (dist > 0.001) {
             let weight = 1.0 / dist;
             dirX += (dx / dist) * weight;
             dirY += (dy / dist) * weight;
           }
         });
         let fDist = Math.sqrt(dirX * dirX + dirY * dirY);
         if (fDist > 0.000001) {
           dirX /= fDist;
           dirY /= fDist;
         }
       } else {
         // 通常の追従または単一ターゲットからの退却
         let targetDx = target.x - e.x;
         let targetDy = target.y - e.y;
         if (isFleeing) {
           targetDx = -targetDx;
           targetDy = -targetDy;
         }
         let targetDist = Math.sqrt(targetDx * targetDx + targetDy * targetDy);
         if (targetDist > 0.001) {
           dirX = targetDx / targetDist;
           dirY = targetDy / targetDist;
         }
       }

       // 2. 障害物(星)からの反発力 + 回り込み力
       let avoidX = 0, avoidY = 0;
       const STAR_AVOID_RADIUS = Star.R * 3.5;
       g_stars.forEach(s => {
         if (!s.active) return;
         let dx = e.x - s.x;
         let dy = e.y - s.y;
         let dist = Math.sqrt(dx * dx + dy * dy);
         if (dist > 0 && dist < STAR_AVOID_RADIUS) {
           let force = 1.0 - (dist / STAR_AVOID_RADIUS);
           avoidX += (dx / dist) * force * 1.5 - (dy / dist) * force * 1.0;
           avoidY += (dy / dist) * force * 1.5 + (dx / dist) * force * 1.0;
         }
       });

       // 3. 他の敵からの反発力（分離）
       let sepX = 0, sepY = 0;
       const ENEMY_AVOID_RADIUS = EnemyShip.R * 2.5;
       g_enemies.forEach(other => {
         if (!other.active || other === e) return;
         let dx = e.x - other.x;
         let dy = e.y - other.y;
         let dist = Math.sqrt(dx * dx + dy * dy);
         if (dist > 0 && dist < ENEMY_AVOID_RADIUS) {
           let force = 1.0 - (dist / ENEMY_AVOID_RADIUS);
           sepX += (dx / dist) * force * 2.0;
           sepY += (dy / dist) * force * 2.0;
         }
       });
       
       // 4. ベクトルを合成
       let finalX = dirX * 1.0 + avoidX + sepX;
       let finalY = dirY * 1.0 + avoidY + sepY;

       let finalDist = Math.sqrt(finalX * finalX + finalY * finalY);
       
       // もし全方向からの力が完璧に釣り合ってゼロになってしまった場合（完全なスタック）
       // ランダムな方向に微小な力を与えて均衡を崩し、その場にとどまるのを防ぐ
       if (finalDist < 0.001) {
         let randomAngle = Math.random() * Math.PI * 2;
         finalX = Math.cos(randomAngle);
         finalY = Math.sin(randomAngle);
         finalDist = 1.0;
       }

       finalX = (finalX / finalDist) * EnemyShip.SPEED;
       finalY = (finalY / finalDist) * EnemyShip.SPEED;

       let desiredX = e.x + finalX;
       let desiredY = e.y + finalY;

       // 単純なクランプではなく、ルート走査による回避解決を適用
       return resolveMovement(e, desiredX, desiredY, EnemyShip.SPEED);
     } // calcDest(e, target, isFleeing = false)

     /**
      *
      */
     function fireBeam(scene, srcObj, targetObj, color) {
       const beam = scene.add.graphics();
       beam.lineStyle(4, color, 1);
       beam.lineBetween(srcObj.x, srcObj.y, targetObj.x, targetObj.y);
       scene.time.delayedCall(SYSTEM.TIMING.BEAM_DUR, () => beam.destroy());
     } // fireBeam(..)

     // ---------------------------------------------------------
     // 敵ターンの処理
     // ---------------------------------------------------------
     /**
      * 1. 敵ターン全体の制御（エントリーポイント）
      */
     function enemyTurn(scene) {
       if (g_isGameOver) return;

       // 各敵の行動を処理
       g_enemies.forEach(enemy => {
         scene.time.delayedCall(0, () => execEnemyAction(scene, enemy));
       });

       // 敵フェーズ終了後の処理（次ターン準備）
       const totalDelay = SYSTEM.TIMING.TURN_DELAY + SYSTEM.TIMING.TURN_MARGIN;
       scene.time.delayedCall(totalDelay, () => finalizeEnemyTurn(scene));
     }

     /**
      * 敵1体の具体的な行動（思考と実行）
      */
     function execEnemyAction(scene, enemy) {
       if (g_isGameOver || !enemy.active) return;

       // 状況を評価し、コンテキスト（距離や攻撃可能フラグなど）を取得
       const context = evalTacticalSituation(enemy);

       // 評価結果に基づいてアクションを分岐
       if (context.isFleeing) {
         console.log("fleeing");
         enemyMove(scene, enemy, context);
       } else if (context.canAttackBase) {
         console.log("attack base");
         enemyAttack(
           scene, enemy, g_starBase, context.distToBase,
           "SYSTEM: Starbase critical failure. Core breach imminent..."
         );
       } else if (context.canAttackPlayer) {
         console.log("attack player");
         enemyAttack(
           scene, enemy, g_playerShip, context.distToPlayer,
           "SYSTEM: Hull integrity zero. Ship destroyed."
         );
       } else {
         console.log("move");
         enemyMove(scene, enemy, context);
       }
     } // execEnemyAction

     /**
      * 戦況の評価（距離計算、攻撃可否、逃走判断）
      */
     function evalTacticalSituation(enemy) {
       const isFleeing = enemy.fear_mind > (enemy.shield / EnemyShip.SHIELD_MAX);
       const distToPlayer = Phaser.Math.Distance.Between(
         enemy.x, enemy.y, g_playerShip.x, g_playerShip.y
       );
       const distToBase = Phaser.Math.Distance.Between(
         enemy.x, enemy.y, g_starBase.x, g_starBase.y
       );

       // プレイヤーへの攻撃可否
       const isPlayerInRange = distToPlayer <= WEAPON.ENEMY.EFFECTIVE_RANGE;
       const canAttackPlayer = !isFleeing &&
                               !g_isDocked && 
                               isPlayerInRange && 
                               !isLOSBlocked(enemy, g_playerShip);

       // 基地への攻撃可否
       const isBaseInRange = distToBase <= WEAPON.ENEMY.EFFECTIVE_RANGE;
       const canAttackBase = !isFleeing &&
                             g_starBase.active && 
                             isBaseInRange && 
                             !isLOSBlocked(enemy, g_starBase, false);

       console.log(
         `enemy.shield=${enemy.shield}/${EnemyShip.SHIELD_MAX}, isFleeing=${isFleeing}`
       );

       return { distToBase, distToPlayer, canAttackBase, canAttackPlayer, isFleeing };
     } // evalTacticalSituation()

     /**
      * 攻撃処理
      */
     function enemyAttack(scene, enemy, target, distance, gameOverMsg) {
       fireBeam(scene, enemy, target, 0xff00ff);
       
       const target_damage = Math.floor(WEAPON.ENEMY.POWER * Math.exp(-WEAPON.ALPHA * distance));
       target.takeDamage(target_damage);

       if (target.shield <= 0 && !g_isGameOver) {
         updateStatus();
         gameOver(gameOverMsg);
       }
     } // enemyAttack()

     /**
      * 移動処理とシールド回復
      */
     function enemyMove(scene, enemy, context) {
       let targetDest;

       if (context.isFleeing) {
         // プレイヤーと基地の両方から逃げる
         targetDest = [
           { x: g_playerShip.x, y: g_playerShip.y },
           { x: g_starBase.x, y: g_starBase.y }
         ];
       } else {
         // より近い方を追跡する
         targetDest = (context.distToBase < context.distToPlayer) 
                    ? { x: g_starBase.x, y: g_starBase.y } 
                    : { x: g_playerShip.x, y: g_playerShip.y };
       }

       const dest = calcDest(enemy, targetDest, context.isFleeing);

       scene.tweens.add({
         targets: enemy,
         x: dest.x, y: dest.y,
         duration: SYSTEM.TIMING.TURN_DELAY,
         onComplete: () => {
           const distFromCenter = Phaser.Math.Distance.Between(
             enemy.x, enemy.y, SYSTEM.CENTER_X, SYSTEM.CENTER_Y
           );
           if (distFromCenter > SYSTEM.R_AREA) {
             // 領域外へ出たら消滅
             enemy.die();
             // fear_mind
             g_enemies.forEach(e => {
               e.fear_mind = Math.min(0.8, e.fear_mind + EnemyShip.FEAR_STEP);
               console.log(`e.fear_mind=${e.fear_mind.toFixed(3)}`);
             });

             if ( !g_isGameOver ) {
               const remaining = getActiveEnemyCount();
               setMsg(
                 `TACTICAL: Hostile vessel has retreated. ${remaining} targets remaining.`,
                 "#0f0", "#222"
               );
             }
           }
         }
       });

       enemy.x = Math.floor(enemy.x);
       enemy.y = Math.floor(enemy.y);

       // シールド回復する
       enemy.shield = Math.min(
         EnemyShip.SHIELD_MAX,
         enemy.shield + (EnemyShip.SHIELD_MAX * EnemyShip.SHIELD_RECOVERY_RATE)
       );

       // fear_mind 回復
       enemy.fear_mind = Math.max(
         EnemyShip.FEAR_INIT,
         (enemy.fear_mind - EnemyShip.FEAR_RECOVERY)
       );
     } // enemyMove()

     /**
      * ターン終了処理と次ターンへの準備
      */
     function finalizeEnemyTurn(scene) {
       g_enemies = g_enemies.filter(e => e.active);
       
       if (g_enemies.length === 0 && !g_isGameOver) {
         nextStage(scene);
       } else if (!g_isGameOver) {
         g_turn++;
         g_score--;

         // 増援の出現
         if (g_turn % SYSTEM.NEW_ENEMY_INTERVAL === 0) {
           const p = getSafeRandPos(0.8, 0.95);
           g_enemies.push(new EnemyShip(scene, p.x, p.y));
           // fear_mind
           g_enemies.forEach(e => {
             e.fear_mind = Math.max(0.2, e.fear_mind - EnemyShip.FEAR_STEP);
             console.log(`e.fear_mind=${e.fear_mind}`);
           });

           setMsg("TACTICAL: Alert! New hostile warp signature detected.", "#ff0", "#000")
         }

         // 基地の回復
         if ( g_starBase.shield < StarBase.SHIELD_MAX ) {
           const prev_starbase_shield = g_starBase.shield;
           g_starBase.shield = Math.floor(Math.min(
             StarBase.SHIELD_MAX,
             g_starBase.shield + (StarBase.SHIELD_MAX * StarBase.SHIELD_RECOVERY_RATE)
           ));
           console.log(`g_starBase: ${prev_starbase_shield} --> ${g_starBase.shield}`);
         }

         updateStatus(); 
         g_isPlayerTurn = true;
       }
     } // finalizeEnemyTurn()

     /**
      * ステータスエリア更新
      */
     function updateStatus() {
       const PlayerEnergy = g_playerShip.energy > 0 ? g_playerShip.energy : 0;
       const PlayerShield = g_playerShip.shield > 0 ? g_playerShip.shield : 0;
       const baseShield = g_starBase.shield > 0 ? g_starBase.shield : 0;
       const enemyCount = getActiveEnemyCount();

       document.getElementById('statusTurn').textContent = `${g_turn}`;
       document.getElementById('statusStage').textContent = `${g_curStage}`;
       document.getElementById('statusEnemyCount').style.color = "#ff0"
       document.getElementById('statusEnemyCount').textContent = `${enemyCount}`;
       document.getElementById('statusScore').textContent = `${g_score}`;

       // PlayerShip Shield
       let PlayerShieldRatio = PlayerShield / PlayerShip.SHIELD_MAX;
       let PlayerShieldColor = PlayerShieldRatio < 0.3 ? "#f00" : "#0f0";
       document.getElementById('statusShipShield').style.color = PlayerShieldColor;
       document.getElementById('statusShipShield').textContent = PlayerShield;
       document.getElementById('gaugeShipShield').style.width = (PlayerShieldRatio * 100) + '%';
       document.getElementById('gaugeShipShield').style.background = PlayerShieldColor;

       // PlayerShip Energy
       let energyRatio = PlayerEnergy / PlayerShip.ENERGY_MAX;
       let energyColor = energyRatio < 0.3 ? "#f00" : "#0f0";
       document.getElementById('statusShipEnergy').style.color = energyColor;
       document.getElementById('statusShipEnergy').textContent = PlayerEnergy;
       document.getElementById('gaugeShipEnergy').style.width = (energyRatio * 100) + '%';
       document.getElementById('gaugeShipEnergy').style.background = energyColor;

       // Base Shield
       let baseShieldRatio = baseShield / StarBase.SHIELD_MAX;
       let baseShieldColor = baseShieldRatio < 0.3 ? "#f00" : "#0f0";
           document.getElementById('statusBaseShield').style.color = baseShieldColor;
       document.getElementById('statusBaseShield').textContent = baseShield;
       document.getElementById('gaugeBaseShield').style.width = (baseShieldRatio * 100) + '%';
       document.getElementById('gaugeBaseShield').style.background = baseShieldColor;
     } // updateStatus()

     /**
      * 次のステージに移行
      */
     function nextStage(scene) {
       const clearedStage = g_curStage;
       let bonus = g_curStage * 100;
       if ( g_score > 0 ) {
         bonus += g_score;
       }
       console.log(`nextStage> bonus=${bonus}`);
       g_score += bonus;

       const { list, newIdx } = saveHighScore(
         g_score, g_turn, clearedStage, `STAGE ${clearedStage} CLEARED`, true
       );

       g_curStage++;
       SYSTEM.N_ENEMY++;
       g_isPlayerTurn = false;

       g_pendingScene = scene;

       setMsg(`COMMAND: Sector ${clearedStage} secured. Awaiting new orders.`);
       showHighScoreOverlay('stageclear', { clearedStage, bonus, list, newIdx });
     } // nextStage()

     /**
      * ゲームオーバー
      */
     function gameOver(msg, clear=false) {
       g_isGameOver = true;
       g_flagClear = clear;
       g_isPlayerTurn = false;
       setMsg(msg);
       setTimeout(() => showHighScoreOverlay('gameover', { msg }), 800);
     } // gameOver()

     function loadHighScores() {
       try {
         const raw = localStorage.getItem(HIGHSCORE.STORAGE_KEY);
         return raw ? JSON.parse(raw) : [];
       } catch (e) {
         return [];
       }
     }

     function saveHighScore(score, turns, stage, result, forceSave = false) {
       let list = loadHighScores();
       const now = new Date();
       const dateStr = [
         now.getFullYear(),
         String(now.getMonth() + 1).padStart(2, '0'),
         String(now.getDate()).padStart(2, '0')
       ].join('/');
       if ( g_flagClear || forceSave ) {
         list.push({
           score, turns, stage, result,
           gameid: SYSTEM.GAME_ID, date: dateStr, _new: true
         });
       }
       list.sort((a, b) => b.score - a.score);
       const newIdx = list.findIndex(s => s._new);
       list = list.slice(0, HIGHSCORE.MAX_ENTRIES);
       const madeIt = list.some(s => s._new);
       localStorage.setItem(
         HIGHSCORE.STORAGE_KEY,
         JSON.stringify(list.map(({ _new, ...rest }) => rest))
       );
       return { list, newIdx: madeIt ? newIdx : -1 };
     }

     function renderHSTable(list) {
       const tbody  = document.getElementById('hsTableBody');
       const noRec  = document.getElementById('hsNoRecord');
       tbody.innerHTML = '';
       if (!list || list.length === 0) {
         noRec.style.display = 'block';
         return;
       }
       noRec.style.display = 'none';
       const rankLabels = ['1ST', '2ND', '3RD', '4TH', '5TH'];
       list.forEach((s, i) => {
         const tr = document.createElement('tr');
         const thisGame = (s.gameid == SYSTEM.GAME_ID);
         if ( thisGame ) {
           tr.className = 'hs-new';
         }
         const rank   = rankLabels[i] || `${i + 1}TH`;
         const prefix = thisGame ? '★' : '';
         const displayStage = s.stage !== undefined ? s.stage : '-';
         tr.innerHTML = `
           <td>${prefix}</td>
           <td>${rank}</td>
           <td>${s.score}</td>
           <td>${displayStage}</td>
           <td>${s.turns}</td>
           <td>${s.date}</td>
         `;
         
         // ★追加: 行をクリックした際の処理
         tr.addEventListener('click', () => {
           // スコアを引き継ぐ
           g_score = s.score;
           // 記録されたステージの次からスタートする
           g_curStage = (s.stage !== undefined ? s.stage : 1) + 1;
           g_turn = 1;
           
           // 敵の初期生成数を、進行するステージに合わせて再計算
           // (初期値3 + ステージ進行分)
           SYSTEM.N_ENEMY = 3 + (g_curStage - 1);
           
           g_isGameOver = false;
           g_flagClear = false;
           g_isPlayerTurn = true;
           g_pendingScene = null;
           
           // オーバーレイを非表示にする
           document.getElementById('highScoreOverlay').style.display = 'none';
           
           // シーンを再起動
           if (g_curScene) {
             g_curScene.scene.restart();
           }
         });

         tbody.appendChild(tr);
       });
     } // renderHSTable()

     function showHighScoreOverlay(mode, data = {}) {
       const overlay    = document.getElementById('highScoreOverlay');
       const resultEl   = document.getElementById('hsResultMsg');
       const finalEl    = document.getElementById('hsFinalMsg');
       const closeBtn   = document.getElementById('hsCloseBtn');
       const restartBtn = document.getElementById('hsRestartBtn');

       if (mode === 'stageclear') {
         const { clearedStage, bonus, list, newIdx } = data;
         resultEl.style.color      = '#0f0';
         resultEl.textContent      = `✓ STAGE ${clearedStage} CLEARED!`;
         finalEl.textContent       = `TURNS:${g_turn}, STAGE BONUS:+${bonus}, SCORE: ${g_score}`;
         renderHSTable(list);
         closeBtn.style.display    = 'none';
         restartBtn.textContent    = '▶ NEXT STAGE';
         restartBtn.style.display  = 'inline-block';

       } else if (mode === 'gameover') {
         const { msg } = data;
         resultEl.style.color      = '#ff0';
         resultEl.textContent      = msg;
         finalEl.textContent       = `MISSION FAILED: SCORE: ${g_score}  ` +
                                     `STAGE: ${g_curStage}  TURNS: ${g_turn}`;
         renderHSTable(loadHighScores());
         closeBtn.style.display    = 'none';
         restartBtn.textContent    = '▶ RESTART';
         restartBtn.style.display  = 'inline-block';

       } else {
         resultEl.style.color      = '#0ff';
         resultEl.textContent      = '▶ HIGH SCORES ◀';
         finalEl.textContent       = `NOW — SCORE: ${g_score}   ` +
                                     `STAGE: ${g_curStage}   TURN: ${g_turn}`;
         renderHSTable(loadHighScores());
         closeBtn.style.display    = 'inline-block';
         restartBtn.textContent    = '▶ RESTART';
         restartBtn.style.display  = 'inline-block';
       }
       overlay.style.display = 'flex';
     } // showHighScoreOverlay()

     document.getElementById('viewScoresBtn').addEventListener('click', () => {
       showHighScoreOverlay('view');
     });

     document.getElementById('hsRestartBtn').addEventListener('click', () => {
       if (g_pendingScene) {
         document.getElementById('highScoreOverlay').style.display = 'none';
         g_turn = 1;
         const s = g_pendingScene;
         g_pendingScene = null;
         g_isPlayerTurn = true;
         s.scene.restart();
       } else {
         location.reload();
       }
     });

     document.getElementById('hsCloseBtn').addEventListener('click', () => {
       document.getElementById('highScoreOverlay').style.display = 'none';
     });

    </script>
  </body>
</html>
