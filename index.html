<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>Starbase Defender</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
     :root {
       --color-primary: #0ff;
       --color-accent: #08f;
       --color-bg-dark: #111;
       --font-mono: monospace;
       --panel-font-size: clamp(24px, 3.4vw, 30px);
     }
     body {
       margin:0;
       padding:0;
       background:#000;
       overflow:hidden;
       font-family: Arial, sans-serif;
     }
     button {
       font-family: inherit;
       cursor: pointer;
     }

     #gameContainer {
       display: flex;
       flex-direction: column;
       height: 100vh;
     }
     
     #statusPanel {
       background: var(--color-bg-dark);
       color: var(--color-primary);
       padding:15px;
       flex: 0 0 auto;
       border-bottom:2px solid var(--color-accent);
       overflow-y:auto;
       font-size: var(--panel-font-size);
       font-family: var(--font-mono);
       line-height: 1.1;
     }
     #statusPanel div {
       margin: 1px 5px;
     }

     #statusPanel .status-header {
       display: flex;
       background: #0a0a2a;
       justify-content: space-between;
       align-items: flex-end;
       border-bottom: 1px dashed var(--color-primary);
       padding-bottom: 6px;
       margin-bottom: 10px !important;
       flex-wrap: wrap;
     }
     #statusPanel .status-header span {
       margin: 0; /* 親の margin 指定をリセット */
     }
     #statusPanel .game-title {
       font-size: 1.1em;
       font-weight: bold;
       color: #fff;
       letter-spacing: 1px;
     }
     #statusPanel .game-version,
     #statusPanel .game-credits {
       font-size: 0.8em;
       color: var(--color-accent)
     }
     
     #statusPanel .status-gauge {
       display: inline-block;
       width: 60px;
       height: 1.0em;
       background: #222;
       border: 1px solid var(--color-accent);
       margin-left: 8px;
       vertical-align: middle;
     }
     #statusPanel .status-gauge-fill {
       height: 100%;
       width: 100%;
       background: #0f0;
       transition: width 0.2s ease, background-color 0.2s ease;
       margin: 0;
     }

     #logStatus {
       height: 150px;
       line-height: 1.2;
       overflow-y: auto;
       background: #000;
       border: 1px solid rgba(0, 255, 255, 0.2);
       padding: 4px;
       margin-top: 5px !important;
     }
     #logStatus .log-line {
       margin: 2px 0;
       padding: 1px 4px;
       border-radius: 2px;
     }

     #gameWrapper {
       position: relative;
       flex: 1;
       min-height: 0;
       display: flex;             /* 追加: フレックスボックス化 */
       justify-content: flex-start; /* 追加: 左詰め */
       align-items: flex-start;     /* 追加: 上詰め */
       background: #000;          /* 余白部分を黒に */
     }
     #gameCanvas {
       width: 100%;
       height: 100%;
       max-width: 100%;
       max-height: 100%;
       aspect-ratio: 1 / 1;       /* 追加: 常に正方形を保つことで見切れと間延びを防止 */
     }

     #zoomUI {
       position: absolute;
       top: 10px;
       left: 10px;
       display: flex;
       flex-direction: column;
       gap: 10px;
       z-index: 1000;
     }
     #zoomUI button {
       width: 90px;
       height: 90px;
       font-size: 48px;
       background: rgba(0, 136, 255, 0.5);
       color: #fff;
       border: 2px solid var(--color-primary);
       border-radius: 30px;
       user-select: none;
     }
     #zoomUI button:active {
       background: rgba(0, 255, 255, 0.8);
       color: #000;
     }

     #creditUI {
       position: absolute;
       bottom: 10px;
       right: 15px;
       color: rgba(0, 255, 255, 0.6);
       font-family: var(--font-mono);
       font-size: 28px;
       pointer-events: none; /* クリックイベントをキャンバスへ透過させる */
       z-index: 1000;
     }

     .panel-btn {
       font-size: 0.9em;
       background: transparent;
       color: var(--color-primary);
       border: 1px solid var(--color-primary);
       padding: 3px 8px;
       border-radius: 3px;
       margin-left: 10px;
       vertical-align: middle;
       transition: background 0.12s, color 0.12s;
     }
     .panel-btn:hover {
       background: var(--color-primary);
       color: #000;
     }

     #highScoreOverlay {
       display: none;
       position: fixed;
       inset: 0;
       background: rgba(0, 0, 20, 0.5);
       z-index: 9999;
       align-items: center;
       justify-content: center;
       font-family: var(--font-mono);
     }
     #hsPanel {
       border: 2px solid var(--color-primary);
       padding: 28px 32px;
       min-width: 500px;
       max-width: 800px;
       width: 92%;
       background: rgba(8, 8, 32, 0.5);
       box-shadow: 0 0 40px rgba(0,255,255,0.9);
     }
     #hsResultMsg {
       text-align: center;
       font-size: clamp(28px, 5vw, 40px);
       letter-spacing: 3px;
       margin: 0 0 6px 0;
     }
     #hsFinalMsg {
       color: #8df;
       text-align: center;
       font-size: clamp(24px, 2.5vw, 40px);
       margin: 0 0 16px 0;
       padding-bottom: 14px;
       border-bottom: 1px solid rgba(0,255,255,0.25);
     }
     .hs-heading {
       color: var(--color-primary);
       font-size: clamp(28px, 3.5vw, 40px);
       letter-spacing: 2px;
       margin-bottom: 8px;
     }
     #hsTableWrap {
       overflow-x: auto;
     }
     #hsTable {
       width: 100%;
       border-collapse: collapse;
       font-size: clamp(24px, 3.2vw, 30px);
       color: #9cf;
       min-width: 260px;
     }
     #hsTable th,
     #hsTable td {
       padding: 6px;
       white-space: nowrap;
     }
     #hsTable th {
       color: var(--color-primary);
       text-align: left;
       padding-top: 4px;
       padding-bottom: 4px;
       border-bottom: 1px solid rgba(0,255,255,0.3);
       letter-spacing: 1px;
     }
     #hsTable tbody tr.hs-new td {
       color: #ff0;
     }
     #hsTable tbody tr {
       cursor: pointer;
       transition: background-color 0.2s;
     }
     #hsTable tbody tr:hover {
       background-color: rgba(0, 255, 255, 0.15);
     }
     #hsNoRecord {
       color: #444;
       text-align: center;
       padding: 14px;
       font-size: clamp(24px, 2.2vw, 40px);
     }
     #hsBtns {
       display: flex;
       gap: 12px;
       justify-content: center;
       margin-top: 20px;
       flex-wrap: wrap;
     }
     .hs-btn {
       padding: 11px 20px;
       font-size: clamp(24px, 2.8vw, 40px);
       background: rgba(0, 100, 200, 0.3);
       color: var(--color-primary);
       border: 2px solid var(--color-primary);
       border-radius: 4px;
       letter-spacing: 1px;
       transition: background 0.15s, color 0.15s;
     }
     .hs-btn:hover,
     .hs-btn:active {
       background: var(--color-primary);
       color: #000;
     }

     @media (orientation: landscape) {
       #gameContainer {
         flex-direction: row;
       }
       #statusPanel {
         width: 320px; /* 適切な固定幅を指定 */
         height: 100vh;
         border-bottom: none;
         border-right: 2px solid var(--color-accent);
       }
       /* 横長画面でのパネル内のフォントサイズ微調整 */
       :root {
         --panel-font-size: clamp(16px, 2vw, 22px);
       }
     }
    </style>
  </head>
  <body>

    <script>
     // ---------------------------------------------------------
     // 設定・定数の定義
     // ---------------------------------------------------------
     const GAME_ID = Phaser.Utils.String.UUID();

     const TIMING = {
       BEAM_DUR: 400,
       TURN_DELAY: 400,
       TURN_MARGIN: 0,
       MISSION_OVER: 3000,
       ENEMY_DELAY_MAX: 500, // 敵艦の動作のズレ
     };

     const QTY = {
       STAR: 30,
       ENEMY: 3,
     };

     const NEW_ENEMY_INTERVAL = 25;
     const NEW_FEDERATION_INTERVAL = 40;  // TBD
     
     const SCALE = 0.5;

     const AREA_R = 300;

     const PLAY_AREA = {
       WIDTH: AREA_R * 2 + 30,
       HEIGHT: AREA_R * 2 + 30,
     };
     const AREA_CENTER = {
       X: PLAY_AREA.WIDTH / 2,
       Y: PLAY_AREA.HEIGHT / 2,
     };

     const CAMERA = {
       ZOOM_MIN: 1.0,
       ZOOM_MAX: 4.0,
       STEP: 2.0,
     };
     let CurZoom = 1.0;

     const SCORE = {
       INIT: 100,
       DESTROY_PENALTY: 50,
     };
     const HIGHSCORE = {
       MAX_ENTRIES: 5,
       STORAGE_KEY: 'starbaseDefenderScores'
     };

     /**
      * ゲーム進行状態（ターン・スコア・ミッション進行・シーン参照など）を
      * カプセル化するクラス。spaceContext と同様、単一インスタンスとして扱う。
      */
     class GameState {
       constructor() {
         this.turn = 1;
         this.curMission = 1;
         this.score = SCORE.INIT;
         this.isPlayerTurn = true;
         this.isGameOver = false;
         this.flagClear = false;
         this.pendingScene = null;
         this.curScene = null;
         this.qtyFederationShip = 0;
       }
     } // class GameState

     // グローバルなゲーム進行状態インスタンス
     const gameState = new GameState();

     let rangeGraphics, boundaryGraphics;

     // ---------------------------------------------------------
     // グローバルメソッド
     // ---------------------------------------------------------

     /**
      *
      */
     function getActiveFederationShipCount() {
       return spaceContext.federationShips.filter(f => f.active).length + 1;
     }

     /**
      *
      */
     function getActiveEnemyCount() {
       return spaceContext.enemies.filter(enemy => enemy.active).length;
     } // getActiveEnemyCount()

     /**
      * ゲージの描画
      */     
     function drawGauge(g, cx, cy, width, height, ratio, color) {
       g.clear();
       if ( !isFinite(cy) ) {
         return;
       }

       const x = cx - width / 2;
       const y = cy - height / 2;
       
       g.fillStyle(0x888888, 1);
       g.fillRect(x, y, width, height);
       
       const r = Math.max(0, Math.min(1, ratio));
       if (r > 0) {
         g.fillStyle(color, 1);
         g.fillRect(x, y, width * r, height);
       }
     } // drawGauge()

     /**
      * 宇宙域境界の描画
      */
     function drawBoundary(){
       boundaryGraphics.clear();
       boundaryGraphics.lineStyle(2, 0x0088ff, 1);
       boundaryGraphics.strokeCircle(AREA_CENTER.X, AREA_CENTER.Y, AREA_R);
     } // drawBoundary()

     /**
      * メッセージの表示（複数行スクロール対応）
      * @param {string} msg 表示するテキスト（空文字の場合はログを全消去）
      * @param {string} fg 文字色
      * @param {string} bg 行の背景色
      */
     function setMsg(msg, fg="#0ff", bg="transparent") {
       const el = document.getElementById('logStatus');
       
       // msgが空文字（ゲームオーバー時などの画面クリア命令）の場合は全消去
       if (!msg) {
         el.innerHTML = '';
         return;
       }

       s = String(gameState.curMission).padStart(3,"0");
       s += ".";
       s += String(gameState.turn).padStart(4,"0");
       s += " "
       s += msg;
       msg = s;

       // 新しいログ行のDOM要素を作成
       const line = document.createElement('div');
       line.className = 'log-line';
       line.style.color = fg;
       line.style.backgroundColor = (bg !== "#444") ? bg : "transparent";
       line.textContent = msg;

       // ログ領域の末尾に追加
       el.appendChild(line);

       // メモリ及びパフォーマンス対策: ログが50行を超えたら古い行から削除
       const maxLines = 50;
       while (el.children.length > maxLines) {
         el.removeChild(el.firstChild);
       }

       // 最新のメッセージが見えるように最下部へスクロール位置を調整
       el.scrollTop = el.scrollHeight;
     } // setMsg()

     /**
      * 艦載フェイザーアレイ 照射音ジェネレーター
      * @param {boolean} isPlayer 
      */
     function playBeamSound(isPlayer) {
       if (!window.audioCtx) {
         window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
       }
       if (window.audioCtx.state === 'suspended') {
         window.audioCtx.resume();
       }

       const ctx = window.audioCtx;
       let now = ctx.currentTime

       // ビームの持続時間（TIMING.BEAM_DURに合わせて500ms）
       let duration = TIMING.BEAM_DUR / 1000;
       if ( ! isPlayer ) {
         duration = TIMING.BEAM_DUR / 1000 / 3 * 2;
       }

       // 1. エンベロープ用ゲイン（音量の時間変化）
       const envelope = ctx.createGain();
       envelope.gain.setValueAtTime(0, now);
       envelope.gain.linearRampToValueAtTime(0.3, now + 0.02); // 瞬時に立ち上がる
       envelope.gain.linearRampToValueAtTime(0.2, now + duration * 0.3); // 持続
       envelope.gain.linearRampToValueAtTime(0.1, now + duration * 0.6); // 持続
       envelope.gain.linearRampToValueAtTime(0.05, now + duration * 0.8); // 持続
       envelope.gain.linearRampToValueAtTime(0, now + duration); // 鋭く遮断

       // 2. メインオシレーター（鋸歯状波で厚みのある音色を作る）
       const osc = ctx.createOscillator();
       osc.type = 'sawtooth';
       if ( isPlayer ) {
         osc.frequency.setValueAtTime(800, now);
       } else {
         osc.frequency.setValueAtTime(600, now);
       }
       
       // 3. フィルター（高音域を強調し、エネルギー感を出す）
       const filter = ctx.createBiquadFilter();
       filter.type = 'lowpass';
       filter.frequency.setValueAtTime(2000, now);
       filter.Q.value = 10;

       // 4. LFO（ウネリの生成）
       // 25Hzで揺らすことでTNG以降のフェイザー特有の「ビームが振動している感じ」を作る
       const lfo = ctx.createOscillator();
       lfo.type = 'sine';
       lfo.frequency.value = 20;
       const lfoGain = ctx.createGain();
       lfoGain.gain.value = 150; // 揺らぎの深さ
       //lfoGain.gain.value = 200; // 揺らぎの深さ

       // ルーティング
       lfo.connect(lfoGain);
       lfoGain.connect(osc.frequency); // 周波数を揺らす（ビブラート）
       
       osc.connect(filter);
       filter.connect(envelope);
       envelope.connect(ctx.destination);

       // 再生
       osc.start(now);
       lfo.start(now);
       osc.stop(now + duration);
       lfo.stop(now + duration);
     } // playBeamSound()
     
     // ---------------------------------------------------------
     // クラス定義
     // ---------------------------------------------------------

     /**
      * 空間内のオブジェクトを管理するコンテキスト
      */
     class SpaceContext {
       constructor() {
         this.player = null;
         this.starBase = null;
         this.federationShips = [];
         this.enemies = [];
         this.stars = [];
       }

       findObjectAt(x, y) {
         // 配列の先頭から優先的に評価（敵艦 -> 基地 -> 自機）
         const clickables = [...this.enemies, this.starBase, this.player];
         return clickables.find(e => {
           if (!e || !e.active) return false;
           return Phaser.Math.Distance.Between(x, y, e.x, e.y) < e.r;
         });
       }

       // 敵の追加・削除を管理
       addEnemy(enemy) {
         this.enemies.push(enemy);
       }
       removeEnemy(enemy) {
         this.enemies = this.enemies.filter(e => e !== enemy);
       }

       // 連邦艦の追加・削除を管理
       addFederation(ship) {
         this.federationShips.push(ship);
       }
       removeFederation(ship) {
         this.federationShips = this.federationShips.filter(e => e !== ship);
       }

       // 衝突判定や描画ループで使用する障害物リストを生成
       getObstacles(ignoreObj = null) {
         return [
           this.starBase,
           ...this.stars,
           ...this.enemies,
           ...this.federationShips
         ].filter(o => o && o.active && o !== ignoreObj);
       }
     } // SpaceContext

     // グローバルなコンテキストインスタンス
     const spaceContext = new SpaceContext();

     /**
      * 兵器クラス
      */
     class Weapon {
       static MAX_DAMAGE_RATIO = 0.2;  // 最大射程距離のダメージ比率
       
       constructor(max_power, area_r, cost=0) {
         console.log(`Weapon> max_power=${max_power}, area_r=${area_r}, const=${cost}`);
         this.max_power = max_power;
         this.area_r = area_r;
         this.cost = cost;
       }
       
       EffectiveRange() {
         return this.area_r;
       }
       
       MaxRange() {
         //console.log(`area_r=${this.area_r}, MAX_DAMAGE_RATIO=${this.constructor.MAX_DAMAGE_RATIO}`);
         return Math.floor(this.area_r * Math.sqrt(1 / this.constructor.MAX_DAMAGE_RATIO - 1));
       }

       /**
        * 距離に応じた武器の威力減衰率（有効度）を計算する
        */
       Effectiveness(distance) {
         const x = distance / this.area_r;
         return 1 / (1 + x * x);
       }

       CalcDamage(distance) {
         return Math.floor(this.max_power * this.Effectiveness(distance));
       }
     } // class Weapon

     /**
      *
      */
     class GameObj {
       constructor(scene, x, y, texture, scale=SCALE) {
         this.scene = scene;
         this.scale = scale;
         this.sprite = scene.add.image(x, y, texture).setScale(scale);
         this.active = true;
       }

       get x() {return this.sprite.x;}
       set x(val) {this.sprite.x = val;}

       get y() {return this.sprite.y;}
       set y(val) {this.sprite.y = val;}

       get src_w() {return this.sprite.width;}
       get src_h() {return this.sprite.height;}
       get src_r() {return (this.src_w + this.src_h) / 4;}

       get w() {return this.src_w * this.scale;}
       get h() {return this.src_h * this.scale;}
       get r() {return (this.w + this.h) / 4;}

       destroy() {
         this.sprite.destroy();
         this.active = false;
       }

       // デフォルトは「アクションを処理しなかった(false)」を返す
       onInteract(player, scene, endTurn) {
         return false;
       }

     } // class GameObj

     /**
      *
      */
     class ObjWithShield extends GameObj {
       static SHIELD_MAX = 1; // dummy
       static GAUGE_H = 8;
       static GAUGE_Y_OFFSET = 18;

       constructor(
         scene, x, y, texture,
         shield, shield_gauge_color,
         scale=SCALE
       ) {
         super(scene, x, y, texture, scale);
         this.shield = shield;
         this.shield_gauge_color = shield_gauge_color;

         this.gauge_h = this.constructor.GAUGE_H * scale;
         this.gauge_y = this.h + this.constructor.GAUGE_Y_OFFSET * scale;
         this.gauge_w = this.w;

         this.shield_gauge = this.scene.add.graphics();
         this.shield_circle = this.scene.add.graphics();

         this.spirit = 0.5;
       }

       update() {
         if (! this.active ) {
           if (this.shield_gauge) {
             this.shield_gauge.destroy();
             this.shield_circle.destroy();
           }
           return;
         }

         //
         // draw Shield circle
         //
         const shield_ratio = this.shield / this.constructor.SHIELD_MAX;
         let shield_color = 0xffffff;
         if ( shield_ratio < 0.5 ) {
           shield_color = 0xffff00;
         }
         if ( shield_ratio < 0.25 ) {
           shield_color = 0xff0000;
         }
         this.shield_circle.clear();
         this.shield_circle.lineStyle(3 * shield_ratio, shield_color, 1);
         this.shield_circle.strokeCircle(this.x, this.y, this.r);

         drawGauge(
           this.shield_gauge,
           this.x, this.y + (this.gauge_y * this.scale),
           this.gauge_w, this.gauge_h,
           this.shield / this.constructor.SHIELD_MAX,
           this.shield_gauge_color
         );
       } // update()

       /**
        *
        */
       shieldPercent() {
         return (this.shield / this.constructor.SHIELD_MAX);
       }

       /**
        *
        */
       fear() {
         return (1.0 - this.spirit);
       }

       /**
        *
        */
       isFleeing() {
         return this.shieldPercent() < this.fear();
       }

       /**
        *
        */
       takeDamage(amount) {
         this.shield -= amount;
         if (this.shield <= 0) {
           gameState.score -= SCORE.DESTROY_PENALTY;
           this.die();
         }
       } // takeDamage()

       /**
        *
        */
       die() {
         this.shield = 0;
         this.active = false;
         if ( this.shield_gauge ) {
           this.shield_gauge.destroy();
         }
         if ( this.shield_circle ) {
           this.shield_circle.destroy();
         }
         this.destroy();
       } // die()
     } // class ObjWithShield
     
     /**
      * 全ての艦船の基底クラス (SpaceShip)
      */
     class SpaceShip extends ObjWithShield {
       constructor(
         scene, x, y, texture,
         shield, shield_color, scale,
         weapon_power, weapon_area_r, weapon_cost=0
       ) {
         super(scene, x, y, texture, shield, shield_color, scale);
         this.weapon = new Weapon(weapon_power, weapon_area_r, weapon_cost);
       }

       /**
        * なにか衝突したら停止するように座標を計算
        */
       clampDest(destX, destY, ignoreObjs = []) {
         const startX = this.x;
         const startY = this.y;

         const targets = [
           spaceContext.starBase,
           ...spaceContext.federationShips,
           ...spaceContext.enemies,
           ...spaceContext.stars
         ].filter(
           e => e && e.active && e !== this && !ignoreObjs.includes(e)
         );

         if (this instanceof FederationShip || this instanceof EnemyShip) {
           targets.push(spaceContext.player);
         }

         const dx = destX - startX;
         const dy = destY - startY;
         const lenSq = dx * dx + dy * dy;
         if (lenSq < 0.0001) return { x: destX, y: destY };

         let minT = 1.0; 

         for (const tgt of targets) {
           let R = (this.w + tgt.w) / 2;
           const curDist = Phaser.Math.Distance.Between(startX, startY, tgt.x, tgt.y);
           if (curDist < R) {
             const toTargetX = tgt.x - startX;
             const toTargetY = tgt.y - startY;
             if (dx * toTargetX + dy * toTargetY > 0) {
               minT = 0; 
             }
             continue;
           }

           const fx = startX - tgt.x;
           const fy = startY - tgt.y;
           const a = lenSq;
           const b = 2 * (fx * dx + fy * dy);
           const c = fx * fx + fy * fy - R * R;
           const disc = b * b - 4 * a * c;
           if (disc < 0) continue; 
           const t = (-b - Math.sqrt(disc)) / (2 * a);
           if (t > 0 && t < minT) minT = t;
         } // for(tgt)

         if (minT < 1.0) {
           const len = Math.sqrt(lenSq);
           const stopT = Math.max(0, minT - 1.5 / len); 
           return { x: startX + dx * stopT, y: startY + dy * stopT };
         }
         return { x: destX, y: destY };
       } // clampDest()

       /**
        * 進行方向に障害物がある場合、少しずつ角度をずらして迂回ルートを探す
        */
       resolveMovement(desiredX, desiredY, speed, ignoreObjs = []) {
         const x = this.x;
         const y = this.y;

         let dx = desiredX - x;
         let dy = desiredY - y;
         let reqDistSq = dx * dx + dy * dy;
         
         // 【変更】自身の clampDest を呼び出す
         let directDest = this.clampDest(desiredX, desiredY, ignoreObjs);
         let directMoveSq = (directDest.x - x)**2 + (directDest.y - y)**2;
         
         if (directMoveSq >= reqDistSq * 0.99) {
           return directDest;
         }

         let baseAngle = Math.atan2(dy, dx);
         let bestDest = directDest;
         let minTargetDistSq = (directDest.x - desiredX)**2 + (directDest.y - desiredY)**2;

         for (let sign of [1, -1]) {
           for (let i = 5; i <= 90; i += 5) {
             let offset = (i * Math.PI) / 180;
             let testAngle = baseAngle + offset * sign;
             
             let testX = x + Math.cos(testAngle) * speed;
             let testY = y + Math.sin(testAngle) * speed;
             
             // 【変更】自身の clampDest を呼び出す
             let clamped = this.clampDest(testX, testY, ignoreObjs);
             
             let moveDistSq = (clamped.x - x)**2 + (clamped.y - y)**2;
             let distToTargetSq = (clamped.x - desiredX)**2 + (clamped.y - desiredY)**2;
             
             if (moveDistSq < 0.1) continue;

             let currentBestMoveSq = (bestDest.x - x)**2 + (bestDest.y - y)**2;
             let stuck = currentBestMoveSq < 1.0;

             if (distToTargetSq < minTargetDistSq || stuck) {
               minTargetDistSq = distToTargetSq;
               bestDest = clamped;
             }

             if (moveDistSq >= (speed * 0.95)**2) {
               break; 
             }
           } // for(i)
         } // for (sign)
         return bestDest;
       } // resolveMovement()

       /**
        * ターゲット群に対するステアリングベクトル（斥力・接線力）を計算するコアメソッド
        */
       calcAvoidanceForce(targets, radiusMultiplier, repulsionWeight, tangentialWeight) {
         let accX = 0, accY = 0;
         
         targets.forEach(t => {
           if (!t.active || t === this) return;
           
           const avoidRadius = (this.r + t.r) * radiusMultiplier;
           let dx = this.x - t.x;
           let dy = this.y - t.y;
           let dist = Math.hypot(dx, dy);
           
           if (dist > 0 && dist < avoidRadius) {
             let force = 1.0 - (dist / avoidRadius);
             accX += (dx / dist) * force * repulsionWeight - (dy / dist) * force * tangentialWeight;
             accY += (dy / dist) * force * repulsionWeight + (dx / dist) * force * tangentialWeight;
           }
         });
         
         return { x: accX, y: accY };
       } // calcAvoidanceForce()

       /**
        * 障害物や他ユニットからの回避・分離ベクトルを算出する
        */
       getAvoidanceVector(obstacles) {
         let avoid = this.calcAvoidanceForce(obstacles, 2.2, 0.8, 1.2);
         let sep = this.calcAvoidanceForce(spaceContext.enemies, 2.5, 2.0, 0.0);
         return { x: avoid.x + sep.x, y: avoid.y + sep.y };
       } // getAvoidanceVector()

       /**
        * ターゲットへの方向ベクトル（追尾・逃走）を算出する
        */
       getTargetVector(target, isFleeing) {
         let dirX = 0, dirY = 0;
         
         if (isFleeing && Array.isArray(target)) {
           target.forEach(t => {
             let dx = this.x - t.x;
             let dy = this.y - t.y;
             let dist = Math.hypot(dx, dy);
             if (dist > 0.001) {
               let weight = 1.0 / dist;
               dirX += (dx / dist) * weight;
               dirY += (dy / dist) * weight;
             }
           });
           // FederationShipの場合、StarBaseやPlayerShipに近づくようにする。
           if ( this instanceof FederationShip ) {
             let obj = [...spaceContext.federationShips].filter(f => f !==this);
             obj.push(spaceContext.starBase);
             obj.push(spaceContext.player);
             console.log(obj);
             obj.forEach(t => {
               let dx = t.x - this.x;
               let dy = t.y - this.y;
               let dist = Math.hypot(dx, dy);
               if (dist > 0.001) {
                 let weight = 1.0 / dist;
                 if ( t === spaceContext.player ) {
                   weight *= 2;
                 }
                 if ( t === spaceContext.starBase ) {
                   weight *= 5;
                 }
                 dirX += (dx / dist) * weight;
                 dirY += (dy / dist) * weight;
               }
             });
           } // if (FederationShip)

           let fDist = Math.hypot(dirX, dirY);
           if (fDist > 0.000001) {
             dirX /= fDist;
             dirY /= fDist;
           } // if (FederationShip)
         } else {
           let dx = target.x - this.x;
           let dy = target.y - this.y;
           if (isFleeing) {
             dx = -dx;
             dy = -dy;
           }
           let dist = Math.hypot(dx, dy);
           if (dist > 0.001) {
             dirX = dx / dist;
             dirY = dy / dist;
           }
         }
         return { x: dirX, y: dirY };
       } // getTargetVector()

       /**
        * ステアリング計算と障害物回避を統合し、移動先の座標を算出する
        */
       calculateDestination(targetPos, isFleeing = false) {
         let targetVec = this.getTargetVector(targetPos, isFleeing);
         let avoidVec = this.getAvoidanceVector(spaceContext.stars);
         
         let finalX = targetVec.x * 1.0 + avoidVec.x;
         let finalY = targetVec.y * 1.0 + avoidVec.y;

         let finalDist = Math.hypot(finalX, finalY);
         if (finalDist < 0.001) {
           let randomAngle = Math.random() * Math.PI * 2;
           finalX = Math.cos(randomAngle);
           finalY = Math.sin(randomAngle);
           finalDist = 1.0;
         }

         const speed = this.constructor.SPEED;
         let desiredX = this.x + (finalX / finalDist) * speed;
         let desiredY = this.y + (finalY / finalDist) * speed;

         return this.resolveMovement(desiredX, desiredY, speed);
       } // calculateDestination()

       /**
        * Tweenを利用して指定座標へ移動する
        */
       moveTo(destX, destY, duration = TIMING.TURN_DELAY, onComplete = null) {
         this.scene.tweens.add({
           targets: this,
           x: destX,
           y: destY,
           duration: duration,
           onComplete: () => {if (onComplete) {onComplete();}}
         });
       } // moveTo()
     } // class SpaceShip

     /**
      * NPC用基底クラス (SpaceShip を継承)
      */
     class NPCShip extends SpaceShip {
       constructor(scene, x, y, texture, shield, shield_color, scale, weapon_power, weapon_area_r) {
         super(scene, x, y, texture, shield, shield_color, scale, weapon_power, weapon_area_r);

         // 子クラス(EnemyShip / FederationShip) が持つスタティックプロパティを参照して士気を初期化
         this.spirit = this.constructor.SPIRIT.INIT;
         console.log(`${this.constructor.name}> spirit=${Number(this.spirit).toFixed(3)}`);
       }

       /**
        * ビームの色（子クラスでオーバーライド）
        */
       getBeamColor() {
         return 0xffffff; 
       }
       
       /**
        * 攻撃実行の共通処理
        */
       attack(target, distance) {
         // 自身の scene と getBeamColor() を使用してビームを描画
         fireBeam(this.scene, this, target, this.getBeamColor());
         
         const damage = this.weapon.CalcDamage(distance);
         target.takeDamage(damage);

         // 艦種ごとの攻撃後処理（メッセージ通知や撃破判定）を呼び出し
         this.onAfterAttack(target);
       } // attack()

       /**
        * 攻撃後の派生処理用フック（子クラスで実装）
        */
       onAfterAttack(target) {
         // デフォルトは何もしない
       } // onAfterAttack()

       // --- 評価対象となるターゲット候補リストを取得（子クラスで実装） ---
       getPotentialTargets() {
         return [];
       } // getPotentialTargets()

       // --- 特定のターゲットを評価対象から除外するかどうかの判定（必要に応じて子クラスで実装） ---
       shouldIgnoreTarget(target) {
         return false;
       } // shouldIgnoreTarget()

       // --- 戦術評価の実行 ---
       evaluateTactics() {
         const isFleeing = this.isFleeing();
         let target = null;
         let distToTarget = Infinity;
         let canAttack = false;

         const potentialTargets = this.getPotentialTargets();
         let bestAttackableTarget = null;
         let bestAttackableDist = Infinity;
         let closestTarget = null;
         let closestDist = Infinity;

         potentialTargets.forEach(t => {
           if (!t || !t.active) return;
           if (this.shouldIgnoreTarget(t)) return;

           let d = Phaser.Math.Distance.Between(this.x, this.y, t.x, t.y);
           
           // 最短距離の対象を記録（攻撃不可の場合の追跡目標）
           if (d < closestDist) {
             closestDist = d;
             closestTarget = t;
           }

           // 攻撃可能な対象を評価
           if (!isFleeing && d <= this.weapon.MaxRange() * (1.0 - this.spirit)) {
             let checkBaseObstacle = (t !== spaceContext.starBase);
             if (!isLOSBlocked(this, t, checkBaseObstacle)) {
               if (d < bestAttackableDist) {
                 bestAttackableDist = d;
                 bestAttackableTarget = t;
               }
             }
           }
         }); // forEach

         if (bestAttackableTarget) {
           target = bestAttackableTarget;
           distToTarget = bestAttackableDist;
           canAttack = true;
         } else {
           target = closestTarget;
           distToTarget = closestDist;
           canAttack = false;
         }

         return { target, distToTarget, canAttack, isFleeing };
       } // evaluateTactics()

     } // class NPCShip

       // --- 敵艦が攻撃した後の処理 ---
       onAfterAttack(target) {
         const t_shield_p = Math.floor(target.shield / target.constructor.SHIELD_MAX * 100);

         if (target === spaceContext.player && t_shield_p < 60) {
           if (t_shield_p > 30) {
             setMsg(`機関部: シールド ${t_shield_p}% に低下`, "#ff0");
           } else {
             setMsg(`機関部: 艦長！シールド ${t_shield_p}% 危険です！`, "#f00");
           }
           updateStatus();
         }
         if (target === spaceContext.starBase && t_shield_p < 60) {
           setMsg(`基地: シールド ${t_shield_p}%、至急救援を求む！`, "#ff0");
           if (t_shield_p <= 30) {
             setMsg(`基地: シールド ${t_shield_p}%、至急救援を求む！`, "#f00");
           }
           updateStatus();
         }
         if (target.shield <= 0 && !gameState.isGameOver) {
           if (target === spaceContext.starBase) {
             gameOver("基地: シールド消失！！ 基地が崩壊...");
           } else if (target === spaceContext.player) {
             gameOver("機関部: シールド消失！！ 船体が崩壊...");
           } else if (target instanceof FederationShip) { // 【修正】配列比較のバグを解消
             setMsg("通信士: 味方1隻との通信が途絶えました...", "#f00");
             updateStatus();
           }
         }
       } // onAfterAttack()

       // --- 敵艦のターゲット候補 ---
       getPotentialTargets() {
         const targets = [spaceContext.starBase, ...spaceContext.federationShips];
         if (!spaceContext.player.is_docked) {
           targets.push(spaceContext.player);
         }
         return targets;
       } // getPotentialTargets()

       // 敵艦に対するクリック操作（攻撃）
       onInteract(player, scene, endTurn) {
         if (player.is_docked) {
           setMsg("戦術士官: ドッキング中のため、兵器は使用できません。", "#ff0");
           return true;
         }
         if (player.energy < player.weapon.cost) {
           setMsg("戦術士官: エネルギー不足で攻撃できません！", "#f00");
           return true;
         }

         // 発射
         player.energy -= player.weapon.cost;
         const dist = Phaser.Math.Distance.Between(player.x, player.y, this.x, this.y);

         if (dist > player.weapon.MaxRange()) {
           setMsg("戦術士官: 射程範囲外のため、敵艦にダメージなし。", "#ff0");
           fireBeam(scene, player, this, 0x444444);
           endTurn();
           return true;
         }
         if (isLOSBlocked(player, this, false)) {
           setMsg("戦術士官: 障害物に遮られました。", "#ff0");
           fireBeam(scene, player, this, 0x444444);
           endTurn();
           return true;
         }

         // 命中
         //setMsg("戦術士官: 攻撃命中！ 敵艦シールド低下！", "#f80");
         const damage = player.weapon.CalcDamage(dist);
         this.takeDamage(damage);
         fireBeam(scene, player, this, 0x00ffff);

         if (!this.active) {
           // 撃墜
           spaceContext.removeEnemy(this);
           const rp = getSafeRandPos(0.8, 0.95);
           const newEnemy = new EnemyShip(scene, rp.x, rp.y);
           spaceContext.addEnemy(newEnemy);
           setMsg("戦術士官: 敵艦を撃破！ 別の新たな敵艦を検知しました！", "#ff0");
         }
         endTurn();
         return true;
       } // onInteract()

           PlayerShip.SHIELD_MAX, PlayerShip.SHIELD_COLOR,
           PlayerShip.ENERGY_MAX, PlayerShip.ENERGY_COLOR,
           SCALE,
           PlayerShip.WEAPON.POWER,
           PlayerShip.WEAPON.AREA_R,
           PlayerShip.WEAPON.COST
         );

         // ※ this.weapon = new Weapon(...) は SpaceShip で行われるため削除！

         this.is_docked = false;
         
         this.sprite.setDepth(10);
         this.shield_gauge.setDepth(10);
       }

       // 自機に対するクリック操作（シールド強化）
       onInteract(player, scene, endTurn) {
         const d_shield = PlayerShip.SHIELD_MAX - this.shield;
         if (d_shield <= 0) {
           setMsg("機関部: シールドはすでに最大です。", "#fff");
           return true;
         }

         const energy_supply = Math.min(this.energy, d_shield);
         if (energy_supply <= 0) {
           setMsg("機関部: エネルギー不足により、シールドを補強できません！");
           return true;
         }

         this.energy -= energy_supply;
         this.shield += energy_supply;

         const shield_p = Math.floor(this.shield / PlayerShip.SHIELD_MAX * 100);
         const energy_p = Math.floor(this.energy / PlayerShip.ENERGY_MAX * 100);
         setMsg(`機関部: シールドアップ。エネルギー残り ${energy_p}%`, "#8ff");
         endTurn();
         return true;
       } // onInteract()

     /**
      * ズーム倍率変更
      */
     function changeZoom(scene, amount) {
       let nextZoom = CurZoom;
       if (amount > 0) {
         nextZoom = CurZoom * amount;
       } else if (amount < 0) {
         nextZoom = CurZoom / -amount;
       }
       
       // 最小倍率を 1.0 に強制固定（1倍以下はない）
       CurZoom = Phaser.Math.Clamp(nextZoom, 1.0, CAMERA.ZOOM_MAX);
       
       // ターゲットの切り替えを実行
       updateCameraTarget(scene);
       
       scene.tweens.add({
         targets: scene.cameras.main,
         zoom: CurZoom,
         duration: 250,
         ease: 'Sine.easeInOut'
       });
     } // changeZoom()

       if (CurZoom <= 1.0) {
         CurZoom = 1.0;

         scene.cameras.main.stopFollow();

       } else {
         // 1倍より大きい（2倍、4倍など）ときは自機を中心に追従（見切れ許容）
         scene.cameras.main.startFollow(spaceContext.player.sprite, true, 0.1, 0.1);

     /**
      *
      */
     function getSafeRandPos(dist_min, dist_max){
       let x, y, distToCenter;
       let safe = false;
       let attempts = 0;
       
       // オブジェクト同士が重ならないための最低距離
       const MIN_SPAWN_DIST = PlayerShip.R * 3.5;
       
       while(!safe && attempts < 100) {
         x = Phaser.Math.Between(AREA_CENTER.X - AREA_R, AREA_CENTER.X + AREA_R);
         y = Phaser.Math.Between(AREA_CENTER.Y - AREA_R, AREA_CENTER.Y + AREA_R);
         distToCenter = Phaser.Math.Distance.Between(x, y, AREA_CENTER.X, AREA_CENTER.Y);
         
         if ( distToCenter < AREA_R * dist_min || distToCenter > AREA_R * dist_max ) {
           continue;
         }
         
         safe = true;

         for(let s of [
           ...spaceContext.stars, ...spaceContext.federationShips, ...spaceContext.enemies]
         ) {
           if (s.active && Phaser.Math.Distance.Between(x, y, s.x, s.y) < MIN_SPAWN_DIST) {
             safe = false;
             break;
           }
         }
         attempts++;
       } // while
       return { x, y };
     } // getSafeRandPos()

     /**
      *
      */
     function hasObstacleOnPath(src, dst, obj) {
       const dx = dst.x - src.x, dy = dst.y - src.y;
       const a = dx * dx + dy * dy;
       if (a < 0.001) {
         return false;
       }
       const fx = src.x - obj.x, fy = src.y - obj.y;
       const b = 2*(fx * dx + fy * dy);
       const c = fx*fx + fy*fy - obj.r * obj.r;
       const disc = b*b-4*a*c;
       if ( disc < 0 ) {
         return false;
       }
       const t1 = (-b-Math.sqrt(disc)) / (2*a);
       const t2 = (-b+Math.sqrt(disc)) / (2*a);

       return (t1 > 0.05 && t1 < 0.95) || (t2 > 0.05 && t2 < 0.95);
     } // hasObstacleOnPath()

     /**
      * LOS(Line of Sight、射線)がブロックされてないか？
      */
     function isLOSBlocked(srcObj, targetObj, checkBase = true) {
       // 1. 星（障害物）による遮蔽の判定
       let hitStar = spaceContext.stars.some(s => s.active && hasObstacleOnPath(srcObj, targetObj, s));
       if (hitStar) return true;

       // 2. 基地による遮蔽の判定（基地の見た目のサイズで正確に判定）
       if (checkBase && spaceContext.starBase && spaceContext.starBase.active && spaceContext.starBase.shield > 0) {
         if (hasObstacleOnPath(srcObj, targetObj, spaceContext.starBase)) {
           return true;
         }
       }
       return false;
     } // isLOSBlocked()

     /**
      *
      */
     function handlePointerDown(pointer) {
       if (gameState.isGameOver || !gameState.isPlayerTurn) return;

       // 宇宙域外は無視
       if (
         Phaser.Math.Distance.Between(
           pointer.worldX, pointer.worldY, AREA_CENTER.X, AREA_CENTER.Y
         ) >= AREA_R
       ) {
         return;
       }

       if (spaceContext.player.energy < PlayerShip.ENERGY_MIN && !spaceContext.player.is_docked) {
         updateStatus();
         gameOver(
           "コンピュータ: エネルギー枯渇により航行不能。緊急遭難ビーコンを発信し、機体を放棄します..."
         );
         return;
       }

       const clickedObj = spaceContext.findObjectAt(pointer.worldX, pointer.worldY);
       /* if (clickedObj) {
        *   console.log(`clickedObj=${clickedObj.constructor.name}`);
        * }
        */
       const endTurn = () => {
         gameState.isPlayerTurn = false;
         this.time.delayedCall(TIMING.TURN_DELAY, () => npcTurn(this));
         updateStatus();
       };

       // オブジェクトがアクションを処理できればtrueが返る
       const handled = clickedObj?.onInteract(spaceContext.player, this, endTurn);
       //console.log('handled=', handled);

       if (handled) {
         return;
       }
       
       // 処理されなかった場合（空間クリック、または遠距離基地クリック）は移動へフォールバック
       const targetX = clickedObj ? clickedObj.x : pointer.worldX;
       const targetY = clickedObj ? clickedObj.y : pointer.worldY;
       attemptPlayerMove(this, targetX, targetY, TIMING.TURN_DELAY);

       if (spaceContext.player.energy < PlayerShip.ENERGY_MIN && !spaceContext.player.is_docked) {
         updateStatus();
         gameOver("コンピュータ: エネルギー枯渇により航行不能。緊急遭難ビーコンを発信します...");
       }
     } // handlePointerDown()

     /**
      * ドッキングできるか確認
      */
     function canDock() {
       // 到達距離
       const dist = Phaser.Math.Distance.Between(
         spaceContext.player.x, spaceContext.player.y,
         spaceContext.starBase.x, spaceContext.starBase.y
       );

       if (dist > PlayerShip.SPEED) {
         return false;
       }

       // 経路上に有効(active)な障害物が1つでもあれば false を返す (パターンB)
       const hasObstacle = [
         ...spaceContext.stars, ...spaceContext.enemies, ...spaceContext.federationShips
       ].some(
         obj => obj.active && hasObstacleOnPath(spaceContext.player, spaceContext.starBase, obj)
       );
       //console.log('hasObstacle=', hasObstacle);
       return !hasObstacle;
     } // canDock()

     /**

      */
     function dockShip(scene) {

     /**
      * 自機の移動処理（スタック回避および進路変更報告機能を追加）
      */
     function attemptPlayerMove(scene, targetX, targetY, delayBeforeEnemyTurn) {
       let rawDist = Phaser.Math.Distance.Between(spaceContext.player.x, spaceContext.player.y, targetX, targetY);
       if (rawDist < 1) return;
       let moveDist = Math.min(rawDist, PlayerShip.SPEED);

       // 目的座標が「基地」そのもの（または基地の内部）をクリックしたか判定
       let target_is_base = false;
       let dist_target_base = Phaser.Math.Distance.Between(targetX, targetY, spaceContext.starBase.x, spaceContext.starBase.y);
       if (dist_target_base <= StarBase.R) {
         target_is_base = true;
       }

       // 1. 直線ベクトルを計算（AIの avoidVec は不使用）
       let target = { x: targetX, y: targetY };
       let targetVec = spaceContext.player.getTargetVector(target, false);
       let desiredX = spaceContext.player.x + targetVec.x * moveDist;
       let desiredY = spaceContext.player.y + targetVec.y * moveDist;

       let destX, destY;
       let skipAutoDock = false;
       let ignoreObjs = [];
       let isRerouted = false; // 【改修】コース変更を検知するためのフラグ

       // 2. ドッキング解除時（離脱時）の特別ロジック
       if (spaceContext.player.is_docked) {
         spaceContext.player.is_docked = false;
         skipAutoDock = true;
         spaceContext.player.shield = PlayerShip.SHIELD_MAX;
         setMsg("基地: ドッキング・クランプ解除");

         ignoreObjs = [spaceContext.starBase];
         const finalDest = spaceContext.player.resolveMovement(desiredX, desiredY, moveDist, ignoreObjs);
         destX = finalDest.x;
         destY = finalDest.y;

         const distFromBase = Phaser.Math.Distance.Between(spaceContext.starBase.x, spaceContext.starBase.y, destX, destY);
         const minPushDist = StarBase.R + PlayerShip.R;
         if (distFromBase < minPushDist) {
           let pushAngle = Math.atan2(destY - spaceContext.starBase.y, destX - spaceContext.starBase.x);
           destX = spaceContext.starBase.x + Math.cos(pushAngle) * minPushDist;
           destY = spaceContext.starBase.y + Math.sin(pushAngle) * minPushDist;
         }
       } 
       // 3. 通常移動およびドッキングを目的とする移動
       else {
         const finalDest = spaceContext.player.clampDest(desiredX, desiredY, []);
         destX = finalDest.x;
         destY = finalDest.y;
       }

       let actualDist = Phaser.Math.Distance.Between(
         spaceContext.player.x, spaceContext.player.y, destX, destY
       );
       
       // スタック（完全停止）判定時の自動回避処理
       if (actualDist < 0.1) {
         // 扇形探索（resolveMovement）を利用して迂回進路を再計算
         const avoidDest = spaceContext.player.resolveMovement(
           desiredX, desiredY, moveDist, ignoreObjs
         );
         destX = avoidDest.x;
         destY = avoidDest.y;
         actualDist = Phaser.Math.Distance.Between(
           spaceContext.player.x, spaceContext.player.y, destX, destY
         );

         // 迂回を試みても移動不能な場合（四方を完全に囲まれている場合など）キャンセル
         if (actualDist < 0.1) {
           setMsg("操舵手: 障害物に接近しすぎています。コース設定できません。", "#0f0");
           updateStatus();
           return;
         }

         // 回避移動が成立したため、コース変更フラグを立てる
         isRerouted = true;
       }

       const speed_p = (actualDist / PlayerShip.SPEED * 100).toFixed(0);
       let cost = Math.max(1, Math.ceil(actualDist * PlayerShip.MOVE_COST_RATE));
       if ( spaceContext.player.energy - cost < 0 ) {
         setMsg("機関部: エネルギー不足で移動できません", '#ff0');
         updateStatus();
         return;
       }

       // コース変更時のメッセージ
       const shiftDist = Phaser.Math.Distance.Between(desiredX, desiredY, destX, destY);
       if (isRerouted) {
         setMsg(`操舵手: 障害物回避のため進路変更。インパルスエンジン出力 ${speed_p}%`, "#ff0");
       } else if (shiftDist > 5.0 && !target_is_base) {
         setMsg(`操舵手: 進路上に障害物を検知。安全距離にて停止します。出力 ${speed_p}%`, "#ff0");
       } else {
         //setMsg(`操舵手: コースセット。インパルスエンジン出力 ${speed_p}%`);
       }
       updateStatus();
       
       spaceContext.player.energy -= cost;
       gameState.isPlayerTurn = false;

       spaceContext.player.moveTo(destX, destY, TIMING.TURN_DELAY, () => {
         if (!skipAutoDock) {
           const dockDist = Phaser.Math.Distance.Between(
             spaceContext.player.x, spaceContext.player.y,
             spaceContext.starBase.x, spaceContext.starBase.y
           );
           const contactDist = StarBase.R + PlayerShip.R + 1.5;
           
           const canDockNow = (
             !spaceContext.player.is_docked 
             && dockDist <= contactDist 
             && spaceContext.starBase.active 
             && spaceContext.starBase.shield > 0 
             && target_is_base
           );
           if (canDockNow) {
             dockShip(scene);
           }
         }
         scene.time.delayedCall(delayBeforeEnemyTurn, () => npcTurn(scene));
       });

       updateStatus();
     } // attemptPlayerMove()

     /**
      * NPCターン全体の制御（エントリーポイント）
      */
     function npcTurn(scene) {
       if (gameState.isGameOver) {
         return;
       }

       // 敵艦と連邦艦をひとつの配列にまとめて処理する
       const npcs = [...spaceContext.federationShips, ...spaceContext.enemies];

       npcs.forEach(npc => {
         const startDelay = Math.random() * TIMING.ENEMY_DELAY_MAX;
         scene.time.delayedCall(startDelay, () => execNPCAction(scene, npc));
       });

       let totalDelay = (
         TIMING.TURN_DELAY + TIMING.TURN_MARGIN + TIMING.ENEMY_DELAY_MAX
       );
       /* console.log(
        *   `npcTurn> spaceContext.enemies.length=${spaceContext.enemies.length}, totalDelay=${totalDelay}`
        * ); */
       scene.time.delayedCall(totalDelay, () => finalizeEnemyTurn(scene));
     } // npcTurn()

     /**
      * NPC1体の具体的な行動（思考と実行）
      */
     function execNPCAction(scene, npc) {
       //console.log(`=== execNPCAction: ${npc.constructor.name} ===`);
       if (gameState.isGameOver || !npc.active) return;
       
       const context = npc.evaluateTactics();
       console.log(
         npc.constructor.name,
         "shield",
         npc.shieldPercent().toFixed(3),
         ", fear",
         npc.fear().toFixed(3),
         //context
       );

       if (context.isFleeing) {
         npcMove(scene, npc, context);
       } else if (context.canAttack) {
         npc.attack(context.target, context.distToTarget);
       } else {
         npcMove(scene, npc, context);
       }
     } // execNPCAction()

     /**
      * NPC 移動処理とシールド回復
      */
     /**
      * NPC 移動処理とシールド回復
      */
     function npcMove(scene, npc, context) {
       let dest;
       let isDocking = false;

       const base = spaceContext.starBase;
       const isBaseActive = base && base.active && base.shield > 0;

       if (context.isFleeing) {
         // 連邦艦かつ移動可能距離内に有効な基地がある場合、ドッキング移動を最優先する
         if (npc instanceof FederationShip && isBaseActive) {
           const distToBase = Phaser.Math.Distance.Between(npc.x, npc.y, base.x, base.y);
           if (distToBase <= npc.constructor.SPEED) {
             dest = { x: base.x, y: base.y };
             isDocking = true;
           }
         }

         // ドッキング対象でない場合は、通常の逃走（敵・障害物回避）経路を計算
         if (!isDocking) {
           let threats = [spaceContext.player, base];
           if (npc instanceof FederationShip) {
             threats = spaceContext.enemies.filter(e => e.active && e !== npc);
           }
           const targetDest = threats.map(t => ({ x: t.x, y: t.y }));
           dest = npc.calculateDestination(targetDest, context.isFleeing);
         }
       } else {
         // 逃走中でない場合：ターゲットがいれば追跡、いなければ基地へ向かう
         const targetDest = context.target ? { x: context.target.x, y: context.target.y } : { x: base.x, y: base.y };
         dest = npc.calculateDestination(targetDest, context.isFleeing);
       }

       npc.moveTo(dest.x, dest.y, TIMING.TURN_DELAY, () => {
         npc.x = Math.floor(npc.x);
         npc.y = Math.floor(npc.y);

         const distFromCenter = Phaser.Math.Distance.Between(
           npc.x, npc.y, AREA_CENTER.X, AREA_CENTER.Y
         );
         if (distFromCenter > AREA_R) {
           npc.die();
           if (npc instanceof FederationShip) {
             setMsg("通信士: 味方が離脱。", "#88f");
             gameState.score -= SCORE.DESTROY_PENALTY;
           }
           if (npc instanceof EnemyShip) {
             spaceContext.enemies.forEach(e => {
               e.spirit = Math.max(EnemyShip.SPIRIT.MIN, e.spirit - EnemyShip.SPIRIT.STEP);
             });
             if (!gameState.isGameOver) {
               if (getActiveEnemyCount() > 0) {
                 setMsg(
                   `副長: 敵艦が離脱。`, "#0f8"
                 );
               } else {
                 setMsg(
                   '副長: 敵艦がすべて撤退しました！', "#ff0"
                 );
               }
             }
           }
         } // if (distFromCenter > AREA_R)

         // シールド回復処理
         if (isDocking) {
           npc.shield = npc.constructor.SHIELD_MAX;
           //setMsg("通信士: 味方連邦艦が基地にドッキングし、シールドを全回復しました。", "#0ff");
         } else {
           npc.shield = Math.min(
             npc.constructor.SHIELD_MAX,
             npc.shield + (npc.constructor.SHIELD_MAX * npc.constructor.SHIELD_RECOVERY_RATE)
           );
         }

         // spirit 回復
         if (context.isFleeing) {
           npc.spirit = Math.min(
             npc.constructor.SPIRIT.MAX,
             (npc.spirit + npc.constructor.SPIRIT.RECOVERY)
           );
           //console.log(`npcMove> spirit recover: ${npc.spirit.toFixed(3)}`);
         }
       }); // npc.moveTo()

     } // npcMove()
     
     /**
      * ターン終了処理と次ターンへの準備
      */
     function finalizeEnemyTurn(scene) {
       spaceContext.enemies = spaceContext.enemies.filter(e => e.active);
       
       if (spaceContext.enemies.length === 0 && !gameState.isGameOver) {
         nextMission(scene);
         return;
       }

       if ( gameState.isGameOver ) {
         return;
       }

       gameState.turn++;
       // 減点
       gameState.score -= spaceContext.enemies.filter(e => e.active).length;
       gameState.score -= spaceContext.federationShips.filter(e => e.active).length;

       // 増援の出現
       if (gameState.turn % NEW_ENEMY_INTERVAL === 0) {
         const p = getSafeRandPos(0.8, 0.95);
         const newEnemy = new EnemyShip(scene, p.x, p.y);
         spaceContext.addEnemy(newEnemy);

         // spirit
         spaceContext.enemies.forEach(obj => {
           obj.spirit = Math.min(EnemyShip.SPIRIT.MAX, obj.spirit + EnemyShip.SPIRIT.STEP);
           console.log(`finalizeEnemyTurn> obj.spirit up: ${obj.spirit.toFixed(3)}`);
         });
         setMsg("戦術士官: 新たな敵を検知！", "#ff0")
       }
       if ( gameState.turn % NEW_FEDERATION_INTERVAL === 0 ) {
         // XXX TBD 連邦の援軍が出現する条件
         qty_enemies = spaceContext.enemies.filter(e => e.active).length;
         console.log(
           `qtyFederationShip=${gameState.qtyFederationShip}, qty_enemies=${qty_enemies}`
         );
         if ( gameState.qtyFederationShip < qty_enemies / 2 ) {
           setMsg("通信士: 味方の援軍が到着しました！", "#0f0");
           newFederationShip(scene, 0.8, 0.95);
         }
       }

       // 基地の回復
       if ( spaceContext.starBase.shield < StarBase.SHIELD_MAX ) {
         const prev_starbase_shield = spaceContext.starBase.shield;
         spaceContext.starBase.shield = Math.floor(Math.min(
           StarBase.SHIELD_MAX,
           spaceContext.starBase.shield + (StarBase.SHIELD_MAX * StarBase.SHIELD_RECOVERY_RATE)
         ));
         /* console.log(
          *   `spaceContext.starBase: ${prev_starbase_shield} --> ${spaceContext.starBase.shield}`
          * ); */
       }

       updateStatus(); 
       gameState.isPlayerTurn = true;
     } // finalizeEnemyTurn()

     /**
      * ステータスエリア更新
      */
     function updateStatus() {
       const PlayerEnergy = spaceContext.player.energy > 0 ? spaceContext.player.energy : 0;
       const PlayerShield = spaceContext.player.shield > 0 ? spaceContext.player.shield : 0;
       const baseShield = spaceContext.starBase.shield > 0 ? spaceContext.starBase.shield : 0;
       const federationCount = getActiveFederationShipCount();
       const enemyCount = getActiveEnemyCount();

       document.getElementById('statusTurn').textContent = `${gameState.turn}`;
       document.getElementById('statusMission').textContent = `${gameState.curMission}`;
       document.getElementById('statusScore').textContent = `${gameState.score}`;

       document.getElementById('statusFederationShipCount').style.color = "#ff0"
       document.getElementById('statusFederationShipCount').textContent = `${federationCount}`;

       document.getElementById('statusEnemyShipCount').style.color = "#ff0"
       document.getElementById('statusEnemyShipCount').textContent = `${enemyCount}`;

       // PlayerShip Shield
       let PlayerShieldRatio = PlayerShield / PlayerShip.SHIELD_MAX;
       let PlayerShieldColor = PlayerShieldRatio < 0.3 ? "#f00" : "#0f0";
       document.getElementById('statusShipShield').style.color = PlayerShieldColor;
       document.getElementById('statusShipShield').textContent = PlayerShield;
       document.getElementById('gaugeShipShield').style.width = (PlayerShieldRatio * 100) + '%';
       document.getElementById('gaugeShipShield').style.background = PlayerShieldColor;

       // PlayerShip Energy
       let energyRatio = PlayerEnergy / PlayerShip.ENERGY_MAX;
       let energyColor = energyRatio < 0.3 ? "#f00" : "#0f0";
       document.getElementById('statusShipEnergy').style.color = energyColor;
       document.getElementById('statusShipEnergy').textContent = PlayerEnergy;
       document.getElementById('gaugeShipEnergy').style.width = (energyRatio * 100) + '%';
       document.getElementById('gaugeShipEnergy').style.background = energyColor;

       // Base Shield
       let baseShieldRatio = baseShield / StarBase.SHIELD_MAX;
       let baseShieldColor = baseShieldRatio < 0.3 ? "#f00" : "#0f0";
       document.getElementById('statusBaseShield').style.color = baseShieldColor;
       document.getElementById('statusBaseShield').textContent = baseShield;
       document.getElementById('gaugeBaseShield').style.width = (baseShieldRatio * 100) + '%';
       document.getElementById('gaugeBaseShield').style.background = baseShieldColor;
     } // updateStatus()

     /**
      * 次のステージに移行
      */
     function nextMission(scene) {
       const clearedMission = gameState.curMission;
       let bonus = gameState.curMission * 100;
       gameState.score += bonus;
       console.log(`nextMission> bonus=${bonus}, gameState.score=${gameState.score}`);

       gameState.qtyFederationShip = spaceContext.federationShips.filter(o => o.active).length;
       /* if ( gameState.turn < NEW_ENEMY_INTERVAL ) {
        *   gameState.qtyFederationShip++;
        * } */
       console.log(`nextMission> gameState.qtyFederationShip=${gameState.qtyFederationShip}`);

       const { list, newIdx } = saveHighScore(
         gameState.score, gameState.turn, clearedMission, `MISSION #${clearedMission} CLEARED`, true
       );

       gameState.curMission++;
       QTY.ENEMY++;
       gameState.isPlayerTurn = false;

       gameState.pendingScene = scene;

       setMsg(`司令部: ミッション #${clearedMission} クリア`, '#fff');
       scene.time.delayedCall(
         TIMING.MISSION_OVER, () => showHighScoreOverlay(
           'missionclear', { clearedMission, bonus, list, newIdx }
         )
       );
     } // nextMission()

     /**
      * ゲームオーバー
      */
     function gameOver(msg, clear=false) {
       gameState.isGameOver = true;
       gameState.flagClear = clear;
       gameState.isPlayerTurn = false;
       setMsg('', "#000");
       updateStatus();
       setTimeout(() => showHighScoreOverlay('gameover', { msg }), TIMING.MISSION_OVER);
     } // gameOver()

     function loadHighScores() {
       try {
         const raw = localStorage.getItem(HIGHSCORE.STORAGE_KEY);
         return raw ? JSON.parse(raw) : [];
       } catch (e) {
         return [];
       }
     }

     function saveHighScore(score, turns, mission, result, forceSave = false) {
       let list = loadHighScores();
       const now = new Date();
       const dateStr = [
         now.getFullYear(),
         String(now.getMonth() + 1).padStart(2, '0'),
         String(now.getDate()).padStart(2, '0')
       ].join('/');
       if ( gameState.flagClear || forceSave ) {
         list.push({
           score, turns, mission, result,
           gameid: GAME_ID, date: dateStr, _new: true
         });
       }
       list.sort((a, b) => b.score - a.score);
       const newIdx = list.findIndex(s => s._new);
       list = list.slice(0, HIGHSCORE.MAX_ENTRIES);
       const madeIt = list.some(s => s._new);
       localStorage.setItem(
         HIGHSCORE.STORAGE_KEY,
         JSON.stringify(list.map(({ _new, ...rest }) => rest))
       );
       return { list, newIdx: madeIt ? newIdx : -1 };
     }

     function renderHSTable(list) {
       const tbody  = document.getElementById('hsTableBody');
       const noRec  = document.getElementById('hsNoRecord');
       tbody.innerHTML = '';
       if (!list || list.length === 0) {
         noRec.style.display = 'block';
         return;
       }
       noRec.style.display = 'none';
       const rankLabels = ['1ST', '2ND', '3RD', '4TH', '5TH'];
       list.forEach((s, i) => {
         const tr = document.createElement('tr');
         const thisGame = (s.gameid == GAME_ID);
         if ( thisGame ) {
           tr.className = 'hs-new';
         }
         const rank   = rankLabels[i] || `${i + 1}TH`;
         const prefix = thisGame ? '★' : '';
         const displayMission = s.mission !== undefined ? s.mission : '-';
         tr.innerHTML = `
           <td>${prefix}</td>
           <td>${rank}</td>
           <td>${s.score}</td>
           <td>${displayMission}</td>
           <td>${s.turns}</td>
           <td>${s.date}</td>
         `;
         
         // ★追加: 行をクリックした際の処理
         tr.addEventListener('click', () => {
           // スコアを引き継ぐ
           gameState.score = s.score;
           // 記録されたステージの次からスタートする
           gameState.curMission = (s.mission !== undefined ? s.mission : 1) + 1;
           gameState.turn = 1;
           
           // 敵の初期生成数を、進行するステージに合わせて再計算
           // (初期値3 + ステージ進行分)
           QTY.ENEMY = 3 + (gameState.curMission - 1);
           
           gameState.isGameOver = false;
           gameState.flagClear = false;
           gameState.isPlayerTurn = true;
           gameState.pendingScene = null;
           
           // オーバーレイを非表示にする
           document.getElementById('highScoreOverlay').style.display = 'none';
           
           // シーンを再起動
           if (gameState.curScene) {
             gameState.curScene.scene.restart();
           }
         });

         tbody.appendChild(tr);
       });
     } // renderHSTable()

     function showHighScoreOverlay(mode, data = {}) {
       const overlay    = document.getElementById('highScoreOverlay');
       const resultEl   = document.getElementById('hsResultMsg');
       const finalEl    = document.getElementById('hsFinalMsg');
       const closeBtn   = document.getElementById('hsCloseBtn');
       const restartBtn = document.getElementById('hsRestartBtn');

       if (mode === 'missionclear') {
         const { clearedMission, bonus, list, newIdx } = data;
         resultEl.style.color      = '#0f0';
         resultEl.textContent      = `✓ MISSION #${clearedMission} CLEARED!`;
         finalEl.textContent       = `TURNS:${gameState.turn}, MISSION BONUS:+${bonus}, SCORE: ${gameState.score}`;
         renderHSTable(list);
         closeBtn.style.display    = 'none';
         restartBtn.textContent    = '▶ NEXT MISSION';
         restartBtn.style.display  = 'inline-block';
       } else if (mode === 'gameover') {
         const { msg } = data;
         resultEl.style.color      = '#ff0';
         resultEl.textContent      = msg;
         finalEl.textContent       = `MISSION FAILED: SCORE: ${gameState.score}  ` +
                                     `MISSION #${gameState.curMission}  TURNS: ${gameState.turn}`;
         renderHSTable(loadHighScores());
         closeBtn.style.display    = 'none';
         restartBtn.textContent    = '▶ RESTART';
         restartBtn.style.display  = 'inline-block';
       } else {
         resultEl.style.color      = '#0ff';
         resultEl.textContent      = '▶ HIGH SCORES ◀';
         finalEl.textContent       = `NOW — ` +
                                     `MISSION #${gameState.curMission} TURN: ${gameState.turn} - ` +
                                     `SCORE:${gameState.score}`;
         closeBtn.style.display    = 'inline-block';
         restartBtn.textContent    = '▶ RESTART';
         restartBtn.style.display  = 'inline-block';
         renderHSTable(loadHighScores());
       }
       overlay.style.display = 'flex';
     } // showHighScoreOverlay()

     document.getElementById('viewScoresBtn').addEventListener('click', () => {
       showHighScoreOverlay('view');
     });
     // document.getElementById('misc1').onclick = () => newFederationShip(gameState.curScene);

     document.getElementById('hsRestartBtn').addEventListener('click', () => {
       if (gameState.pendingScene) {
         document.getElementById('highScoreOverlay').style.display = 'none';
         gameState.turn = 1;
         const s = gameState.pendingScene;
         gameState.pendingScene = null;
         gameState.isPlayerTurn = true;
         s.scene.restart();
       } else {
         location.reload();
       }
     });

     document.getElementById('hsCloseBtn').addEventListener('click', () => {
       document.getElementById('highScoreOverlay').style.display = 'none';
     });
    </script>
  </body>
